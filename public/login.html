<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>تسجيل الدخول - معهد رعاية الضبعية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <link rel="icon" type="image/png" href="/logo.png">
    <style>
        :root {
            --primary: #1a4f6e;
            --primary-dark: #0d3b54;
            --primary-light: #e8f0f6;
            --secondary: #c4a35a;
            --secondary-dark: #a07d3a;
            --secondary-light: #faf6ed;
            --white: #ffffff;
            --gray-50: #f8fafc;
            --gray-100: #f1f5f9;
            --gray-200: #e2e8f0;
            --gray-500: #64748b;
            --gray-700: #334155;
            --success: #2d6a4f;
            --danger: #b91c1c;
            --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.08);
            --radius-lg: 16px;
            --radius-2xl: 28px;
            --radius-full: 9999px;
            --transition: all 0.25s ease;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        /* الهيدر */
        .main-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            border-bottom: 3px solid var(--secondary);
            box-shadow: var(--shadow-md);
        }
        .logo {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: white;
            padding: 6px;
            border: 2px solid var(--secondary);
        }
        .main-header h1 {
            color: white;
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(135deg, white, var(--secondary));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        /* الحاوية الرئيسية */
        .main-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }
        /* نموذج تسجيل الدخول */
        .login-form-container {
            background: white;
            border-radius: var(--radius-2xl);
            padding: 40px 32px;
            width: 100%;
            max-width: 480px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--gray-200);
            transition: var(--transition);
        }
        .login-icon {
            text-align: center;
            font-size: 3.5rem;
            color: var(--secondary);
            margin-bottom: 16px;
        }
        .login-form-container h2 {
            text-align: center;
            color: var(--primary);
            margin-bottom: 28px;
            font-size: 1.7rem;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--gray-700);
        }
        .input-group label i {
            color: var(--secondary);
            margin-left: 6px;
        }
        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--gray-200);
            border-radius: var(--radius-lg);
            font-family: 'Tajawal', sans-serif;
            font-size: 1rem;
            transition: var(--transition);
        }
        .input-group input:focus {
            outline: none;
            border-color: var(--secondary);
            box-shadow: 0 0 0 4px rgba(196,163,90,0.15);
        }
        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .password-wrapper input {
            flex: 1;
            padding-left: 48px;
        }
        .toggle-password {
            position: absolute;
            left: 12px;
            background: none;
            border: none;
            color: var(--secondary);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 6px;
        }
        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--secondary) 0%, var(--secondary-dark) 100%);
            border: none;
            padding: 14px;
            border-radius: var(--radius-full);
            font-weight: 800;
            font-size: 1rem;
            color: var(--primary);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 10px;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.02);
        }
        .signup-link, .parent-link {
            text-align: center;
            margin-top: 20px;
            font-size: 0.85rem;
        }
        .signup-link a, .parent-link a {
            color: var(--secondary);
            text-decoration: none;
            font-weight: 600;
        }
        .parent-link {
            border-top: 1px solid var(--gray-200);
            padding-top: 20px;
            margin-top: 20px;
        }
        /* الروبوت المتحرك */
        .robot-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            cursor: pointer;
        }
        .robot {
            width: 90px;
            height: auto;
            position: relative;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        .robot-head {
            background: #2c3e50;
            border-radius: 50%;
            width: 70px;
            height: 70px;
            position: relative;
            margin: 0 auto;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            border: 2px solid var(--secondary);
        }
        .robot-face {
            position: relative;
            padding-top: 20px;
        }
        .robot-eyes {
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        .robot-eye {
            width: 12px;
            height: 12px;
            background: white;
            border-radius: 50%;
            position: relative;
            animation: blink 4s infinite;
        }
        .robot-eye::after {
            content: '';
            position: absolute;
            width: 6px;
            height: 6px;
            background: #1a4f6e;
            border-radius: 50%;
            top: 3px;
            left: 3px;
        }
        @keyframes blink {
            0%, 90%, 100% { transform: scaleY(1); }
            95% { transform: scaleY(0.1); }
        }
        .robot-mouth {
            width: 20px;
            height: 4px;
            background: var(--secondary);
            margin: 12px auto 0;
            border-radius: 5px;
        }
        .robot-antenna {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 6px;
            height: 20px;
            background: #2c3e50;
        }
        .antenna-ball {
            width: 12px;
            height: 12px;
            background: var(--secondary);
            border-radius: 50%;
            position: absolute;
            top: -10px;
            left: -3px;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.2); }
        }
        .robot-body {
            background: #2c3e50;
            width: 75px;
            height: 70px;
            margin: -10px auto 0;
            border-radius: 20px 20px 15px 15px;
            position: relative;
            border: 2px solid var(--secondary);
            border-top: none;
            padding-top: 12px;
        }
        .robot-heart {
            text-align: center;
            font-size: 1.8rem;
        }
        .robot-screen {
            background: #1a2632;
            width: 50px;
            height: 20px;
            margin: 5px auto;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .screen-text {
            font-size: 0.5rem;
            color: #00ffcc;
            white-space: nowrap;
            animation: scrollText 6s linear infinite;
        }
        @keyframes scrollText {
            0% { transform: translateX(20px); opacity: 0; }
            10% { transform: translateX(0); opacity: 1; }
            90% { transform: translateX(0); opacity: 1; }
            100% { transform: translateX(-30px); opacity: 0; }
        }
        .robot-buttons {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 8px;
        }
        .robot-btn {
            width: 8px;
            height: 8px;
            background: var(--secondary);
            border-radius: 50%;
        }
        .robot-arms {
            display: flex;
            justify-content: space-between;
            margin-top: -15px;
            padding: 0 10px;
        }
        .robot-arm {
            width: 25px;
            height: 35px;
            background: #2c3e50;
            border-radius: 20px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 5px;
        }
        .arm-hand {
            font-size: 0.9rem;
        }
        .robot-legs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: -5px;
        }
        .robot-leg {
            width: 15px;
            height: 25px;
            background: #2c3e50;
            border-radius: 10px;
        }
        .speech-bubble {
            position: absolute;
            bottom: 100px;
            right: 20px;
            background: white;
            border-radius: 20px;
            padding: 10px 15px;
            max-width: 180px;
            box-shadow: var(--shadow-md);
            border: 2px solid var(--secondary);
            visibility: hidden;
            opacity: 0;
            transition: 0.3s;
            white-space: nowrap;
        }
        .robot-container:hover .speech-bubble {
            visibility: visible;
            opacity: 1;
        }
        .bubble-tail {
            position: absolute;
            bottom: -12px;
            right: 20px;
            width: 0;
            height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 12px solid var(--secondary);
        }
        footer {
            text-align: center;
            padding: 20px;
            font-size: 0.75rem;
            color: var(--gray-500);
        }
        .heart {
            color: var(--danger);
            animation: heartbeat 1.5s ease infinite;
            display: inline-block;
        }
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }
        @media (max-width: 600px) {
            .login-form-container { padding: 28px 20px; }
            .robot-container { transform: scale(0.8); bottom: 5px; right: 5px; }
            .speech-bubble { bottom: 80px; right: 10px; white-space: normal; min-width: 140px; }
        }
        /* حماية إضافية */
        body { user-select: none; -webkit-user-select: none; }
        input, textarea { user-select: text !important; }
    </style>
    <script>
        (function() {
            document.addEventListener('contextmenu', (e) => e.preventDefault());
            document.addEventListener('keydown', (e) => {
                if (e.key === 'F12' || (e.ctrlKey && e.key === 'u') || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'C' || e.key === 'J'))) {
                    e.preventDefault();
                }
            });
            if (typeof console !== 'undefined') {
                console.log = console.warn = console.error = console.info = console.debug = function() {};
            }
            setInterval(function() {
                const start = performance.now();
                debugger;
                if (performance.now() - start > 100) {
                    document.body.innerHTML = '<div style="position:fixed;top:0;left:0;right:0;bottom:0;background:white;z-index:99999;display:flex;align-items:center;justify-content:center;"><i class="fas fa-shield-alt" style="font-size:80px;color:#d4af37;"></i><h2>تم تعطيل أدوات المطور</h2></div>';
                }
            }, 1000);
        })();
    </script>
</head>
<body>
    <header class="main-header">
        <img src="logo.png" alt="شعار معهد رعاية الضبعية" class="logo">
        <h1>نظام إدارة المعهد</h1>
    </header>

    <div class="robot-container">
        <div class="robot">
            <div class="robot-head">
                <div class="robot-face">
                    <div class="robot-eyes">
                        <div class="robot-eye left-eye"></div>
                        <div class="robot-eye right-eye"></div>
                    </div>
                    <div class="robot-mouth"></div>
                </div>
                <div class="robot-antenna">
                    <div class="antenna-ball"></div>
                </div>
            </div>
            <div class="robot-body">
                <div class="robot-heart">🤖</div>
                <div class="robot-screen">
                    <div class="screen-text" id="robotSpeech">مرحباً! 👋</div>
                </div>
                <div class="robot-buttons">
                    <div class="robot-btn"></div>
                    <div class="robot-btn"></div>
                    <div class="robot-btn"></div>
                </div>
            </div>
            <div class="robot-arms">
                <div class="robot-arm left-arm"><div class="arm-hand">✋</div></div>
                <div class="robot-arm right-arm"><div class="arm-hand">✋</div></div>
            </div>
            <div class="robot-legs">
                <div class="robot-leg"></div>
                <div class="robot-leg"></div>
            </div>
        </div>
        <div class="speech-bubble" id="speechBubble">
            <div class="bubble-text" id="bubbleText">أنا هنا لمساعدتك! 🤗</div>
            <div class="bubble-tail"></div>
        </div>
    </div>

    <div class="main-container">
        <div class="login-form-container">
            <div class="login-icon">
                <i class="fas fa-user-graduate"></i>
            </div>
            <h2>تسجيل الدخول</h2>
            <div id="message-container"></div>
            <form id="login-form">
                <div class="input-group">
                    <label><i class="fas fa-user"></i> اسم المستخدم</label>
                    <input type="text" id="username" name="username" placeholder="أدخل اسم المستخدم" required>
                </div>
                <div class="input-group">
                    <label><i class="fas fa-lock"></i> كلمة المرور</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" placeholder="أدخل كلمة المرور" required>
                        <button type="button" class="toggle-password" onclick="togglePasswordVisibility()">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="submit-btn">
                    <i class="fas fa-sign-in-alt"></i> تسجيل الدخول
                </button>
                <div class="signup-link">
                    ليس لديك حساب؟ <a href="signup.html"><i class="fas fa-user-plus"></i> إنشاء حساب جديد</a>
                </div>
                <div class="parent-link">
                    <a href="parent-login.html"><i class="fas fa-user-friends"></i> تسجيل دخول ولي الأمر</a>
                </div>
            </form>
        </div>
    </div>

    <footer>
        <p>Developed by Ahmed Moussa <span class="heart">❤</span></p>
    </footer>

    <script>
        const BASE_URL = window.location.hostname === 'localhost' ? 'http://localhost:3000' : '';

        function showToast(message, type = 'success') {
            if (typeof Toastify !== 'undefined') {
                let background = type === 'success' ? '#2d6a4f' : '#b91c1c';
                Toastify({
                    text: message,
                    duration: 3500,
                    gravity: 'top',
                    position: 'center',
                    style: {
                        background: background,
                        borderRadius: '12px',
                        fontFamily: 'Tajawal',
                        padding: '12px 20px'
                    }
                }).showToast();
            } else {
                alert(message);
            }
        }

        function togglePasswordVisibility() {
            const pwdField = document.getElementById('password');
            const btn = document.querySelector('.toggle-password i');
            if (pwdField.type === 'password') {
                pwdField.type = 'text';
                btn.classList.remove('fa-eye');
                btn.classList.add('fa-eye-slash');
            } else {
                pwdField.type = 'password';
                btn.classList.remove('fa-eye-slash');
                btn.classList.add('fa-eye');
            }
        }
        window.togglePasswordVisibility = togglePasswordVisibility;

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!username || !password) {
                showToast('يرجى إدخال اسم المستخدم وكلمة المرور', 'error');
                return;
            }

            const submitBtn = document.querySelector('.submit-btn');
            const originalText = submitBtn.innerHTML;
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري تسجيل الدخول...';

            try {
                const response = await fetch(`${BASE_URL}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                    credentials: 'include'
                });
                const data = await response.json();
                if (response.ok && data.success) {
                    // حفظ بيانات المستخدم في sessionStorage
                    sessionStorage.setItem('userData', JSON.stringify(data.user));
                    showToast(`مرحباً ${data.user.fullName || data.user.username}`, 'success');
                    // التوجيه حسب نوع المستخدم
                    if (data.user.type === 'admin') {
                        window.location.href = 'admin.html';
                    } else if (data.user.type === 'student') {
                        window.location.href = 'student-dashboard.html';
                    } else {
                        window.location.href = 'Home.html';
                    }
                } else {
                    showToast(data.error || 'بيانات الدخول غير صحيحة', 'error');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = originalText;
                }
            } catch (err) {
                console.error(err);
                showToast('خطأ في الاتصال بالسيرفر', 'error');
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalText;
            }
        });

        // تغيير النص المتحرك للروبوت
        let speechIndex = 0;
        const speeches = ['مرحباً! 👋', 'أهلاً بك 🌟', 'سجل دخولك 📝', 'نتمنى لك يوماً سعيداً 💙'];
        setInterval(() => {
            const robotSpeech = document.getElementById('robotSpeech');
            const bubbleText = document.getElementById('bubbleText');
            if (robotSpeech) {
                robotSpeech.textContent = speeches[speechIndex % speeches.length];
                if (bubbleText) bubbleText.textContent = speeches[speechIndex % speeches.length];
                speechIndex++;
            }
        }, 3000);
    </script>
</body>
</html>
