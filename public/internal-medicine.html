<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internal Medicine - بنك الأسئلة | معهد رعاية الضبعية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af5a; --gold-dark: #b8943a; --gold-light: #f5edd6;
            --dark: #1a3a48; --darker: #0e2a35; --light-bg: #f8fafb;
            --blue: #3b82f6; --green: #10b981; --orange: #f59e0b; --purple: #8b5cf6; --red: #ef4444;
            --card-bg: #ffffff; --text-primary: #334155; --text-secondary: #64748b; --border-color: #edf2f7;
            --shadow-xs: 0 1px 3px rgba(0,0,0,0.04); --shadow-sm: 0 4px 15px rgba(0,0,0,0.06);
            --shadow-md: 0 8px 25px rgba(0,0,0,0.08); --shadow-lg: 0 15px 40px rgba(0,0,0,0.12);
            --radius-sm: 16px; --radius-md: 22px; --radius-lg: 30px; --radius-xl: 60px;
            --transition: all 0.3s ease;
        }
        .profile-avatar {
            width: 50px; height: 50px; border-radius: 50%; 
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            display: flex; align-items: center; justify-content: center;
            color: #0e2a35; font-weight: 900; font-size: 1.5rem;
            border: 2px solid var(--gold); box-shadow: 0 0 20px rgba(212,175,90,0.2);
            cursor: pointer; transition: var(--transition);
        }
        .profile-avatar:hover { transform: scale(1.05); }
        .profile-avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .user-name { color: var(--gold); font-weight: 700; font-size: 0.85rem; }
        .user-name small { display: block; font-size: 0.65rem; opacity: 0.7; font-weight: 400; }

        body.dark-mode {
            --light-bg: #0f172a; --card-bg: #1e293b; --text-primary: #e2e8f0;
            --text-secondary: #94a3b8; --border-color: #334155; --dark: #f1f5f9; --darker: #e2e8f0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Tajawal', sans-serif; background: var(--light-bg);
            min-height: 100vh; padding-bottom: 60px; position: relative; overflow-x: hidden;
            color: var(--text-primary); line-height: 1.7; transition: background 0.4s ease;
        }
        .animated-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; pointer-events: none; }
        .orb { position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.22; animation: orbFloat 20s infinite ease-in-out; }
        .orb:nth-child(1) { width: 600px; height: 600px; background: radial-gradient(circle, rgba(212,175,90,0.35), transparent 70%); top: -150px; left: -100px; }
        .orb:nth-child(2) { width: 450px; height: 450px; background: radial-gradient(circle, rgba(99,102,241,0.25), transparent 70%); bottom: -120px; right: -80px; animation-delay: -5s; }
        .orb:nth-child(3) { width: 400px; height: 400px; background: radial-gradient(circle, rgba(236,72,153,0.22), transparent 70%); top: 50%; left: 50%; animation-delay: -10s; }
        @keyframes orbFloat { 0%,100%{transform:translate(0,0)scale(1)rotate(0deg)}25%{transform:translate(50px,-30px)scale(1.05)rotate(3deg)}50%{transform:translate(-25px,20px)scale(.95)rotate(-2deg)}75%{transform:translate(-40px,-10px)scale(1.02)rotate(1deg)} }
        .progress-container { position: fixed; top: 0; right: 0; left: 0; width: 100%; height: 4px; background: transparent; z-index: 1000; }
        .progress-bar { height: 4px; background: linear-gradient(90deg, var(--gold), var(--orange), var(--red)); width: 0%; border-radius: 0 3px 3px 0; transition: width 0.1s linear; }

        .sync-indicator { position: fixed; top: 8px; left: 50%; transform: translateX(-50%); z-index: 1001; font-size: 0.7rem; padding: 4px 12px; border-radius: 15px; background: var(--card-bg); color: var(--text-secondary); box-shadow: var(--shadow-sm); transition: var(--transition); display: flex; align-items: center; gap: 5px; }
        .sync-indicator.synced { color: var(--green); }
        .sync-indicator.syncing { color: var(--orange); }
        .sync-indicator.error { color: var(--red); }

        .header { background: linear-gradient(165deg, #060f1a 0%, #0f2333 40%, #0d1f2d 70%, #050d14 100%); padding: 20px 30px 14px; text-align: center; position: relative; overflow: hidden; box-shadow: 0 10px 50px rgba(0,0,0,0.5); border-bottom: 1px solid rgba(212,175,90,0.15); }
        .header h1 { color: var(--gold); font-size: 1.9rem; margin-bottom: 4px; font-weight: 900; }
        .header h1 i { margin-left: 10px; background: linear-gradient(135deg, rgba(212,175,90,0.35), rgba(212,175,90,0.1)); padding: 11px; border-radius: 50%; }
        .header p { color: rgba(255,255,255,0.8); font-size: 0.85rem; }
        .header-badge { display: inline-block; background: linear-gradient(135deg, rgba(212,175,90,0.25), rgba(212,175,90,0.08)); padding: 7px 18px; border-radius: 50px; margin-top: 6px; font-size: 0.78rem; color: var(--gold); border: 1px solid rgba(212,175,90,0.35); font-weight: 600; }
        .control-bar { display: flex; justify-content: center; align-items: center; gap: 5px; padding: 4px 10px; flex-wrap: wrap; margin-top: 6px; }
        .control-btn, .quiz-btn, .exam-btn, .flashcard-btn, .dashboard-btn, .leaderboard-btn { color: white; border: none; padding: 6px 12px; border-radius: 20px; cursor: pointer; font-family: 'Tajawal', sans-serif; font-size: 0.73rem; font-weight: 700; transition: var(--transition); display: flex; align-items: center; gap: 4px; }
        .control-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); font-weight: 400; }
        .control-btn:hover { background: rgba(255,255,255,0.2); }
        .quiz-btn { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .exam-btn { background: linear-gradient(135deg, #6366f1, #4f46e5); }
        .flashcard-btn { background: linear-gradient(135deg, #10b981, #059669); }
        .dashboard-btn { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .leaderboard-btn { background: linear-gradient(135deg, #8b5cf6, #7c3aed); }
        .quiz-btn:hover, .exam-btn:hover, .flashcard-btn:hover, .dashboard-btn:hover, .leaderboard-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.3); }

        .xp-bar-container { display: flex; align-items: center; gap: 6px; justify-content: center; margin: 6px 0; }
        .xp-label { font-size: 0.7rem; color: var(--gold); font-weight: 700; }
        .xp-bar { width: 120px; height: 8px; background: rgba(255,255,255,0.2); border-radius: 10px; overflow: hidden; }
        .xp-fill { height: 100%; background: linear-gradient(90deg, var(--gold), #f59e0b); border-radius: 10px; transition: width 0.5s ease; }
        .level-badge { font-size: 0.7rem; font-weight: 700; padding: 2px 10px; border-radius: 15px; }
        .level-bronze{background:#fdf2e9;color:#cd7f32}.level-silver{background:#f1f5f9;color:#a0aec0}.level-gold{background:#fef9e7;color:var(--gold)}.level-diamond{background:#eef2ff;color:#6366f1}

        .sidebar-toggle { position: fixed; top: 50%; right: 0; transform: translateY(-50%); background: var(--gold-dark); color: white; border: none; padding: 11px 7px; border-radius: 0 10px 10px 0; cursor: pointer; z-index: 500; font-size: 0.9rem; transition: var(--transition); }
        .sidebar-toggle:hover { padding-right: 12px; }
        .sidebar { position: fixed; top: 0; right: -300px; width: 280px; height: 100%; background: var(--card-bg); z-index: 1500; transition: right 0.4s ease; box-shadow: -5px 0 30px rgba(0,0,0,0.3); overflow-y: auto; padding: 18px; }
        .sidebar.open { right: 0; }
        .sidebar-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1499; display: none; }
        .sidebar-overlay.active { display: block; }
        .sidebar h3 { color: var(--gold-dark); margin-bottom: 12px; font-size: 0.95rem; text-align: center; }
        .side-chapter, .side-category { display: block; width: 100%; text-align: right; padding: 9px 13px; margin: 4px 0; border: 2px solid transparent; border-radius: 22px; background: transparent; cursor: pointer; font-family: 'Tajawal', sans-serif; font-size: 0.78rem; transition: var(--transition); color: var(--text-primary); }
        .side-category { font-size: 0.73rem; padding: 7px 10px; }
        .side-chapter:hover, .side-category:hover { border-color: var(--gold); background: rgba(212,175,90,0.05); }
        .side-chapter.active, .side-category.active { background: var(--gold); color: var(--darker); font-weight: 700; }

        .favorites-bar { display: flex; justify-content: center; gap: 5px; margin-bottom: 12px; flex-wrap: wrap; }
        .fav-filter-btn { background: var(--card-bg); border: 2px solid #e2e8f0; padding: 6px 12px; border-radius: 22px; cursor: pointer; font-family: 'Tajawal', sans-serif; font-size: 0.75rem; transition: var(--transition); }
        .fav-filter-btn:hover { border-color: var(--gold); }
        .fav-filter-btn.active { background: #fffbeb; border-color: #f59e0b; color: #f59e0b; font-weight: 700; }
        .container { max-width: 1400px; margin: 25px auto; padding: 0 25px; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 22px; }
        @media(max-width:950px){.stats-grid{grid-template-columns:repeat(2,1fr)}}
        @media(max-width:500px){.stats-grid{grid-template-columns:1fr}}
        .stat-card { background: var(--card-bg); border-radius: var(--radius-lg); padding: 20px 14px; text-align: center; box-shadow: var(--shadow-md); transition: var(--transition); }
        .stat-card:hover { transform: translateY(-6px); }
        .stat-card .icon-wrap { width: 48px; height: 48px; border-radius: 15px; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; font-size: 1.2rem; }
        .stat-card:nth-child(1) .icon-wrap{background:#eff6ff;color:var(--blue)}.stat-card:nth-child(2) .icon-wrap{background:#ecfdf5;color:var(--green)}.stat-card:nth-child(3) .icon-wrap{background:#fffbeb;color:var(--orange)}.stat-card:nth-child(4) .icon-wrap{background:#f5f3ff;color:var(--purple)}
        .stat-card .number { font-size: 1.7rem; font-weight: 900; color: var(--dark); }
        .stat-card .label { font-size: 0.75rem; color: var(--text-secondary); font-weight: 600; }
        .chapter-section { background: var(--card-bg); border-radius: var(--radius-xl); padding: 7px; margin-bottom: 22px; box-shadow: var(--shadow-sm); display: flex; flex-wrap: wrap; justify-content: center; gap: 4px; position: sticky; top: 8px; z-index: 100; }
        .chapter-btn { background: transparent; border: 2px solid transparent; padding: 9px 15px; border-radius: 50px; font-family: 'Tajawal', sans-serif; font-size: 0.78rem; font-weight: 700; cursor: pointer; transition: var(--transition); color: var(--text-secondary); display: flex; align-items: center; gap: 6px; }
        .chapter-btn:hover { background: rgba(212,175,90,0.1); color: var(--gold-dark); }
        .chapter-btn.active { background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: #0e2a35; }
        .category-tabs { background: var(--card-bg); border-radius: var(--radius-xl); padding: 6px; margin-bottom: 22px; display: flex; flex-wrap: wrap; justify-content: center; gap: 4px; box-shadow: var(--shadow-sm); }
        .category-btn { background: transparent; border: 2px solid transparent; padding: 8px 14px; border-radius: 32px; font-family: 'Tajawal', sans-serif; font-size: 0.76rem; font-weight: 600; cursor: pointer; transition: var(--transition); color: var(--text-secondary); display: flex; align-items: center; gap: 6px; }
        .category-btn .count { background: rgba(0,0,0,0.05); padding: 2px 7px; border-radius: 16px; font-size: 0.65rem; }
        .category-btn:hover { background: rgba(212,175,90,0.08); }
        .category-btn.active { background: var(--dark); color: white; }
        body.dark-mode .category-btn.active { background: var(--gold); color: #0e2a35; }

        .questions-section { margin-bottom: 22px; animation: slideIn 0.4s ease forwards; }
        @keyframes slideIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
        .section-title { font-size: 1.05rem; font-weight: 800; color: var(--dark); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; padding: 10px 15px; background: var(--card-bg); border-radius: var(--radius-md); border-right: 4px solid var(--gold); }
        .section-title .section-count { background: var(--gold-light); color: var(--gold-dark); padding: 3px 10px; border-radius: 16px; font-size: 0.74rem; margin-right: auto; font-weight: 700; }
        .question-card { background: var(--card-bg); border-radius: var(--radius-md); margin-bottom: 14px; overflow: hidden; box-shadow: var(--shadow-xs); transition: var(--transition); border: 1px solid var(--border-color); }
        .question-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
        .question-card.hide-answers .answer-box,.question-card.hide-answers .answer-translation,.question-card.hide-answers .list-items-box{display:none!important}
        .question-header { background: #fafcfd; padding: 10px 15px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        body.dark-mode .question-header { background: #1a2538; }
        .question-badge { padding: 4px 10px; border-radius: 50px; font-size: 0.67rem; font-weight: 700; display: inline-flex; align-items: center; gap: 4px; }
        .badge-def{background:#eff6ff;color:#2563eb}.badge-mcq{background:#ecfdf5;color:#059669}.badge-tf{background:#fffbeb;color:#d97706}.badge-complete{background:#faf5ff;color:#7c3aed}.badge-explain{background:#ecfeff;color:#0891b2}.badge-list{background:#fff1f2;color:#e11d48}.badge-situation{background:#eef2ff;color:#4f46e5}
        .question-number { font-size: 0.67rem; color: #94a3b8; }
        .card-actions { display: flex; gap: 3px; margin-right: auto; }
        .action-btn { background: transparent; border: 1px solid #e2e8f0; color: var(--text-secondary); padding: 3px 7px; border-radius: 14px; cursor: pointer; font-size: 0.64rem; transition: var(--transition); display: flex; align-items: center; gap: 2px; }
        .action-btn:hover { background: rgba(212,175,90,0.1); color: var(--gold-dark); border-color: var(--gold); }
        .action-btn.bookmarked{color:#f59e0b;border-color:#f59e0b;background:#fffbeb}.action-btn.hard-marked{color:#ef4444;border-color:#ef4444;background:#fef2f2}
        .question-content { padding: 15px; }
        .question-text { font-size: 0.94rem; font-weight: 700; color: var(--dark); margin-bottom: 10px; line-height: 1.7; }
        .translation-box { background: #f8fafc; padding: 10px 13px; border-radius: var(--radius-sm); margin-bottom: 10px; font-size: 0.8rem; color: #475569; border-right: 4px solid var(--gold); }
        .difficulty-badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:.63rem;font-weight:600;margin-right:4px;cursor:pointer}.diff-easy{background:#ecfdf5;color:#059669}.diff-medium{background:#fffbeb;color:#d97706}.diff-hard{background:#fef2f2;color:#dc2626}
        .note-box{margin-top:6px}.note-input{width:100%;padding:7px 10px;border-radius:10px;border:1px solid #e2e8f0;font-family:'Tajawal',sans-serif;font-size:.75rem;resize:vertical;min-height:35px;background:var(--card-bg);color:var(--text-primary)}
        .options-list{margin:10px 0;padding-right:15px}.options-list li{margin:6px 0;color:var(--text-primary);list-style:none;position:relative;padding-right:18px;font-size:.87rem}.options-list li:before{content:"◆";color:var(--gold);position:absolute;right:0;font-size:.42rem;top:6px}
        .answer-box{padding:10px 14px;border-radius:var(--radius-sm);margin-top:10px;border-right:4px solid #22c55e;background:#f0fdf4}.answer-box.false-answer{background:#fef2f2;border-right-color:#ef4444}
        .answer-translation{background:#eff6ff;padding:8px 11px;border-radius:10px;margin-top:6px;font-size:.78rem;color:#1e40af}
        .list-items-box{background:#fafafa;padding:12px 14px;border-radius:var(--radius-sm);margin-top:10px;border-right:4px solid var(--red)}.list-items-box li{margin:6px 0;padding-right:16px;font-size:.84rem}.list-items-box li:before{content:"●";color:var(--gold);position:absolute;right:0;font-size:.38rem;top:7px}
        .empty-state{background:var(--card-bg);border-radius:var(--radius-lg);padding:50px 20px;text-align:center;border:2px dashed var(--gold);margin:20px 0}
        .back-to-top{position:fixed;bottom:30px;left:30px;width:46px;height:46px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));border:none;border-radius:50%;color:#0e2a35;font-size:1.1rem;cursor:pointer;z-index:999;opacity:0;visibility:hidden;transform:translateY(20px);transition:var(--transition);box-shadow:0 8px 25px rgba(212,175,90,0.4)}.back-to-top.visible{opacity:1;visibility:visible;transform:translateY(0)}
        .footer{text-align:center;padding:25px;color:var(--text-secondary);font-size:.82rem;border-top:1px solid var(--border-color);margin-top:35px}.footer .developer-name{color:var(--gold-dark);font-weight:700}.footer .institute-name{color:var(--dark);font-weight:700}

        .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.75);z-index:2000;display:flex;align-items:center;justify-content:center;display:none}.modal-overlay.active{display:flex}
        .modal-content{background:var(--card-bg);border-radius:var(--radius-lg);padding:22px;max-width:800px;width:92%;max-height:85vh;overflow-y:auto;text-align:center}
        .modal-content h2{color:var(--dark);margin-bottom:15px;font-size:1.3rem}
        .modal-settings{margin-bottom:15px;display:flex;gap:6px;justify-content:center;flex-wrap:wrap;align-items:center}
        .modal-settings select,.modal-settings input{padding:7px 12px;border-radius:22px;border:2px solid #e2e8f0;font-family:'Tajawal',sans-serif;font-size:.82rem;background:var(--card-bg);color:var(--text-primary)}
        .modal-timer{font-size:2rem;font-weight:900;color:var(--red);margin:10px 0}
        .modal-btn{padding:8px 18px;border-radius:22px;border:none;cursor:pointer;font-family:'Tajawal',sans-serif;font-size:.82rem;font-weight:700;margin:4px;transition:var(--transition)}
        .btn-primary{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#0e2a35}.btn-danger{background:linear-gradient(135deg,#ef4444,#dc2626);color:white}.btn-success{background:linear-gradient(135deg,#10b981,#059669);color:white}.btn-info{background:linear-gradient(135deg,#6366f1,#4f46e5);color:white}.btn-close{background:var(--dark);color:white}
        .quiz-q{text-align:right;margin:10px 0;padding:12px;background:#f8fafc;border-radius:var(--radius-sm)}
        .quiz-q .q-type-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.65rem;font-weight:600;margin-right:6px;background:#e2e8f0;color:#475569}
        .quiz-opt{display:block;width:100%;text-align:right;padding:9px 13px;margin:4px 0;border:2px solid #e2e8f0;border-radius:10px;background:transparent;cursor:pointer;font-family:'Tajawal',sans-serif;font-size:.85rem;transition:var(--transition)}
        .quiz-opt:hover{border-color:var(--gold);background:rgba(212,175,90,0.05)}.quiz-opt:disabled{pointer-events:none}
        .quiz-opt.correct{border-color:var(--green);background:#f0fdf4}.quiz-opt.wrong{border-color:var(--red);background:#fef2f2}
        .quiz-fb{margin-top:5px;font-weight:700;font-size:.82rem}.quiz-score{font-size:1.8rem;font-weight:900;color:var(--gold-dark);margin:12px 0}
        .def-input{width:100%;padding:10px;border-radius:12px;border:2px solid #e2e8f0;font-family:'Tajawal',sans-serif;font-size:.85rem;margin:5px 0;background:var(--card-bg);color:var(--text-primary)}
        .def-input.correct-input{border-color:var(--green);background:#f0fdf4}.def-input.wrong-input{border-color:var(--red);background:#fef2f2}

        .flashcard{width:100%;max-width:550px;min-height:300px;margin:15px auto;perspective:1000px;cursor:pointer}.flashcard-inner{position:relative;width:100%;height:100%;min-height:300px;transition:transform 0.6s;transform-style:preserve-3d}.flashcard.flipped .flashcard-inner{transform:rotateY(180deg)}.flashcard-front,.flashcard-back{position:absolute;width:100%;height:100%;min-height:300px;backface-visibility:hidden;border-radius:var(--radius-md);padding:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;font-size:0.95rem;line-height:1.8;overflow-y:auto}.flashcard-front{background:linear-gradient(135deg,#eff6ff,#dbeafe);color:var(--dark);border:2px solid var(--blue)}.flashcard-back{background:linear-gradient(135deg,#f0fdf4,#d1fae5);color:var(--dark);border:2px solid var(--green);transform:rotateY(180deg)}.flashcard-nav{display:flex;justify-content:center;gap:10px;margin-top:12px}
        .fc-label{font-size:0.7rem;color:var(--text-secondary);margin-bottom:5px;font-weight:600}.fc-content{font-weight:700;font-size:1rem}

        .dashboard-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:15px;margin:15px 0;text-align:right}@media(max-width:600px){.dashboard-grid{grid-template-columns:1fr}}
        .dashboard-card{background:var(--card-bg);border-radius:var(--radius-sm);padding:15px;border:1px solid var(--border-color)}.dashboard-card h4{color:var(--gold-dark);margin-bottom:8px;font-size:.9rem}.dashboard-card p{font-size:.8rem;color:var(--text-secondary);margin:3px 0}.dashboard-card .big-number{font-size:2rem;font-weight:900;color:var(--dark)}.chart-bar{height:20px;background:#e2e8f0;border-radius:10px;margin:5px 0;overflow:hidden}.chart-fill{height:100%;border-radius:10px;transition:width 0.5s ease}
        .achievements-grid{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:10px 0}.achievement-badge{padding:8px 14px;border-radius:25px;font-size:.75rem;font-weight:600;border:2px solid #e2e8f0;text-align:center;min-width:100px}.achievement-badge.unlocked{border-color:var(--gold);background:var(--gold-light);color:var(--gold-dark)}.achievement-badge.locked{opacity:.4}

        .challenge-participant .name { font-weight: 600; }

        .challenge-participant .status.completed { color: var(--green); font-size: 0.75rem; }

        @media print{.animated-bg,.progress-container,.back-to-top,.sidebar,.sidebar-toggle,.sidebar-overlay,.chapter-section,.category-tabs,.control-bar,.header-badge,.favorites-bar,.card-actions,.note-box,.footer,.stats-grid{display:none!important}body{background:white!important;color:black!important}.question-card{break-inside:avoid;border:1px solid #ccc!important;box-shadow:none!important}.container{max-width:100%!important;padding:0!important}.header{background:white!important;color:black!important;padding:10px!important;box-shadow:none!important}.header h1{color:black!important}}
        @media(max-width:768px){.header h1{font-size:1.3rem}.header{padding:15px 12px}.container{padding:0 10px}.chapter-btn{padding:6px 10px;font-size:.68rem}.category-btn{padding:6px 9px;font-size:.65rem}.back-to-top{bottom:18px;left:18px;width:40px;height:40px}.sidebar{width:260px}}

<div class="animated-bg"><div class="orb"></div><div class="orb"></div><div class="orb"></div></div>
<div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
<div class="sync-indicator" id="syncIndicator"><i class="fas fa-cloud"></i> <span>جاهز</span></div>

<header class="header">
    <div class="header-content">
        <h1><i class="fas fa-heartbeat"></i> Internal Medicine</h1>

        <div class="xp-bar-container"><span class="xp-label"><i class="fas fa-star"></i> XP: <span id="xpPoints">0</span></span><div class="xp-bar"><div class="xp-fill" id="xpFill" style="width:0%"></div></div><span class="level-badge level-bronze" id="levelBadge">🟤 مبتدئ</span></div>
        <div class="header-badge"><i class="fas fa-check-circle"></i> <span id="chapterCount">10</span> فصلاً مكتملاً | ترجمة وحلول كاملة</div>
        <div class="control-bar">
            <button class="control-btn" id="darkModeToggle"><i class="fas fa-moon"></i> ليلي</button>

            <button class="exam-btn" onclick="openExamGenerator()"><i class="fas fa-file-alt"></i> امتحان</button>
            <button class="leaderboard-btn" onclick="openLeaderboard()"><i class="fas fa-trophy"></i> المتصدرين</button>
            <button class="quiz-btn" onclick="openChallengeMode()"><i class="fas fa-handshake"></i> تحدي</button>

    <div class="favorites-bar" id="favoritesBar" style="display:none;"><button class="fav-filter-btn active" onclick="showAllQuestions()">📚 الكل</button><button class="fav-filter-btn" onclick="showFavorites()"><i class="fas fa-star"></i> المفضلة (<span id="favCount">0</span>)</button><button class="fav-filter-btn" onclick="showHardQuestions()"><i class="fas fa-exclamation-triangle"></i> الصعبة (<span id="hardCount">0</span>)</button></div>

<script>
// ====================== وضع التصحيح ======================
var DEBUG = true;
function debugLog() { if (DEBUG) { console.log.apply(console, arguments); } }
function debugError() { if (DEBUG) { console.error.apply(console, arguments); } }

// ==================== المتغيرات ====================
var chaptersData = {};
var availableChapters = ['chap1', 'chap2', 'chap3', 'chap4', 'chap5', 'chap6', 'chap7', 'chap8', 'chap9', 'chap10'];

// تحميل البيانات من الفصول
for (var i = 0; i < availableChapters.length; i++) {
    var key = availableChapters[i];
    try {
        if (window[key] !== undefined && window[key] !== null) {
            chaptersData[key] = window[key];
            debugLog('✅ تم تحميل: ' + key + ' - mcq:' + (chaptersData[key].mcq ? chaptersData[key].mcq.length : 0) + ' tf:' + (chaptersData[key].truefalse ? chaptersData[key].truefalse.length : 0));
        } else {
            debugLog('⚠️ ' + key + ' غير موجود');
            chaptersData[key] = { name: 'الفصل ' + (i + 1) + ' - طب الباطنة', icon: 'fas fa-book', mcq: [], truefalse: [], complete: [], explain: [], list: [], situations: [] };
        }
    } catch(e) {
        debugError('❌ خطأ في تحميل ' + key + ': ' + e.message);
        chaptersData[key] = { name: 'الفصل ' + (i + 1) + ' - طب الباطنة', icon: 'fas fa-book', mcq: [], truefalse: [], complete: [], explain: [], list: [], situations: [] };
    }
}

debugLog('📚 إجمالي الفصول: ' + Object.keys(chaptersData).length);

var currentChapterId = 'all';
var currentCategory = 'all';
var hideAnswers = false;
var bookmarks = new Set(JSON.parse(localStorage.getItem('nb_bookmarks_internal') || '[]'));
var hardQuestions = new Set(JSON.parse(localStorage.getItem('nb_hard_internal') || '[]'));
var notes = JSON.parse(localStorage.getItem('nb_notes_internal') || '{}');
var difficulties = JSON.parse(localStorage.getItem('nb_diff_internal') || '{}');
var quizHistory = JSON.parse(localStorage.getItem('nb_history_internal') || '[]');
var wrongQuestions = JSON.parse(localStorage.getItem('nb_wrong_internal') || '[]');
var xp = parseInt(localStorage.getItem('nb_xp_internal') || 0);
var achievements = JSON.parse(localStorage.getItem('nb_achievements_internal') || '[]');
var currentUser = null;
var leaderboardData = JSON.parse(localStorage.getItem('leaderboard_internal') || '[]');

var categoryMeta = [
    {id: 'mcq', icon: 'fas fa-tasks', label: 'اختيار متعدد', badge: 'badge-mcq'},
    {id: 'truefalse', icon: 'fas fa-check-double', label: 'صح وخطأ', badge: 'badge-tf'},
    {id: 'complete', icon: 'fas fa-pen', label: 'أكمل', badge: 'badge-complete'},
    {id: 'explain', icon: 'fas fa-comment-dots', label: 'اشرح', badge: 'badge-explain'},
    {id: 'list', icon: 'fas fa-list-ul', label: 'قوائم', badge: 'badge-list'},
    {id: 'situations', icon: 'fas fa-stethoscope', label: 'مواقف', badge: 'badge-situation'}
];
var testCategories = ['mcq', 'truefalse', 'complete', 'explain', 'list', 'situations'];
var API_BASE = '';
var isOnlineMode = false;

// ====================== دوال مساعدة ====================
function getFullAnswer(q) {
    var answerText = '';
    var answerTrans = '';
    
    if (q.cat === 'mcq') {
        answerText = q.correct || '';
        answerTrans = q.correctTranslation || q.answerTranslation || '';
    } else if (q.cat === 'truefalse') {
        var isTrue = (q.correct === true || q.correct === 'true' || q.correct === 'True');
        answerText = isTrue ? 'صواب (True)' : 'خطأ (False)';
        answerTrans = q.correctTranslation || q.answerTranslation || '';
    } else if (q.cat === 'complete') {
        answerText = q.completion || '';
        answerTrans = q.completionTranslation || q.answerTranslation || '';
    } else {
        answerText = q.answer || q.completion || '';
        answerTrans = q.answerTranslation || q.completionTranslation || '';
    }
    
    if (!answerTrans || answerTrans === q.translation || answerTrans === q.text || answerTrans.trim() === '') {
        answerTrans = '';
    }
    
    var result = answerText;
    if (answerTrans && answerTrans.trim() !== '') {
        result += ' - ' + answerTrans;
    }
    
    return result;
}

function getCorrectAnswerText(q) {
    // إرجاع نص الإجابة الصحيحة كاملاً (وليس مجرد رمز)
    if (q.cat === 'mcq') {
        return q.correct || '';
    } else if (q.cat === 'truefalse') {
        var isTrue = (q.correct === true || q.correct === 'true' || q.correct === 'True');
        return isTrue ? 'True (صواب)' : 'False (خطأ)';
    } else {
        return q.correct || q.completion || q.answer || '';
    }
}

function getFullQuestionText(q) {
    // إرجاع السؤال مع ترجمته للبطاقات
    var text = q.text || '';
    if (q.translation) {
        text += '\n\n' + q.translation;
    }
    return text;
}

function getFullAnswerText(q) {
    // إرجاع الإجابة الكاملة مع ترجمتها للبطاقات
    var answer = getCorrectAnswerText(q);
    var trans = q.correctTranslation || q.answerTranslation || q.completionTranslation || '';
    if (trans && trans !== q.translation && trans.trim() !== '') {
        answer += '\n\n' + trans;
    }
    return answer;
}

function getCategoryLabel(cat) { var m = {mcq:'اختيار', truefalse:'صح/خطأ', complete:'أكمل', explain:'اشرح', list:'قائمة', situations:'موقف'}; return m[cat] || cat; }
function getCategoryIcon(cat) { var icons = {mcq: 'fa-tasks', truefalse: 'fa-check-double', complete: 'fa-pen', explain: 'fa-comment-dots', list: 'fa-list-ul', situations: 'fa-stethoscope'}; return icons[cat] || 'fa-question'; }

function addXP(amount) { xp += amount; localStorage.setItem('nb_xp_internal', xp); updateXPDisplay(); checkAchievements(); }
function updateXPDisplay() {
    var level = getLevel(); var nextXP = getNextLevelXP(); var prevXP = getPrevLevelXP();
    var progress = Math.min(100, Math.round(((xp - prevXP) / (nextXP - prevXP)) * 100));
    document.getElementById('xpPoints').textContent = xp;
    document.getElementById('xpFill').style.width = progress + '%';
    var badge = document.getElementById('levelBadge');
    badge.textContent = level.icon + ' ' + level.name;
    badge.className = 'level-badge level-' + level.color;
}
function getLevel() { if (xp >= 5000) return {name: '💎 خبير', icon: '💎', color: 'diamond'}; if (xp >= 2000) return {name: '🥇 متقدم', icon: '🥇', color: 'gold'}; if (xp >= 500) return {name: '🥈 متوسط', icon: '🥈', color: 'silver'}; return {name: '🟤 مبتدئ', icon: '🟤', color: 'bronze'}; }
function getNextLevelXP() { if (xp < 500) return 500; if (xp < 2000) return 2000; if (xp < 5000) return 5000; return 10000; }
function getPrevLevelXP() { if (xp < 500) return 0; if (xp < 2000) return 500; if (xp < 5000) return 2000; return 5000; }

function showToast(message, type) { alert(message); }
function openModal(id, content) { 
    var modal = document.getElementById(id); 
    if (!modal) { modal = document.createElement('div'); modal.className = 'modal-overlay'; modal.id = id; document.body.appendChild(modal); } 
    modal.innerHTML = '<div class="modal-content">' + content + '</div>'; 
    modal.classList.add('active'); 
}
function closeModal(id) { var modal = document.getElementById(id); if (modal) { modal.classList.remove('active'); setTimeout(function() { if(modal) modal.remove(); }, 300); } }

// ====================== عرض الأسئلة ====================
function getQuestionsFor(chapterId, categoryId) {
    var questions = [];
    var chapters = chapterId === 'all' ? Object.keys(chaptersData) : [chapterId];
    for (var c = 0; c < chapters.length; c++) {
        var key = chapters[c];
        var ch = chaptersData[key];
        if (ch && ch[categoryId] && Array.isArray(ch[categoryId])) {
            for (var i = 0; i < ch[categoryId].length; i++) {
                var q = Object.assign({}, ch[categoryId][i]);
                q.chapterName = ch.name;
                q.questionId = key + '_' + categoryId + '_' + i;
                q.cat = categoryId;
                questions.push(q);
            }
        }
    }
    return questions;
}

function getAllQuestionsForTest(chapterId, categoryFilter) {
    chapterId = chapterId || 'all';
    categoryFilter = categoryFilter || 'all';
    var questions = [];
    var cats = categoryFilter === 'all' ? testCategories : [categoryFilter];
    var chapters = chapterId === 'all' ? Object.keys(chaptersData) : [chapterId];
    
    for (var c = 0; c < chapters.length; c++) {
        var key = chapters[c];
        var ch = chaptersData[key];
        if (!ch) continue;
        for (var t = 0; t < cats.length; t++) {
            var cat = cats[t];
            if (ch[cat] && Array.isArray(ch[cat])) {
                for (var i = 0; i < ch[cat].length; i++) {
                    var q = Object.assign({}, ch[cat][i]);
                    q.cat = cat;
                    q.chapterName = ch.name;
                    q.questionId = key + '_' + cat + '_' + i;
                    questions.push(q);
                }
            }
        }
    }
    debugLog('📝 أسئلة الاختبار: ' + questions.length + ' (فصل:' + chapterId + ', نوع:' + categoryFilter + ')');
    return questions;
}

function renderAllQuestions() {
    var wrapper = document.getElementById('questionsWrapper');
    wrapper.innerHTML = '';
    var cats = currentCategory === 'all' ? categoryMeta.map(function(c) { return c.id; }) : [currentCategory];
    var idx = 0;
    var total = 0;
    
    for (var c = 0; c < cats.length; c++) {
        var cid = cats[c];
        var qs = getQuestionsFor(currentChapterId, cid);
        if (qs.length === 0) continue;
        total += qs.length;
        
        var ci = categoryMeta.find(function(x) { return x.id === cid; });
        var sec = document.createElement('div');
        sec.className = 'questions-section';
        var html = '<div class="section-title"><i class="' + (ci ? ci.icon : 'fas fa-question') + '"></i> ' + (ci ? ci.label : cid) + ' <span class="section-count">' + qs.length + ' سؤال</span></div>';
        
        for (var i = 0; i < qs.length; i++) {
            idx++;
            html += renderCard(qs[i], cid, idx);
        }
        sec.innerHTML = html;
        wrapper.appendChild(sec);
    }
    
    if (total === 0) {
        wrapper.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><h3>لا توجد أسئلة في هذا القسم</h3></div>';
    }
    if (hideAnswers) applyHideAnswers();
    updateFavCount();
    updateHardCount();
    updateRetryButton();
}

function renderCard(q, cat, idx) {
    var ci = categoryMeta.find(function(x) { return x.id === cat; });
    var badgeClass = ci ? ci.badge : 'badge-def';
    var label = ci ? ci.label : '';
    var icon = ci ? ci.icon : 'fa-question';
    var qId = 'q-' + idx;
    var isBookmarked = bookmarks.has(qId);
    var isHard = hardQuestions.has(qId);
    var diff = difficulties[qId] || '';
    var note = notes[qId] || '';
    
    var h = '<div class="question-card" id="' + qId + '">';
    h += '<div class="question-header"><span class="question-badge ' + badgeClass + '"><i class="fas ' + icon + '"></i> ' + label + '</span>';
    h += '<span class="question-number">#' + idx + ' | ' + (q.chapterName || '') + '</span>';
    if (diff) {
        h += '<span class="difficulty-badge diff-' + diff + '" onclick="cycleDifficulty(\'' + qId + '\')">' + (diff === 'easy' ? '🟢' : diff === 'medium' ? '🟡' : '🔴') + '</span>';
    } else {
        h += '<span class="difficulty-badge" onclick="cycleDifficulty(\'' + qId + '\')" style="cursor:pointer;opacity:0.4;">⚪</span>';
    }
    h += '<div class="card-actions"><button class="action-btn" onclick="copyQuestion(\'' + qId + '\')"><i class="fas fa-copy"></i></button>';
    h += '<button class="action-btn ' + (isBookmarked ? 'bookmarked' : '') + '" onclick="toggleBookmark(\'' + qId + '\',this)"><i class="fas fa-star"></i></button>';
    h += '<button class="action-btn ' + (isHard ? 'hard-marked' : '') + '" onclick="toggleHard(\'' + qId + '\',this)"><i class="fas fa-exclamation-triangle"></i></button></div></div>';
    h += '<div class="question-content"><div class="question-text"><i class="fas fa-question-circle"></i> ' + q.text + '</div>';
    if (q.translation) h += '<div class="translation-box"><i class="fas fa-language"></i> ' + q.translation + '</div>';
    
    if (cat === 'mcq' && q.options) {
        h += '<div class="options-list">';
        for (var o = 0; o < q.options.length; o++) {
            var opt = q.options[o];
            var isCorrect = (opt === q.correct || opt.startsWith(q.correct + ')') || opt.startsWith(q.correct + ' '));
            h += '<li style="' + (isCorrect ? 'font-weight:700;color:#166534;background:#f0fdf4;padding:6px 12px;border-radius:10px;' : '') + '">' + opt + (isCorrect ? ' ✅' : '') + '</li>';
        }
        h += '</div>';
        h += '<div class="answer-box"><strong>✅ الإجابة: ' + (q.correct || '') + '</strong></div>';
        var mcqAnswerTrans = q.correctTranslation || q.answerTranslation || '';
        if (mcqAnswerTrans && mcqAnswerTrans !== q.translation && mcqAnswerTrans !== q.text && mcqAnswerTrans.trim() !== '') {
            h += '<div class="answer-translation"><i class="fas fa-language"></i> ' + mcqAnswerTrans + '</div>';
        }
    } else if (cat === 'truefalse') {
        var cv = q.correct;
        var sv = String(cv).toLowerCase().replace(/['"]/g, '').trim();
        var isTrue = (sv === 'true' || cv === true || cv === 1);
        var extraClass = isTrue ? '' : ' false-answer';
        h += '<div class="answer-box' + extraClass + '"><strong>' + getFullAnswer(q) + '</strong></div>';
    } else if (q.completion) {
        h += '<div class="answer-box"><strong>📝 ' + getFullAnswer(q) + '</strong></div>';
    } else if (q.answer) {
        h += '<div class="answer-box"><strong>📝 ' + getFullAnswer(q) + '</strong></div>';
    } else if (q.items) {
        h += '<div class="list-items-box"><ul>';
        for (var i = 0; i < q.items.length; i++) { h += '<li>' + q.items[i] + '</li>'; }
        h += '</ul></div>';
    }
    h += '<div class="note-box"><textarea class="note-input" placeholder="📝 ملاحظة..." onchange="saveNote(\'' + qId + '\',this.value)">' + note + '</textarea></div></div></div>';
    return h;
}

// ====================== وظائف الأخطاء ====================
function addWrongQuestion(q) { 
    var wrongEntry = { questionId: q.questionId, text: q.text, correct: q.correct || q.completion || q.answer || '', chapter: q.chapterName || '', cat: q.cat || '', date: new Date().toISOString() }; 
    var exists = wrongQuestions.some(function(w) { return w.questionId === q.questionId; }); 
    if (!exists) { wrongQuestions.push(wrongEntry); localStorage.setItem('nb_wrong_internal', JSON.stringify(wrongQuestions)); updateRetryButton(); } 
}
function removeWrongQuestion(questionId) { wrongQuestions = wrongQuestions.filter(function(w) { return w.questionId !== questionId; }); localStorage.setItem('nb_wrong_internal', JSON.stringify(wrongQuestions)); updateRetryButton(); }
function updateRetryButton() { 
    var btn = document.getElementById('retryWrongBtn'); 
    if (btn) { var count = wrongQuestions.length; btn.style.display = count > 0 ? 'inline-flex' : 'none'; btn.innerHTML = '<i class="fas fa-redo"></i> تحدي الأخطاء (' + count + ')'; } 
}
function clearAllWrongQuestions() { 
    if (wrongQuestions.length === 0) { showToast('🎉 لا توجد أسئلة خاطئة!', 'success'); return; } 
    if (confirm('⚠️ هل أنت متأكد من مسح جميع الأسئلة الخاطئة؟')) { 
        wrongQuestions = []; localStorage.setItem('nb_wrong_internal', JSON.stringify(wrongQuestions)); 
        updateRetryButton(); renderAllQuestions(); closeModal('retryModal'); 
        showToast('🎉 تم مسح جميع الأسئلة الخاطئة بنجاح!', 'success'); 
    } 
}

// ====================== تحدي الأخطاء ====================
function retryWrongQuestions() {
    if (wrongQuestions.length === 0) { showToast('🎉 لا توجد أسئلة خاطئة!', 'success'); return; }
    var allQ = []; var uniqueIds = new Set();
    for (var w = 0; w < wrongQuestions.length; w++) { 
        var wrong = wrongQuestions[w]; 
        if (!wrong.questionId || uniqueIds.has(wrong.questionId)) continue; 
        uniqueIds.add(wrong.questionId); 
        var parts = wrong.questionId.split('_'); 
        if (parts.length === 3) { 
            var chKey = parts[0]; var cat = parts[1]; var idx = parseInt(parts[2]); 
            var ch = chaptersData[chKey]; 
            if (ch && ch[cat] && Array.isArray(ch[cat]) && ch[cat][idx]) { 
                var q = Object.assign({}, ch[cat][idx]);
                q.cat = cat; q.chapterName = ch.name; q.questionId = wrong.questionId; 
                allQ.push(q); 
            } 
        } 
    }
    if (allQ.length === 0) { showToast('⚠️ لم يتم العثور على الأسئلة الخاطئة.', 'warning'); return; }
    allQ = allQ.sort(function() { return Math.random() - 0.5; });
    window._currentQuestions = allQ;
    var h = '<h2>🔄 تحدي الأخطاء (' + allQ.length + ' سؤال)</h2>';
    h += '<div style="margin-bottom:10px;font-size:0.85rem;color:var(--text-secondary);">⚠️ قم بحل جميع الأسئلة لمسح الأخطاء تلقائياً</div>';
    h += '<div style="display:flex;gap:10px;justify-content:center;margin-bottom:15px;flex-wrap:wrap;">';
    h += '<button class="modal-btn btn-danger" onclick="clearAllWrongQuestions()"><i class="fas fa-trash"></i> 🗑️ مسح جميع الأخطاء مباشرة</button>';
    h += '</div>';
    h += '<div id="rwQuestions"></div><div id="rwScore"></div>';
    h += '<div style="display:flex;gap:10px;justify-content:center;margin-top:15px;flex-wrap:wrap;">';
    h += '<button class="modal-btn btn-close" onclick="closeModal(\'retryModal\')">إغلاق</button></div>';
    openModal('retryModal', h);
    var qHTML = ''; 
    for (var i = 0; i < allQ.length; i++) { qHTML += renderQuestionHTML(allQ[i], i, 'Retry', allQ.length); }
    document.getElementById('rwQuestions').innerHTML = qHTML;
    window._retryTotal = allQ.length;
    window._retryScores = {};
}

// ====================== عرض سؤال الاختبار ====================
function renderQuestionHTML(q, i, prefix, total) {
    var catLabel = getCategoryLabel(q.cat);
    var catIcon = getCategoryIcon(q.cat);
    var h = '<div class="quiz-q"><strong>' + (i+1) + '. ' + q.text + '</strong> <span class="q-type-badge"><i class="fas ' + catIcon + '"></i> ' + catLabel + '</span>';
    if (q.translation) { h += '<div class="translation-box" style="margin-top:5px;"><i class="fas fa-language"></i> ' + q.translation + '</div>'; }
    
    if (q.cat === 'mcq' && q.options) {
        for (var o = 0; o < q.options.length; o++) {
            var opt = q.options[o];
            var escapedOpt = opt.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '&quot;');
            var escapedCorrect = (q.correct || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '&quot;');
            h += '<button class="quiz-opt" onclick="checkAnswer(this,\'' + escapedOpt + '\',\'' + escapedCorrect + '\',' + i + ',' + total + ',\'' + prefix + '\')">' + opt + '</button>';
        }
    } else if (q.cat === 'truefalse') {
        var escapedCorrect = String(q.correct).replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '&quot;');
        h += '<button class="quiz-opt" onclick="checkAnswer(this,\'true\',\'' + escapedCorrect + '\',' + i + ',' + total + ',\'' + prefix + '\')">✅ صواب (True)</button>';
        h += '<button class="quiz-opt" onclick="checkAnswer(this,\'false\',\'' + escapedCorrect + '\',' + i + ',' + total + ',\'' + prefix + '\')">❌ خطأ (False)</button>';
    } else {
        var escapedAnswer = (q.completion || q.answer || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '&quot;');
        h += '<textarea class="def-input" id="' + prefix + '-other-' + i + '" placeholder="اكتب إجابتك هنا..." style="min-height:60px;"></textarea>';
        h += '<button class="modal-btn btn-primary" onclick="checkOtherAnswer(' + i + ',\'' + escapedAnswer + '\',' + total + ',\'' + prefix + '\')">تحقق</button>';
    }
    h += '<div class="quiz-fb" id="' + prefix + '-fb-' + i + '"></div></div>';
    return h;
}

// ====================== دوال الإجابة الموحدة ====================
function checkAnswer(btn, chosen, correct, i, total, prefix) {
    var parent = btn.parentElement;
    parent.querySelectorAll('.quiz-opt').forEach(function(b) { b.disabled = true; });
    var isCorrect = isAnswerCorrect(chosen, correct);
    btn.classList.add(isCorrect ? 'correct' : 'wrong');
    
    // تخزين النتيجة
    var scoresVar = '_' + prefix.toLowerCase() + 'Scores';
    if (!window[scoresVar]) window[scoresVar] = {};
    window[scoresVar][i] = isCorrect;
    
    var questionObj = window['_currentQuestions'] ? window['_currentQuestions'][i] : null;
    if (!isCorrect && questionObj) { addWrongQuestion(questionObj); } 
    else if (isCorrect && questionObj) { removeWrongQuestion(questionObj.questionId); }
    
    var fb = document.getElementById(prefix + '-fb-' + i);
    if (fb) { 
        var correctDisplay = getCorrectAnswerText(questionObj || {cat: 'mcq', correct: correct});
        fb.innerHTML = isCorrect ? '✅ <span style="color:#059669;">صحيح! أحسنت</span>' : '❌ <span style="color:#dc2626;">خطأ!</span> الإجابة الصحيحة: <span style="color:#059669;font-weight:700;">' + correctDisplay + '</span>';
    }
    
    if (isCorrect) addXP(5);
    checkQuizComplete(prefix, total);
}

function checkOtherAnswer(i, correctText, total, prefix) {
    var input = document.getElementById(prefix + '-other-' + i);
    if (!input || input.disabled) return;
    var isCorrect = checkDefinitionAnswer(input.value, correctText);
    input.classList.add(isCorrect ? 'correct-input' : 'wrong-input');
    input.disabled = true;
    
    var scoresVar = '_' + prefix.toLowerCase() + 'Scores';
    if (!window[scoresVar]) window[scoresVar] = {};
    window[scoresVar][i] = isCorrect;
    
    var questionObj = window['_currentQuestions'] ? window['_currentQuestions'][i] : null;
    if (!isCorrect && questionObj) { addWrongQuestion(questionObj); } 
    else if (isCorrect && questionObj) { removeWrongQuestion(questionObj.questionId); }
    
    var fb = document.getElementById(prefix + '-fb-' + i);
    if (fb) { 
        fb.innerHTML = isCorrect ? '✅ <span style="color:#059669;">صحيح! أحسنت</span>' : '❌ <span style="color:#dc2626;">خطأ!</span> الإجابة الصحيحة: <span style="color:#059669;font-weight:700;">' + correctText + '</span>';
    }
    
    if (isCorrect) addXP(8);
    checkQuizComplete(prefix, total);
}

function checkQuizComplete(prefix, total) {
    var scoresVar = '_' + prefix.toLowerCase() + 'Scores';
    var sObj = window[scoresVar] || {};
    if (Object.keys(sObj).length >= total) {
        var cc = Object.values(sObj).filter(function(v) { return v === true; }).length;
        var sc = Math.round(cc / total * 100);
        var scoreElId = prefix === 'Study' ? 'smScore' : prefix === 'Timed' ? 'qtScore' : prefix === 'Retry' ? 'rwScore' : prefix === 'Challenge' ? 'challengeScore' : '';
        var el = document.getElementById(scoreElId);
        if (el) { 
            el.innerHTML = '<div class="quiz-score">النتيجة: ' + cc + '/' + total + ' (' + sc + '%)</div>'; 
        }
        saveQuizHistory(total, cc, sc);
        if (sc >= 80) spawnConfetti();
        if (sc === 100 && prefix === 'Retry') {
            var clearBtn = document.createElement('button');
            clearBtn.className = 'modal-btn btn-success';
            clearBtn.innerHTML = '✅ تهانينا! مسح قائمة الأخطاء';
            clearBtn.onclick = clearAllWrongQuestions;
            if (el) el.appendChild(clearBtn);
        }
    }
}

function isAnswerCorrect(chosen, correct) {
    if (!chosen || !correct) return false;
    var c = String(chosen).trim();
    var a = String(correct).trim();
    if (c === a) return true;
    if (c.startsWith(a + ')') || c.startsWith(a + ' ')) return true;
    if (a.startsWith(c + ')') || a.startsWith(c + ' ')) return true;
    var cl = c.toLowerCase(); var al = a.toLowerCase();
    if (cl === al) return true;
    if ((cl === 'true' || cl === 'صواب') && (al === 'true' || al === 'صواب')) return true;
    if ((cl === 'false' || cl === 'خطأ') && (al === 'false' || al === 'خطأ')) return true;
    return false;
}

function checkDefinitionAnswer(userText, correctText) {
    var u = userText.toLowerCase().trim().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g, '').split(/\s+/).filter(function(w) { return w.length > 2; });
    var c = correctText.toLowerCase().trim().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g, '').split(/\s+/).filter(function(w) { return w.length > 2; });
    if (u.length === 0 || c.length === 0) return false;
    var matches = 0; var cSet = new Set(c);
    u.forEach(function(w) { if (cSet.has(w)) matches++; });
    return (matches / Math.max(c.length, 1)) >= 0.5;
}

function saveQuizHistory(total, correct, score) {
    var entry = { date: new Date().toISOString(), total: total || 0, correct: correct || 0, score: score || 0 };
    quizHistory.push(entry);
    localStorage.setItem('nb_history_internal', JSON.stringify(quizHistory.slice(-50)));
    updateStats();
}

function startTimedQuiz() {
    var chId = document.getElementById('qtChapter')?.value || 'all';
    var catFilter = document.getElementById('qtCategory')?.value || 'all';
    var count = parseInt(document.getElementById('qtCount')?.value || 20);
    var mins = parseInt(document.getElementById('qtTime')?.value || 15);
    debugLog('بدء الاختبار - فصل:' + chId + ', نوع:' + catFilter + ', عدد:' + count + ', وقت:' + mins);
    
    var allQ = getAllQuestionsForTest(chId, catFilter);
    allQ = allQ.sort(function() { return Math.random() - 0.5; }).slice(0, Math.min(count, allQ.length));
    debugLog('أسئلة الاختبار المختارة: ' + allQ.length);
    
    if (allQ.length === 0) {
        showToast('❌ لا توجد أسئلة متاحة لهذا الاختيار', 'error');
        return;
    }
    
    window._currentQuestions = allQ;
    window._qtScores = {};
    qtLeft = mins * 60;
    
    var qHTML = '<div class="modal-timer" id="qtTimerDisplay">' + formatTime(qtLeft) + '</div>';
    for (var i = 0; i < allQ.length; i++) { qHTML += renderQuestionHTML(allQ[i], i, 'Timed', allQ.length); }
    
    var modal = document.getElementById('timedQuizModal');

    }
    
    if (qtTimer) clearInterval(qtTimer);
    qtTimer = setInterval(function() { 
        qtLeft--; 
        var td = document.getElementById('qtTimerDisplay'); 
        if (td) td.textContent = formatTime(qtLeft); 
        if (qtLeft <= 0) { clearInterval(qtTimer); finishTimedQuiz(); } 
    }, 1000);
}

function finishTimedQuiz() {
    var sObj = window._qtScores || {};
    var total = window._currentQuestions ? window._currentQuestions.length : 0;
    var cc = Object.values(sObj).filter(function(v) { return v === true; }).length;
    var sc = total > 0 ? Math.round(cc / total * 100) : 0;
    var el = document.getElementById('qtScore');
    if (el) el.innerHTML = '<div class="quiz-score">⏰ انتهى الوقت! النتيجة: ' + cc + '/' + total + ' (' + sc + '%)</div>';
    saveQuizHistory(total, cc, sc);
    updateRetryButton();
}

function formatTime(seconds) { var m = Math.floor(seconds / 60); var sec = seconds % 60; return (m < 10 ? '0' : '') + m + ':' + (sec < 10 ? '0' : '') + sec; }

        h += '<div class="fc-content">' + q.translation + '</div>'; 
    }
    if (q.cat === 'mcq' && q.options) {
        h += '<div style="margin-top:15px;text-align:right;width:100%;"><div class="fc-label">الخيارات:</div>';
        for (var o = 0; o < q.options.length; o++) { h += '<div style="font-size:0.85rem;padding:3px 0;">' + q.options[o] + '</div>'; }
        h += '</div>';
    }
    return h; 
}

function getFlashcardBack(q) { 
    var h = '<div class="fc-label">✅ الإجابة الصحيحة (English):</div>'; 
    h += '<div class="fc-content" style="font-size:1.2rem;color:#059669;margin:10px 0;">' + getCorrectAnswerText(q) + '</div>';
    var trans = q.correctTranslation || q.answerTranslation || q.completionTranslation || '';

        h += '<div class="fc-content">' + trans + '</div>';

        h += '<div style="margin-top:15px;text-align:right;width:100%;"><div class="fc-label">جميع الخيارات:</div>';
        for (var o = 0; o < q.options.length; o++) {

}
function prevAIFC() { window._aiFcI = Math.max(0, (window._aiFcI || 0) - 1); renderAIFC(); }
function nextAIFC() { window._aiFcI = Math.min((window._aiFcQ || []).length - 1, (window._aiFcI || 0) + 1); renderAIFC(); }

// ====================== باقي الدوال ====================
function applyHideAnswers() { document.querySelectorAll('.question-card').forEach(function(c) { c.classList.add('hide-answers'); }); }
function removeHideAnswers() { document.querySelectorAll('.question-card').forEach(function(c) { c.classList.remove('hide-answers'); }); }
function toggleBookmark(qId, btn) { if (bookmarks.has(qId)) { bookmarks.delete(qId); btn.classList.remove('bookmarked'); } else { bookmarks.add(qId); btn.classList.add('bookmarked'); } localStorage.setItem('nb_bookmarks_internal', JSON.stringify([...bookmarks])); updateFavCount(); }
function updateFavCount() { document.getElementById('favCount').textContent = bookmarks.size; document.getElementById('favoritesBar').style.display = (bookmarks.size + hardQuestions.size) > 0 ? 'flex' : 'none'; }
function showFavorites() { document.querySelectorAll('.question-card').forEach(function(c) { c.style.display = bookmarks.has(c.id) ? 'block' : 'none'; }); }
function showAllQuestions() { document.querySelectorAll('.question-card').forEach(function(c) { c.style.display = 'block'; }); }
function toggleHard(qId, btn) { if (hardQuestions.has(qId)) { hardQuestions.delete(qId); btn.classList.remove('hard-marked'); } else { hardQuestions.add(qId); btn.classList.add('hard-marked'); } localStorage.setItem('nb_hard_internal', JSON.stringify([...hardQuestions])); updateHardCount(); }
function updateHardCount() { document.getElementById('hardCount').textContent = hardQuestions.size; document.getElementById('favoritesBar').style.display = (bookmarks.size + hardQuestions.size) > 0 ? 'flex' : 'none'; }
function showHardQuestions() { document.querySelectorAll('.question-card').forEach(function(c) { c.style.display = hardQuestions.has(c.id) ? 'block' : 'none'; }); }
function saveNote(qId, note) { notes[qId] = note; localStorage.setItem('nb_notes_internal', JSON.stringify(notes)); }
function cycleDifficulty(qId) { var current = difficulties[qId] || ''; var newDiff = current === 'easy' ? 'medium' : current === 'medium' ? 'hard' : 'easy'; difficulties[qId] = newDiff; localStorage.setItem('nb_diff_internal', JSON.stringify(difficulties)); renderAllQuestions(); }
function copyQuestion(qId) { var card = document.getElementById(qId); if (!card) return; var text = card.querySelector('.question-text')?.textContent?.trim() || ''; var trans = card.querySelector('.translation-box')?.textContent?.trim() || ''; navigator.clipboard.writeText(text + '\n' + trans); }
function updateStats() { 
    var total = 0; 
    for (var key in chaptersData) { 
        if (chaptersData.hasOwnProperty(key)) { 
            var ch = chaptersData[key]; 
            for (var k in ch) { if (ch.hasOwnProperty(k) && k !== 'name' && k !== 'icon' && Array.isArray(ch[k])) { total += ch[k].length; } } 
        } 
    } 
    document.getElementById('chapterCount').textContent = Object.keys(chaptersData).length; 
    document.getElementById('statsGrid').innerHTML = '<div class="stat-card"><div class="icon-wrap"><i class="fas fa-question-circle"></i></div><div class="number">' + total + '</div><div class="label">إجمالي الأسئلة</div></div><div class="stat-card"><div class="icon-wrap"><i class="fas fa-book-open"></i></div><div class="number">' + Object.keys(chaptersData).length + '</div><div class="label">الفصول</div></div><div class="stat-card"><div class="icon-wrap"><i class="fas fa-layer-group"></i></div><div class="number">6</div><div class="label">أنواع الأسئلة</div></div><div class="stat-card"><div class="icon-wrap"><i class="fas fa-star"></i></div><div class="number">' + xp + '</div><div class="label">نقاط الخبرة</div></div>'; 
}
function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('sidebarOverlay').classList.toggle('active'); }
function navigateSidebar(chapter, category) { currentChapterId = chapter; currentCategory = category; renderChapterButtons(); renderCategoryTabs(); renderAllQuestions(); buildSidebar(); document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('active'); }
function buildSidebar() { 
    var chaptersHtml = ''; 
    for (var id in chaptersData) { 
        if (chaptersData.hasOwnProperty(id)) { 
            chaptersHtml += '<button class="side-chapter ' + (currentChapterId === id ? 'active' : '') + '" onclick="navigateSidebar(\'' + id + '\',\'all\')"><i class="' + chaptersData[id].icon + '"></i> ' + chaptersData[id].name.split(':')[0] + '</button>'; 
        } 
    } 
    document.getElementById('sidebarChapters').innerHTML = chaptersHtml; 
    var catsHtml = ''; 
    for (var i = 0; i < categoryMeta.length; i++) { 
        catsHtml += '<button class="side-category ' + (currentCategory === categoryMeta[i].id ? 'active' : '') + '" onclick="navigateSidebar(\'' + currentChapterId + '\',\'' + categoryMeta[i].id + '\')"><i class="' + categoryMeta[i].icon + '"></i> ' + categoryMeta[i].label + '</button>'; 
    } 
    document.getElementById('sidebarCategories').innerHTML = catsHtml; 
}
function renderChapterButtons() { 
    var html = '<button class="chapter-btn ' + (currentChapterId === 'all' ? 'active' : '') + '" onclick="navigateSidebar(\'all\',\'all\')"><i class="fas fa-globe"></i> الكل</button>'; 
    for (var id in chaptersData) { 
        if (chaptersData.hasOwnProperty(id)) { 
            html += '<button class="chapter-btn ' + (currentChapterId === id ? 'active' : '') + '" onclick="navigateSidebar(\'' + id + '\',\'all\')"><i class="' + chaptersData[id].icon + '"></i> ' + chaptersData[id].name.split(':')[0] + '</button>'; 
        } 
    } 
    document.getElementById('chapterSelector').innerHTML = html; 
}
function renderCategoryTabs() { 
    var html = '<button class="category-btn ' + (currentCategory === 'all' ? 'active' : '') + '" onclick="navigateSidebar(\'' + currentChapterId + '\',\'all\')"><i class="fas fa-border-all"></i> الكل</button>'; 
    for (var i = 0; i < categoryMeta.length; i++) { 
        var count = getQuestionsFor(currentChapterId, categoryMeta[i].id).length; 
        html += '<button class="category-btn ' + (currentCategory === categoryMeta[i].id ? 'active' : '') + '" onclick="navigateSidebar(\'' + currentChapterId + '\',\'' + categoryMeta[i].id + '\')"><i class="' + categoryMeta[i].icon + '"></i> ' + categoryMeta[i].label + ' <span class="count">' + count + '</span></button>'; 
    } 
    document.getElementById('categoryTabs').innerHTML = html; 
}

function spawnConfetti() { 
    var colors = ['#d4af5a', '#ef4444', '#3b82f6', '#10b981', '#f59e0b', '#8b5cf6']; 
    for (var i = 0; i < 40; i++) { 
        var p = document.createElement('div'); p.className = 'confetti-piece'; 
        p.style.left = Math.random() * 100 + '%'; p.style.animationDelay = Math.random() * 2 + 's'; 
        p.style.animationDuration = (2 + Math.random() * 3) + 's'; 
        p.style.width = (7 + Math.random() * 9) + 'px'; p.style.height = (7 + Math.random() * 9) + 'px'; 
        p.style.background = colors[Math.floor(Math.random() * colors.length)]; 
        document.body.appendChild(p); setTimeout(function() { p.remove(); }, 5000); 
    } 
}

var allAchievements = [];
function getTotalQuestionsSolved() { return quizHistory.reduce(function(s, h) { return s + (h.total || 0); }, 0); }
function openDashboard() { showToast('لوحة التحكم - XP: ' + xp + ' | أسئلة: ' + getTotalQuestionsSolved()); }

// ====================== تهيئة الصفحة ====================
function initPage() {
    updateStats(); updateXPDisplay(); renderChapterButtons(); renderCategoryTabs(); renderAllQuestions(); buildSidebar();
    updateFavCount(); updateHardCount(); updateRetryButton();
    
    document.getElementById('darkModeToggle').addEventListener('click', function() {
        document.body.classList.toggle('dark-mode');
        this.innerHTML = document.body.classList.contains('dark-mode') ? '<i class="fas fa-sun"></i> نهاري' : '<i class="fas fa-moon"></i> ليلي';
    });
    
    document.getElementById('hideAnswersToggle').addEventListener('click', function() {
        hideAnswers = !hideAnswers;
        if (hideAnswers) { applyHideAnswers(); this.innerHTML = '<i class="fas fa-eye"></i> إظهار'; } 
        else { removeHideAnswers(); this.innerHTML = '<i class="fas fa-eye-slash"></i> إخفاء'; }
    });
    
    window.addEventListener('scroll', function() {
        var btn = document.getElementById('backToTop');
        if (window.scrollY > 400) { btn.classList.add('visible'); } else { btn.classList.remove('visible'); }
        document.getElementById('progressBar').style.width = Math.min(100, (window.scrollY / (document.documentElement.scrollHeight - window.innerHeight) * 100)) + '%';
    });
    
    document.getElementById('backToTop').addEventListener('click', function() { window.scrollTo({top: 0, behavior: 'smooth'}); });
}

document.addEventListener('DOMContentLoaded', function() {
    currentUser = { fullName: 'طالب', username: 'student' };
    initPage();
});
