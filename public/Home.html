<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>نتايج الطلاب - معهد رعاية الضبعية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="/logo.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #f0f4f8 0%, #e2e8f0 100%);
            color: #1e293b;
            min-height: 100vh;
            padding-bottom: 85px;
        }

        /* ========== الهيدر ========== */
        .main-header {
            background: linear-gradient(135deg, #0f2b3d, #1a4f6e);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-bottom: 3px solid #c4a35a;
        }

        .logo {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 2px solid #c4a35a;
            padding: 3px;
            background: white;
        }

        .main-header h1 {
            font-size: 0.95rem;
            color: #c4a35a;
            font-weight: 700;
        }

        .logout-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 6px 16px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.7rem;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .logout-btn:hover {
            background: #c4a35a;
            color: #0f2b3d;
            transform: translateY(-2px);
        }

        /* ========== الحاوية الرئيسية ========== */
        .main-container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 16px;
        }

        .result-form-container {
            background: white;
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            border: 1px solid #e2e8f0;
        }

        .welcome-message {
            background: #e8f0f6;
            border-radius: 16px;
            padding: 12px 16px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 600;
            font-size: 0.85rem;
            color: #1a4f6e;
            border-right: 4px solid #c4a35a;
        }

        /* ========== العناوين ========== */
        .section-title {
            font-size: 1.15rem;
            font-weight: 700;
            color: #0f2b3d;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 3px solid #c4a35a;
            display: inline-block;
        }

        .subsection-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: #1a4f6e;
            margin: 20px 0 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-right: 3px solid #c4a35a;
            padding-right: 10px;
        }

        /* ========== الحقول ========== */
        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: #334155;
            font-size: 0.8rem;
        }

        .input-group label i {
            color: #c4a35a;
            margin-left: 6px;
        }

        .input-group input {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #e2e8f0;
            border-radius: 14px;
            font-family: inherit;
            font-size: 0.85rem;
            transition: all 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #c4a35a;
            box-shadow: 0 0 0 3px rgba(196,163,90,0.15);
        }

        .submit-btn {
            background: linear-gradient(135deg, #c4a35a, #a07d3a);
            color: #0f2b3d;
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s;
            margin-top: 5px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.02);
        }

        /* ========== بطاقات النتيجة (بديل الجدول) ========== */
        .result-card {
            background: white;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            overflow: hidden;
            margin-top: 20px;
        }

        .result-header {
            background: linear-gradient(135deg, #1a4f6e, #0d3b54);
            color: white;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .result-header span {
            font-size: 0.85rem;
        }

        .result-header strong {
            color: #c4a35a;
        }

        .result-body {
            padding: 16px;
        }

        .info-row {
            background: #f8fafc;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .info-label {
            font-weight: 700;
            color: #1a4f6e;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .info-value {
            font-weight: 500;
            color: #334155;
        }

        .subjects-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .subject-item {
            background: #f8fafc;
            border-radius: 12px;
            padding: 10px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .subject-name {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            color: #334155;
            font-size: 0.85rem;
        }

        .subject-name i {
            color: #c4a35a;
            width: 20px;
        }

        .subject-grade {
            background: #e8f0f6;
            padding: 4px 12px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.8rem;
            color: #1a4f6e;
        }

        .extra-subject-item {
            background: #faf6ed;
            border-right: 3px solid #c4a35a;
        }

        .total-percentage {
            background: linear-gradient(135deg, #1a4f6e, #0d3b54);
            color: white;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            margin-top: 12px;
        }

        .total-percentage span {
            font-size: 1.1rem;
            font-weight: 700;
            display: inline-block;
            margin: 0 5px;
        }

        .percentage-excellent { background: #1a4f6e; color: #c4a35a; }
        .percentage-passed { background: #2d6a4f; color: white; }
        .percentage-failed { background: #b91c1c; color: white; }

        /* ========== بطاقات الإشعارات والمخالفات ========== */
        .notifications-section, .violations-section {
            margin-top: 24px;
            background: white;
            border-radius: 20px;
            padding: 16px;
            border: 1px solid #e2e8f0;
        }

        .notification-item, .violation-item {
            background: #f8fafc;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .notification-text {
            flex: 2;
            font-size: 0.8rem;
            color: #334155;
        }

        .notification-date {
            font-size: 0.7rem;
            color: #64748b;
        }

        .violation-type {
            font-weight: 700;
            font-size: 0.75rem;
            padding: 3px 10px;
            border-radius: 50px;
        }

        .violation-type.warning {
            background: #fef3c7;
            color: #d97706;
        }

        .violation-type.violation {
            background: #fee2e2;
            color: #b91c1c;
        }

        .violation-reason {
            font-size: 0.8rem;
            color: #334155;
            flex: 2;
        }

        .violation-penalty {
            font-size: 0.75rem;
            background: #e2e8f0;
            padding: 3px 10px;
            border-radius: 50px;
        }

        /* ========== الناف بار ========== */
        .nav-bar {
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(12px);
            border-radius: 50px;
            margin: 0 auto 12px auto;
            padding: 8px 16px;
            display: flex;
            justify-content: center;
            gap: 8px;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.12);
            border: 1px solid rgba(196,163,90,0.3);
            width: fit-content;
            max-width: 95%;
        }

        .nav-bar a {
            text-decoration: none;
            color: #64748b;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 0.6rem;
            transition: all 0.3s;
        }

        .nav-bar a i {
            font-size: 1rem;
        }

        .nav-bar a:hover {
            color: #c4a35a;
            background: #faf6ed;
            transform: translateY(-2px);
        }

        /* ========== حالة عدم وجود بيانات ========== */
        .empty-state {
            text-align: center;
            padding: 30px 16px;
            background: #f8fafc;
            border-radius: 16px;
            color: #64748b;
        }

        .empty-state i {
            font-size: 2rem;
            color: #cbd5e1;
            margin-bottom: 10px;
            display: block;
        }

        /* ========== التجاوب ========== */
        @media (max-width: 640px) {
            .main-header {
                flex-direction: column;
                text-align: center;
            }
            
            .result-header {
                flex-direction: column;
                text-align: center;
            }
            
            .info-row {
                flex-direction: column;
                text-align: center;
            }
            
            .subject-item {
                flex-direction: column;
                text-align: center;
            }
            
            .notification-item, .violation-item {
                flex-direction: column;
                text-align: center;
            }
            
            .nav-bar a span {
                display: none;
            }
            
            .nav-bar a i {
                font-size: 1.2rem;
            }
            
            .nav-bar a {
                padding: 8px 14px;
            }
        }

        @media (min-width: 641px) and (max-width: 1024px) {
            .nav-bar a span {
                font-size: 0.55rem;
            }
            .nav-bar a i {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <header class="main-header">
        <img src="logo.png" alt="شعار المعهد" class="logo" onerror="this.style.display='none'">
        <h1>نتايج الطلاب - معهد رعاية الضبعية الفني للتمريض</h1>
        <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> تسجيل الخروج</button>
    </header>

    <div class="main-container">
        <div class="result-form-container">
            <div class="welcome-message" id="welcomeMessage"></div>
            
            <div class="section-title">ابحث عن نتيجتك</div>
            
            <form id="searchForm">
                <div class="input-group">
                    <label><i class="fas fa-user"></i> اسم الطالب</label>
                    <input type="text" id="studentName" placeholder="أدخل اسم الطالب" required>
                </div>
                <div class="input-group">
                    <label><i class="fas fa-id-card"></i> رقم الجلوس</label>
                    <input type="text" id="studentCode" placeholder="أدخل رقم الجلوس" required>
                </div>
                <button type="submit" class="submit-btn"><i class="fas fa-search"></i> عرض النتيجة</button>
            </form>

            <!-- ========== قسم النتيجة ========== -->
            <div id="resultContainer" style="display: none;"></div>

            <!-- ========== الإشعارات ========== -->
            <div class="notifications-section">
                <div class="subsection-title"><i class="fas fa-bell"></i> الإشعارات</div>
                <div id="notificationsList"></div>
            </div>
        </div>
    </div>

    <nav class="nav-bar" id="navBar"></nav>

    <script src="auth.js"></script>
    <script>
        const BASE_URL = window.location.hostname === 'localhost' ? 'http://localhost:3000' : '';
        
        function getLoggedInUser() {
            try {
                const userStr = sessionStorage.getItem('userData');
                return userStr ? JSON.parse(userStr) : null;
            } catch { return null; }
        }
        
        function showToast(msg, type = 'success') {
            if (typeof Toastify !== 'undefined') {
                Toastify({ text: msg, duration: 3000, gravity: "top", position: "center", backgroundColor: type === 'success' ? '#28a745' : '#dc3545', style: { fontFamily: 'Tajawal', borderRadius: '12px' } }).showToast();
            } else { alert(msg); }
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        async function fetchStudentByCode(code) {
            try {
                const res = await fetch(`${BASE_URL}/api/student/by-code/${encodeURIComponent(code)}`, { credentials: 'include' });
                if (res.ok) return await res.json();
                return null;
            } catch { return null; }
        }
        
        async function fetchViolations(studentId) {
            try {
                const res = await fetch(`${BASE_URL}/api/violations/student/${encodeURIComponent(studentId)}`, { credentials: 'include' });
                if (res.ok) return await res.json();
                return [];
            } catch { return []; }
        }
        
        async function loadNotifications() {
            try {
                const res = await fetch(`${BASE_URL}/api/notifications`);
                if (res.ok) {
                    const data = await res.json();
                    const container = document.getElementById('notificationsList');
                    if (!container) return;
                    
                    if (!data || data.length === 0) {
                        container.innerHTML = '<div class="empty-state"><i class="fas fa-bell-slash"></i> لا توجد إشعارات حالياً</div>';
                        return;
                    }
                    
                    container.innerHTML = data.map(n => `
                        <div class="notification-item">
                            <div class="notification-text"><i class="fas fa-circle" style="font-size: 8px; color: #c4a35a; margin-left: 8px;"></i> ${escapeHtml(n.text)}</div>
                            <div class="notification-date"><i class="far fa-calendar-alt"></i> ${n.date || 'غير محدد'}</div>
                        </div>
                    `).join('');
                }
            } catch(e) { console.error(e); }
        }
        
        function renderResult(student, violations) {
            const container = document.getElementById('resultContainer');
            if (!container) return;
            
            if (!student || !student.subjects || student.subjects.length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-search"></i> لا توجد درجات مسجلة لهذا الطالب</div>';
                container.style.display = 'block';
                return;
            }
            
            const subjectMax = { "اللغة العربية": 20, "اللغة الإنجليزية": 20, "علوم تطبيقية": 40, "طب باطنة": 20, "تمريض باطني جراحي": 24, "حاسب آلي": 20 };
            const ordered = ["اللغة العربية", "اللغة الإنجليزية", "علوم تطبيقية", "طب باطنة", "تمريض باطني جراحي", "حاسب آلي"];
            const extras = ["الدين"];
            
            let total = 0;
            let subjectsHtml = '<div class="subjects-list">';
            
            ordered.forEach(sub => {
                const subj = student.subjects.find(s => s.name === sub);
                const grade = subj ? (subj.grade || 0) : 0;
                total += grade;
                subjectsHtml += `
                    <div class="subject-item">
                        <div class="subject-name"><i class="fas fa-book"></i> ${sub}</div>
                        <div class="subject-grade">${grade} / ${subjectMax[sub]}</div>
                    </div>
                `;
            });
            
            extras.forEach(sub => {
                const subj = student.subjects.find(s => s.name === sub);
                const grade = subj ? (subj.grade || 0) : 0;
                if (grade > 0) {
                    subjectsHtml += `
                        <div class="subject-item extra-subject-item">
                            <div class="subject-name"><i class="fas fa-pray"></i> ${sub}</div>
                            <div class="subject-grade">${grade} / 32 <small>(خارج المجموع)</small></div>
                        </div>
                    `;
                }
            });
            subjectsHtml += '</div>';
            
            const percentage = (total / 144) * 100;
            let percentClass = percentage >= 85 ? 'percentage-excellent' : (percentage >= 60 ? 'percentage-passed' : 'percentage-failed');
            
            let violationsHtml = '';
            if (violations && violations.length > 0) {
                violationsHtml = `
                    <div class="subsection-title" style="margin-top: 20px;"><i class="fas fa-exclamation-triangle"></i> الإنذارات والمخالفات</div>
                    ${violations.map(v => `
                        <div class="violation-item">
                            <div class="violation-type ${v.type === 'warning' ? 'warning' : 'violation'}">${v.type === 'warning' ? '⚠️ إنذار' : '🚫 مخالفة'}</div>
                            <div class="violation-reason">${escapeHtml(v.reason)}</div>
                            <div class="violation-penalty">${escapeHtml(v.penalty)}</div>
                            <div class="notification-date">${v.date || '-'}</div>
                        </div>
                    `).join('')}
                `;
            } else {
                violationsHtml = `<div class="empty-state" style="margin-top: 16px;"><i class="fas fa-check-circle"></i> لا توجد مخالفات مسجلة</div>`;
            }
            
            container.innerHTML = `
                <div class="result-card">
                    <div class="result-header">
                        <span><i class="fas fa-user-graduate"></i> <strong>${escapeHtml(student.fullName)}</strong></span>
                        <span><i class="fas fa-id-card"></i> رقم الجلوس: <strong>${student.studentCode}</strong></span>
                    </div>
                    <div class="result-body">
                        <div class="info-row">
                            <div class="info-label"><i class="fas fa-chalkboard-user"></i> الصف الدراسي</div>
                            <div class="info-value">${student.grade === 'first' ? 'الأول الثانوي' : (student.grade === 'second' ? 'الثاني الثانوي' : 'الثالث الثانوي')}</div>
                        </div>
                        <div class="info-row">
                            <div class="info-label"><i class="fas fa-phone-alt"></i> رقم الهاتف</div>
                            <div class="info-value">${student.profile?.phone || 'غير مسجل'}</div>
                        </div>
                        <div class="info-row">
                            <div class="info-label"><i class="fas fa-user-friends"></i> ولي الأمر</div>
                            <div class="info-value">${student.profile?.parentName || 'غير مسجل'}</div>
                        </div>
                        ${subjectsHtml}
                        <div class="total-percentage ${percentClass}">
                            📊 المجموع الكلي: <span>${total} / 144</span> | 🎯 النسبة المئوية: <span>${percentage.toFixed(1)}%</span>
                        </div>
                        ${violationsHtml}
                    </div>
                </div>
            `;
            container.style.display = 'block';
        }
        
        function renderWelcomeMessage() {
            const user = getLoggedInUser();
            const el = document.getElementById('welcomeMessage');
            if (!el) return;
            if (user) {
                el.textContent = user.type === 'admin' ? `👋 أهلًا بك في لوحة التحكم، ${user.fullName || user.username}` : `🎉 مرحبًا ${user.fullName || user.username}! يمكنك البحث عن نتيجتك أدناه`;
            } else {
                el.textContent = '👋 مرحبًا بك! سجل الدخول لرؤية نتائجك';
            }
        }
        
        function renderNavbar() {
            const user = getLoggedInUser();
            const nav = document.getElementById('navBar');
            if (!nav) return;
            
            const links = [
                { href: 'index.html', icon: 'fa-house', title: 'الرئيسية' },
                { href: 'Home.html', icon: 'fa-chart-simple', title: 'النتائج' },
                { href: 'profile.html', icon: 'fa-user', title: 'الملف' },
                { href: 'exams.html', icon: 'fa-book-open', title: 'الاختبارات' },
                { href: 'file-library.html', icon: 'fa-folder-open', title: 'المكتبة' }
            ];
            if (user?.type === 'admin') links.push({ href: 'admin.html', icon: 'fa-cogs', title: 'التحكم' });
            
            nav.innerHTML = links.map(l => `<a href="${l.href}"><i class="fas ${l.icon}"></i><span>${l.title}</span></a>`).join('');
        }
        
        async function logout() {
            try { await fetch(`${BASE_URL}/api/logout`, { method: 'POST', credentials: 'include' }); } catch(e) {}
            sessionStorage.clear();
            window.location.href = 'login.html';
        }
        
        document.querySelector('.logout-btn')?.addEventListener('click', logout);
        
        document.getElementById('searchForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('studentName').value.trim();
            const code = document.getElementById('studentCode').value.trim();
            
            if (!name || !code) {
                showToast('⚠️ يرجى إدخال الاسم ورقم الجلوس', 'error');
                return;
            }
            
            showToast('🔍 جاري البحث...', 'info');
            
            try {
                const student = await fetchStudentByCode(code);
                if (student && student.fullName.includes(name)) {
                    const violations = await fetchViolations(student.studentCode);
                    renderResult(student, violations);
                    showToast('✅ تم العثور على الطالب', 'success');
                } else {
                    document.getElementById('resultContainer').innerHTML = '<div class="empty-state"><i class="fas fa-user-slash"></i> لا توجد نتيجة بهذا الاسم ورقم الجلوس</div>';
                    document.getElementById('resultContainer').style.display = 'block';
                    showToast('❌ الطالب غير موجود', 'error');
                }
            } catch(err) {
                showToast('❌ حدث خطأ في الاتصال', 'error');
            }
        });
        
        renderWelcomeMessage();
        renderNavbar();
        loadNotifications();
    </script>
</body>
</html>
