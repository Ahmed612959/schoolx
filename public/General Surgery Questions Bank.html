<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>General Surgery Questions Bank - بنك أسئلة الجراحة العامة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af5a; --gold-dark: #b8943a; --gold-light: #f5edd6;
            --dark: #1a3a48; --darker: #0e2a35; --light-bg: #f8fafb;
            --blue: #3b82f6; --green: #10b981; --orange: #f59e0b; --purple: #8b5cf6; --red: #ef4444;
            --card-bg: #ffffff; --text-primary: #334155; --text-secondary: #64748b; --border-color: #edf2f7;
            --shadow-xs: 0 1px 3px rgba(0,0,0,0.04); --shadow-sm: 0 4px 15px rgba(0,0,0,0.06);
            --shadow-md: 0 8px 25px rgba(0,0,0,0.08); --shadow-lg: 0 15px 40px rgba(0,0,0,0.12);
            --radius-sm: 16px; --radius-md: 22px; --radius-lg: 30px; --radius-xl: 60px;
            --transition: all 0.3s ease;
        }
        .profile-avatar {
            width: 50px; height: 50px; border-radius: 50%; 
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            display: flex; align-items: center; justify-content: center;
            color: #0e2a35; font-weight: 900; font-size: 1.5rem;
            border: 2px solid var(--gold); box-shadow: 0 0 20px rgba(212,175,90,0.2);
            cursor: pointer; transition: var(--transition);
        }
        .profile-avatar:hover { transform: scale(1.05); }
        .profile-avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .user-name { color: var(--gold); font-weight: 700; font-size: 0.85rem; }
        .user-name small { display: block; font-size: 0.65rem; opacity: 0.7; font-weight: 400; }

        body.dark-mode {
            --light-bg: #0f172a; --card-bg: #1e293b; --text-primary: #e2e8f0;
            --text-secondary: #94a3b8; --border-color: #334155; --dark: #f1f5f9; --darker: #e2e8f0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Tajawal', sans-serif; background: var(--light-bg);
            min-height: 100vh; padding-bottom: 60px; position: relative; overflow-x: hidden;
            color: var(--text-primary); line-height: 1.7; transition: background 0.4s ease;
        }
        .animated-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; pointer-events: none; }
        .orb { position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.22; animation: orbFloat 20s infinite ease-in-out; }
        .orb:nth-child(1) { width: 600px; height: 600px; background: radial-gradient(circle, rgba(212,175,90,0.35), transparent 70%); top: -150px; left: -100px; }
        .orb:nth-child(2) { width: 450px; height: 450px; background: radial-gradient(circle, rgba(99,102,241,0.25), transparent 70%); bottom: -120px; right: -80px; animation-delay: -5s; }
        .orb:nth-child(3) { width: 400px; height: 400px; background: radial-gradient(circle, rgba(236,72,153,0.22), transparent 70%); top: 50%; left: 50%; animation-delay: -10s; }
        @keyframes orbFloat { 0%,100%{transform:translate(0,0)scale(1)rotate(0deg)}25%{transform:translate(50px,-30px)scale(1.05)rotate(3deg)}50%{transform:translate(-25px,20px)scale(.95)rotate(-2deg)}75%{transform:translate(-40px,-10px)scale(1.02)rotate(1deg)} }
        .progress-container { position: fixed; top: 0; right: 0; left: 0; width: 100%; height: 4px; background: transparent; z-index: 1000; }
        .progress-bar { height: 4px; background: linear-gradient(90deg, var(--gold), var(--orange), var(--red)); width: 0%; border-radius: 0 3px 3px 0; transition: width 0.1s linear; }

        .sync-indicator { position: fixed; top: 8px; left: 50%; transform: translateX(-50%); z-index: 1001; font-size: 0.7rem; padding: 4px 12px; border-radius: 15px; background: var(--card-bg); color: var(--text-secondary); box-shadow: var(--shadow-sm); transition: var(--transition); display: flex; align-items: center; gap: 5px; }
        .sync-indicator.synced { color: var(--green); }
        .sync-indicator.syncing { color: var(--orange); }
        .sync-indicator.error { color: var(--red); }

        .header { background: linear-gradient(165deg, #060f1a 0%, #0f2333 40%, #0d1f2d 70%, #050d14 100%); padding: 20px 30px 14px; text-align: center; position: relative; overflow: hidden; box-shadow: 0 10px 50px rgba(0,0,0,0.5); border-bottom: 1px solid rgba(212,175,90,0.15); }
        .header h1 { color: var(--gold); font-size: 1.9rem; margin-bottom: 4px; font-weight: 900; }
        .header h1 i { margin-left: 10px; background: linear-gradient(135deg, rgba(212,175,90,0.35), rgba(212,175,90,0.1)); padding: 11px; border-radius: 50%; }
        .header p { color: rgba(255,255,255,0.8); font-size: 0.85rem; }
        .header-badge { display: inline-block; background: linear-gradient(135deg, rgba(212,175,90,0.25), rgba(212,175,90,0.08)); padding: 7px 18px; border-radius: 50px; margin-top: 6px; font-size: 0.78rem; color: var(--gold); border: 1px solid rgba(212,175,90,0.35); font-weight: 600; }
        .control-bar { display: flex; justify-content: center; align-items: center; gap: 5px; padding: 4px 10px; flex-wrap: wrap; margin-top: 6px; }
        .control-btn, .quiz-btn, .exam-btn, .flashcard-btn, .dashboard-btn, .leaderboard-btn { color: white; border: none; padding: 6px 12px; border-radius: 20px; cursor: pointer; font-family: 'Tajawal', sans-serif; font-size: 0.73rem; font-weight: 700; transition: var(--transition); display: flex; align-items: center; gap: 4px; }
        .control-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); font-weight: 400; }
        .control-btn:hover { background: rgba(255,255,255,0.2); }
        .quiz-btn { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .exam-btn { background: linear-gradient(135deg, #6366f1, #4f46e5); }
        .flashcard-btn { background: linear-gradient(135deg, #10b981, #059669); }
        .dashboard-btn { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .leaderboard-btn { background: linear-gradient(135deg, #8b5cf6, #7c3aed); }
        .quiz-btn:hover, .exam-btn:hover, .flashcard-btn:hover, .dashboard-btn:hover, .leaderboard-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.3); }

        .xp-bar-container { display: flex; align-items: center; gap: 6px; justify-content: center; margin: 6px 0; }
        .xp-label { font-size: 0.7rem; color: var(--gold); font-weight: 700; }
        .xp-bar { width: 120px; height: 8px; background: rgba(255,255,255,0.2); border-radius: 10px; overflow: hidden; }
        .xp-fill { height: 100%; background: linear-gradient(90deg, var(--gold), #f59e0b); border-radius: 10px; transition: width 0.5s ease; }
        .level-badge { font-size: 0.7rem; font-weight: 700; padding: 2px 10px; border-radius: 15px; }
        .level-bronze{background:#fdf2e9;color:#cd7f32}.level-silver{background:#f1f5f9;color:#a0aec0}.level-gold{background:#fef9e7;color:var(--gold)}.level-diamond{background:#eef2ff;color:#6366f1}

        .sidebar-toggle { position: fixed; top: 50%; right: 0; transform: translateY(-50%); background: var(--gold-dark); color: white; border: none; padding: 11px 7px; border-radius: 0 10px 10px 0; cursor: pointer; z-index: 500; font-size: 0.9rem; transition: var(--transition); }
        .sidebar-toggle:hover { padding-right: 12px; }
        .sidebar { position: fixed; top: 0; right: -300px; width: 280px; height: 100%; background: var(--card-bg); z-index: 1500; transition: right 0.4s ease; box-shadow: -5px 0 30px rgba(0,0,0,0.3); overflow-y: auto; padding: 18px; }
        .sidebar.open { right: 0; }
        .sidebar-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1499; display: none; }
        .sidebar-overlay.active { display: block; }
        .sidebar h3 { color: var(--gold-dark); margin-bottom: 12px; font-size: 0.95rem; text-align: center; }
        .side-chapter, .side-category { display: block; width: 100%; text-align: right; padding: 9px 13px; margin: 4px 0; border: 2px solid transparent; border-radius: 22px; background: transparent; cursor: pointer; font-family: 'Tajawal', sans-serif; font-size: 0.78rem; transition: var(--transition); color: var(--text-primary); }
        .side-category { font-size: 0.73rem; padding: 7px 10px; }
        .side-chapter:hover, .side-category:hover { border-color: var(--gold); background: rgba(212,175,90,0.05); }
        .side-chapter.active, .side-category.active { background: var(--gold); color: var(--darker); font-weight: 700; }

        .favorites-bar { display: flex; justify-content: center; gap: 5px; margin-bottom: 12px; flex-wrap: wrap; }
        .fav-filter-btn { background: var(--card-bg); border: 2px solid #e2e8f0; padding: 6px 12px; border-radius: 22px; cursor: pointer; font-family: 'Tajawal', sans-serif; font-size: 0.75rem; transition: var(--transition); }
        .fav-filter-btn:hover { border-color: var(--gold); }
        .fav-filter-btn.active { background: #fffbeb; border-color: #f59e0b; color: #f59e0b; font-weight: 700; }
        .container { max-width: 1400px; margin: 25px auto; padding: 0 25px; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 22px; }
        @media(max-width:950px){.stats-grid{grid-template-columns:repeat(2,1fr)}}
        @media(max-width:500px){.stats-grid{grid-template-columns:1fr}}
        .stat-card { background: var(--card-bg); border-radius: var(--radius-lg); padding: 20px 14px; text-align: center; box-shadow: var(--shadow-md); transition: var(--transition); }
        .stat-card:hover { transform: translateY(-6px); }
        .stat-card .icon-wrap { width: 48px; height: 48px; border-radius: 15px; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; font-size: 1.2rem; }
        .stat-card:nth-child(1) .icon-wrap{background:#eff6ff;color:var(--blue)}.stat-card:nth-child(2) .icon-wrap{background:#ecfdf5;color:var(--green)}.stat-card:nth-child(3) .icon-wrap{background:#fffbeb;color:var(--orange)}.stat-card:nth-child(4) .icon-wrap{background:#f5f3ff;color:var(--purple)}
        .stat-card .number { font-size: 1.7rem; font-weight: 900; color: var(--dark); }
        .stat-card .label { font-size: 0.75rem; color: var(--text-secondary); font-weight: 600; }
        .chapter-section { background: var(--card-bg); border-radius: var(--radius-xl); padding: 7px; margin-bottom: 22px; box-shadow: var(--shadow-sm); display: flex; flex-wrap: wrap; justify-content: center; gap: 4px; position: sticky; top: 8px; z-index: 100; }
        .chapter-btn { background: transparent; border: 2px solid transparent; padding: 9px 15px; border-radius: 50px; font-family: 'Tajawal', sans-serif; font-size: 0.78rem; font-weight: 700; cursor: pointer; transition: var(--transition); color: var(--text-secondary); display: flex; align-items: center; gap: 6px; }
        .chapter-btn:hover { background: rgba(212,175,90,0.1); color: var(--gold-dark); }
        .chapter-btn.active { background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: #0e2a35; }
        .category-tabs { background: var(--card-bg); border-radius: var(--radius-xl); padding: 6px; margin-bottom: 22px; display: flex; flex-wrap: wrap; justify-content: center; gap: 4px; box-shadow: var(--shadow-sm); }
        .category-btn { background: transparent; border: 2px solid transparent; padding: 8px 14px; border-radius: 32px; font-family: 'Tajawal', sans-serif; font-size: 0.76rem; font-weight: 600; cursor: pointer; transition: var(--transition); color: var(--text-secondary); display: flex; align-items: center; gap: 6px; }
        .category-btn .count { background: rgba(0,0,0,0.05); padding: 2px 7px; border-radius: 16px; font-size: 0.65rem; }
        .category-btn:hover { background: rgba(212,175,90,0.08); }
        .category-btn.active { background: var(--dark); color: white; }
        body.dark-mode .category-btn.active { background: var(--gold); color: #0e2a35; }

        .questions-section { margin-bottom: 22px; animation: slideIn 0.4s ease forwards; }
        @keyframes slideIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
        .section-title { font-size: 1.05rem; font-weight: 800; color: var(--dark); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; padding: 10px 15px; background: var(--card-bg); border-radius: var(--radius-md); border-right: 4px solid var(--gold); }
        .section-title .section-count { background: var(--gold-light); color: var(--gold-dark); padding: 3px 10px; border-radius: 16px; font-size: 0.74rem; margin-right: auto; font-weight: 700; }
        .question-card { background: var(--card-bg); border-radius: var(--radius-md); margin-bottom: 14px; overflow: hidden; box-shadow: var(--shadow-xs); transition: var(--transition); border: 1px solid var(--border-color); }
        .question-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
        .question-card.hide-answers .answer-box,.question-card.hide-answers .answer-translation,.question-card.hide-answers .list-items-box{display:none!important}
        .question-header { background: #fafcfd; padding: 10px 15px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        body.dark-mode .question-header { background: #1a2538; }
        .question-badge { padding: 4px 10px; border-radius: 50px; font-size: 0.67rem; font-weight: 700; display: inline-flex; align-items: center; gap: 4px; }
        .badge-def{background:#eff6ff;color:#2563eb}.badge-mcq{background:#ecfdf5;color:#059669}.badge-tf{background:#fffbeb;color:#d97706}.badge-complete{background:#faf5ff;color:#7c3aed}.badge-explain{background:#ecfeff;color:#0891b2}.badge-list{background:#fff1f2;color:#e11d48}.badge-situation{background:#eef2ff;color:#4f46e5}
        .question-number { font-size: 0.67rem; color: #94a3b8; }
        .card-actions { display: flex; gap: 3px; margin-right: auto; }
        .action-btn { background: transparent; border: 1px solid #e2e8f0; color: var(--text-secondary); padding: 3px 7px; border-radius: 14px; cursor: pointer; font-size: 0.64rem; transition: var(--transition); display: flex; align-items: center; gap: 2px; }
        .action-btn:hover { background: rgba(212,175,90,0.1); color: var(--gold-dark); border-color: var(--gold); }
        .action-btn.bookmarked{color:#f59e0b;border-color:#f59e0b;background:#fffbeb}.action-btn.hard-marked{color:#ef4444;border-color:#ef4444;background:#fef2f2}
        .question-content { padding: 15px; }
        .question-text { font-size: 0.94rem; font-weight: 700; color: var(--dark); margin-bottom: 10px; line-height: 1.7; }
        .translation-box { background: #f8fafc; padding: 10px 13px; border-radius: var(--radius-sm); margin-bottom: 10px; font-size: 0.8rem; color: #475569; border-right: 4px solid var(--gold); }
        .difficulty-badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:.63rem;font-weight:600;margin-right:4px;cursor:pointer}.diff-easy{background:#ecfdf5;color:#059669}.diff-medium{background:#fffbeb;color:#d97706}.diff-hard{background:#fef2f2;color:#dc2626}
        .note-box{margin-top:6px}.note-input{width:100%;padding:7px 10px;border-radius:10px;border:1px solid #e2e8f0;font-family:'Tajawal',sans-serif;font-size:.75rem;resize:vertical;min-height:35px;background:var(--card-bg);color:var(--text-primary)}
        .options-list{margin:10px 0;padding-right:15px}.options-list li{margin:6px 0;color:var(--text-primary);list-style:none;position:relative;padding-right:18px;font-size:.87rem}.options-list li:before{content:"◆";color:var(--gold);position:absolute;right:0;font-size:.42rem;top:6px}
        .answer-box{padding:10px 14px;border-radius:var(--radius-sm);margin-top:10px;border-right:4px solid #22c55e;background:#f0fdf4}.answer-box.false-answer{background:#fef2f2;border-right-color:#ef4444}
        .answer-translation{background:#eff6ff;padding:8px 11px;border-radius:10px;margin-top:6px;font-size:.78rem;color:#1e40af}
        .list-items-box{background:#fafafa;padding:12px 14px;border-radius:var(--radius-sm);margin-top:10px;border-right:4px solid var(--red)}.list-items-box li{margin:6px 0;padding-right:16px;font-size:.84rem}.list-items-box li:before{content:"●";color:var(--gold);position:absolute;right:0;font-size:.38rem;top:7px}
        .empty-state{background:var(--card-bg);border-radius:var(--radius-lg);padding:50px 20px;text-align:center;border:2px dashed var(--gold);margin:20px 0}
        .back-to-top{position:fixed;bottom:30px;left:30px;width:46px;height:46px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));border:none;border-radius:50%;color:#0e2a35;font-size:1.1rem;cursor:pointer;z-index:999;opacity:0;visibility:hidden;transform:translateY(20px);transition:var(--transition);box-shadow:0 8px 25px rgba(212,175,90,0.4)}.back-to-top.visible{opacity:1;visibility:visible;transform:translateY(0)}
        .footer{text-align:center;padding:25px;color:var(--text-secondary);font-size:.82rem;border-top:1px solid var(--border-color);margin-top:35px}.footer .developer-name{color:var(--gold-dark);font-weight:700}.footer .institute-name{color:var(--dark);font-weight:700}

        .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.75);z-index:2000;display:flex;align-items:center;justify-content:center;display:none}.modal-overlay.active{display:flex}
        .modal-content{background:var(--card-bg);border-radius:var(--radius-lg);padding:22px;max-width:800px;width:92%;max-height:85vh;overflow-y:auto;text-align:center}
        .modal-content h2{color:var(--dark);margin-bottom:15px;font-size:1.3rem}
        .modal-settings{margin-bottom:15px;display:flex;gap:6px;justify-content:center;flex-wrap:wrap;align-items:center}
        .modal-settings select,.modal-settings input{padding:7px 12px;border-radius:22px;border:2px solid #e2e8f0;font-family:'Tajawal',sans-serif;font-size:.82rem;background:var(--card-bg);color:var(--text-primary)}
        .modal-timer{font-size:2rem;font-weight:900;color:var(--red);margin:10px 0}
        .modal-btn{padding:8px 18px;border-radius:22px;border:none;cursor:pointer;font-family:'Tajawal',sans-serif;font-size:.82rem;font-weight:700;margin:4px;transition:var(--transition)}
        .btn-primary{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#0e2a35}.btn-danger{background:linear-gradient(135deg,#ef4444,#dc2626);color:white}.btn-success{background:linear-gradient(135deg,#10b981,#059669);color:white}.btn-info{background:linear-gradient(135deg,#6366f1,#4f46e5);color:white}.btn-close{background:var(--dark);color:white}
        .quiz-q{text-align:right;margin:10px 0;padding:12px;background:#f8fafc;border-radius:var(--radius-sm)}
        .quiz-q .q-type-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.65rem;font-weight:600;margin-right:6px;background:#e2e8f0;color:#475569}
        .quiz-opt{display:block;width:100%;text-align:right;padding:9px 13px;margin:4px 0;border:2px solid #e2e8f0;border-radius:10px;background:transparent;cursor:pointer;font-family:'Tajawal',sans-serif;font-size:.85rem;transition:var(--transition)}
        .quiz-opt:hover{border-color:var(--gold);background:rgba(212,175,90,0.05)}.quiz-opt:disabled{pointer-events:none}
        .quiz-opt.correct{border-color:var(--green);background:#f0fdf4}.quiz-opt.wrong{border-color:var(--red);background:#fef2f2}
        .quiz-fb{margin-top:5px;font-weight:700;font-size:.82rem}.quiz-score{font-size:1.8rem;font-weight:900;color:var(--gold-dark);margin:12px 0}
        .def-input{width:100%;padding:10px;border-radius:12px;border:2px solid #e2e8f0;font-family:'Tajawal',sans-serif;font-size:.85rem;margin:5px 0;background:var(--card-bg);color:var(--text-primary)}
        .def-input.correct-input{border-color:var(--green);background:#f0fdf4}.def-input.wrong-input{border-color:var(--red);background:#fef2f2}

        .flashcard{width:100%;max-width:550px;min-height:350px;margin:15px auto;perspective:1000px;cursor:pointer}.flashcard-inner{position:relative;width:100%;height:100%;min-height:350px;transition:transform 0.6s;transform-style:preserve-3d}.flashcard.flipped .flashcard-inner{transform:rotateY(180deg)}.flashcard-front,.flashcard-back{position:absolute;width:100%;height:100%;min-height:350px;backface-visibility:hidden;border-radius:var(--radius-md);padding:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;font-size:0.95rem;line-height:1.8;overflow-y:auto}.flashcard-front{background:linear-gradient(135deg,#eff6ff,#dbeafe);color:var(--dark);border:2px solid var(--blue)}.flashcard-back{background:linear-gradient(135deg,#f0fdf4,#d1fae5);color:var(--dark);border:2px solid var(--green);transform:rotateY(180deg)}.flashcard-nav{display:flex;justify-content:center;gap:10px;margin-top:12px}
        .fc-label{font-size:0.7rem;color:var(--text-secondary);margin-bottom:5px;font-weight:600}.fc-content{font-weight:700;font-size:1rem}
        .fc-section{margin:8px 0;padding:8px;background:rgba(255,255,255,0.5);border-radius:10px;width:100%}
        .fc-divider{width:50px;height:2px;background:var(--gold);margin:8px auto}

        .dashboard-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:15px;margin:15px 0;text-align:right}@media(max-width:600px){.dashboard-grid{grid-template-columns:1fr}}
        .dashboard-card{background:var(--card-bg);border-radius:var(--radius-sm);padding:15px;border:1px solid var(--border-color)}.dashboard-card h4{color:var(--gold-dark);margin-bottom:8px;font-size:.9rem}.dashboard-card p{font-size:.8rem;color:var(--text-secondary);margin:3px 0}.dashboard-card .big-number{font-size:2rem;font-weight:900;color:var(--dark)}.chart-bar{height:20px;background:#e2e8f0;border-radius:10px;margin:5px 0;overflow:hidden}.chart-fill{height:100%;border-radius:10px;transition:width 0.5s ease}

var _speakingBtnId = null;
var _speakLang = localStorage.getItem('gs_nb_speak_lang') || 'both';

function speakQuestion(qId, enText, arText) {
    if (!window.speechSynthesis) {
        showToast('❌ المتصفح لا يدعم تشغيل الصوت', 'error');
        return;
    }
    if (_speakingBtnId === qId) {
        window.speechSynthesis.cancel();
        resetSpeakBtn(qId);
        return;
    }
    if (_speakingBtnId) {
        window.speechSynthesis.cancel();
        resetSpeakBtn(_speakingBtnId);
    }
    _speakingBtnId = qId;
    var btn = document.getElementById('speak-' + qId);
    if (!btn) return;
    btn.innerHTML = '<i class="fas fa-stop-circle"></i>';
    btn.style.color = '#ef4444';
    btn.style.borderColor = '#ef4444';
    btn.style.background = '#fef2f2';
    btn.title = 'إيقاف';

    function speak(text, lang, onEnd) {
        var utt = new SpeechSynthesisUtterance(text);
        utt.lang = lang;
        utt.rate = 0.85;
        utt.onend = onEnd || function() { resetSpeakBtn(qId); };
        utt.onerror = function() { resetSpeakBtn(qId); };
        window.speechSynthesis.speak(utt);
    }

    window.speechSynthesis.cancel();

    if (_speakLang === 'en') {
        speak(enText, 'en-US');
    } else if (_speakLang === 'ar') {
        speak(arText || enText, 'ar-EG');
    } else {
        speak(enText, 'en-US', function() {
            if (arText && arText !== enText) {
                setTimeout(function() { speak(arText, 'ar-EG'); }, 500);
            } else {
                resetSpeakBtn(qId);
            }
        });
    }
}

function resetSpeakBtn(qId) {
    _speakingBtnId = null;
    var btn = document.getElementById('speak-' + qId);
    if (!btn) return;
    btn.innerHTML = '<i class="fas fa-volume-up"></i>';
    btn.style.color = '';
    btn.style.borderColor = '';
    btn.style.background = '';
    btn.title = 'استمع للسؤال';
}

function setSpeakLang(lang) {
    _speakLang = lang;
    localStorage.setItem('gs_nb_speak_lang', lang);
    if (_speakingBtnId) {
        window.speechSynthesis.cancel();
        resetSpeakBtn(_speakingBtnId);
    }
    showToast('✅ لغة الاستماع: ' + (lang === 'en' ? 'إنجليزي' : lang === 'ar' ? 'عربي' : 'الاثنين'), 'success');
}

function updateSyncIndicator(status, text) {
    var el = document.getElementById('syncIndicator');
    if (!el) return;
    el.className = 'sync-indicator ' + status;
    el.querySelector('span').textContent = text;
}

async function checkAuth() {
    try {
        var response = await fetch(API_BASE + '/api/verify-session', { credentials: 'include' });
        if (response.ok) {
            var data = await response.json();
            if (data.valid) { return data.user; }
        }
        return null;
    } catch (error) { return null; }
}

async function fetchProgress() {
    try {
        var response = await fetch(API_BASE + '/api/progress-gs', { credentials: 'include', headers: { 'Cache-Control': 'no-cache' } });
        if (response.ok) {
            var data = await response.json();
            if (data) {
                xp = data.xp || 0; bookmarks = new Set(data.bookmarks || []); hardQuestions = new Set(data.hardQuestions || []);
                notes = data.notes || {}; difficulties = data.difficulties || {}; quizHistory = data.quizHistory || [];
                achievements = data.achievements || []; wrongQuestions = data.wrongQuestions || [];
                updateAllUI(); updateSyncIndicator('synced', '🟢 تم تحميل البيانات'); isOnlineMode = true; return true;
            }
        } else { updateSyncIndicator('error', '🔴 خطأ في التحميل'); return false; }
    } catch (error) { updateSyncIndicator('error', '🔴 غير متصل'); return false; }
}

async function saveProgress(endpoint, data) {
    updateSyncIndicator('syncing', '🟡 جاري المزامنة...');
    try {
        var response = await fetch(API_BASE + endpoint, { method: 'POST', credentials: 'include', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
        if (response.ok) { updateSyncIndicator('synced', '🟢 متزامن'); return await response.json(); } 
        else { updateSyncIndicator('error', '🔴 خطأ'); return null; }
    } catch (error) { updateSyncIndicator('error', '🔴 غير متصل'); return null; }
}

function getCategoryLabel(cat) { var m = {definitions:'تعريف', mcq:'اختيار', truefalse:'صح/خطأ', complete:'أكمل', explain:'اشرح', list:'قائمة', situations:'موقف'}; return m[cat] || cat; }
function getCategoryIcon(cat) { var icons = {definitions: 'fa-bookmark', mcq: 'fa-tasks', truefalse: 'fa-check-double', complete: 'fa-pen', explain: 'fa-comment-dots', list: 'fa-list-ul', situations: 'fa-stethoscope'}; return icons[cat] || 'fa-question'; }
function getCategoryOptions(selected) { selected = selected || 'all'; var html = '<select id="catFilter"><option value="all" ' + (selected === 'all' ? 'selected' : '') + '>جميع الأنواع</option>'; for (var i = 0; i < categoryMeta.length; i++) { var c = categoryMeta[i]; if (c.id === 'definitions') continue; html += '<option value="' + c.id + '" ' + (selected === c.id ? 'selected' : '') + '>' + c.label + '</option>'; } html += '</select>'; return html; }

function addXP(amount) { xp += amount; localStorage.setItem('gs_nb_xp', xp); if (isOnlineMode) saveProgress('/api/progress-gs/xp', {amount: amount}); updateXPDisplay(); checkAchievements(); }

function updateXPDisplay() {
    var level = getLevel(); var nextXP = getNextLevelXP(); var prevXP = getPrevLevelXP();
    var progress = Math.min(100, Math.round(((xp - prevXP) / (nextXP - prevXP)) * 100));
    document.getElementById('xpPoints').textContent = xp;
    document.getElementById('xpFill').style.width = progress + '%';

    badge.className = 'level-badge level-' + level.color;
}
function getLevel() { if (xp >= 5000) return {name: '💎 خبير', icon: '💎', color: 'diamond'}; if (xp >= 2000) return {name: '🥇 متقدم', icon: '🥇', color: 'gold'}; if (xp >= 500) return {name: '🥈 متوسط', icon: '🥈', color: 'silver'}; return {name: '🟤 مبتدئ', icon: '🟤', color: 'bronze'}; }
function getNextLevelXP() { if (xp < 500) return 500; if (xp < 2000) return 2000; if (xp < 5000) return 5000; return 10000; }
function getPrevLevelXP() { if (xp < 500) return 0; if (xp < 2000) return 500; if (xp < 5000) return 2000; return 5000; }

var allAchievements = [
    {id: 'first_quiz', name: '🎯 البداية', desc: 'حل أول 10 أسئلة', condition: function() { return getTotalQuestionsSolved() >= 10; }},

// ====================== 🔧 دالة getFullAnswer المعدلة (حل مشكلة ترجمة الإجابة) ====================
function getFullAnswer(q) {
    // دالة مساعدة لاستخراج الترجمة الصحيحة للإجابة
    function getCorrectTranslation() {
        // جمع جميع الترجمات الممكنة
        var translations = [
            q.correctTranslation,
            q.answerTranslation,
            q.completionTranslation
        ];

        // البحث عن أول ترجمة صالحة
        for (var i = 0; i < translations.length; i++) {
            var trans = translations[i];
            if (trans && 
                trans.trim() !== '' && 
                trans !== q.translation && 
                trans !== q.text &&
                trans.length > 1 &&
                trans !== q.correct &&
                trans !== q.completion &&
                trans !== q.answer) {
                return trans;
            }
        }
        return '';
    }

    var translation = getCorrectTranslation();
    var answer = '';

    if (q.cat === 'mcq') {
        answer = q.correct || '';
        if (translation) answer += ' - ' + translation;
        return answer;
    }
    if (q.cat === 'truefalse') {
        var isTrue = (q.correct === true || q.correct === 'true' || q.correct === 'True');
        answer = isTrue ? 'صواب (True)' : 'خطأ (False)';
        if (translation) answer += ' - ' + translation;
        return answer;
    }
    if (q.cat === 'complete') {
        answer = q.completion || '';
        if (translation) answer += ' - ' + translation;
        return answer;
    }
    if (q.answer) {
        answer = q.answer || '';
        if (translation) answer += ' - ' + translation;
        return answer;
    }
    return q.answer || q.completion || q.translation || '';
}

function getQuestionsFor(chapterId, categoryId) {
    var questions = [];
    if (chapterId === 'all') { 
        for (var key in chaptersData) { 
            if (chaptersData.hasOwnProperty(key)) { 
                var ch = chaptersData[key]; 
                if (ch[categoryId] && Array.isArray(ch[categoryId])) { 
                    for (var i = 0; i < ch[categoryId].length; i++) { 
                        var q = Object.assign({}, ch[categoryId][i]); 
                        q.chapterName = ch.name; 
                        q.questionId = key + '_' + categoryId + '_' + i; 
                        questions.push(q); 
                    } 
                } 
            } 
        } 
    } else { 
        var ch = chaptersData[chapterId]; 
        if (ch && ch[categoryId] && Array.isArray(ch[categoryId])) { 
            for (var i = 0; i < ch[categoryId].length; i++) { 
                var q = Object.assign({}, ch[categoryId][i]); 
                q.chapterName = ch.name; 
                q.questionId = chapterId + '_' + categoryId + '_' + i; 
                questions.push(q); 
            } 
        } 
    }
    return questions;
}

function renderCard(q, cat, idx) {

    var badgeClass = ci ? ci.badge : 'badge-def';

    var isBookmarked = bookmarks.has(qId); 
    var isHard = hardQuestions.has(qId);

    var note = notes[qId] || ''; 
    var h = '<div class="question-card" id="' + qId + '">';

    else { h += '<span class="difficulty-badge" onclick="cycleDifficulty(\'' + qId + '\')" style="cursor:pointer;opacity:0.4;">⚪</span>'; } 
    h += '<div class="card-actions">';
// زر الاستماع
var enTxt = (q.text || '').replace(/'/g, "\\'").replace(/"/g, '&quot;').substring(0, 200);
var arTxt = (q.translation || '').replace(/'/g, "\\'").replace(/"/g, '&quot;').substring(0, 200);
h += '<button class="action-btn" id="speak-' + qId + '" onclick="speakQuestion(\'' + qId + '\',\'' + enTxt + '\',\'' + arTxt + '\')" title="استمع للسؤال"><i class="fas fa-volume-up"></i></button>';
h += '<button class="action-btn" onclick="copyQuestion(\'' + qId + '\')"><i class="fas fa-copy"></i></button>';
    h += '<button class="action-btn ' + (isBookmarked ? 'bookmarked' : '') + '" onclick="toggleBookmark(\'' + qId + '\',this)"><i class="fas fa-star"></i></button>'; 
    h += '<button class="action-btn ' + (isHard ? 'hard-marked' : '') + '" onclick="toggleHard(\'' + qId + '\',this)"><i class="fas fa-exclamation-triangle"></i></button></div></div>'; 
    h += '<div class="question-content"><div class="question-text"><i class="fas fa-question-circle"></i> ' + q.text + '</div>'; 
    if (q.translation) h += '<div class="translation-box"><i class="fas fa-language"></i> ' + q.translation + '</div>'; 

    if (cat === 'mcq' && q.options) { 
        h += '<div class="options-list">'; 
        for (var o = 0; o < q.options.length; o++) { 
            var opt = q.options[o]; 
            var isCorrect = (opt === q.correct || opt.startsWith(q.correct + ')') || opt.startsWith(q.correct + ' '));

        // عرض ترجمة الإجابة فقط إذا كانت موجودة ومختلفة عن ترجمة السؤال
        var mcqAnswerTrans = q.correctTranslation || q.answerTranslation || ''; 
        if (mcqAnswerTrans && mcqAnswerTrans !== q.translation && mcqAnswerTrans !== q.text && mcqAnswerTrans.trim() !== '') { 
            h += '<div class="answer-translation"><i class="fas fa-language"></i> ' + mcqAnswerTrans + '</div>'; 
        } 
    } else if (cat === 'truefalse') { 
        var cv = q.correct; 
        var sv = String(cv).toLowerCase().replace(/['"]/g, '').trim(); 
        var isTrue = (sv === 'true' || cv === true || cv === 1); 
        var answerText = isTrue ? '✅ صواب (True)' : '❌ خطأ (False)'; 
        var extraClass = isTrue ? '' : ' false-answer'; 
        h += '<div class="answer-box' + extraClass + '"><strong>' + answerText + '</strong></div>';

        h += '<div class="answer-box"><strong>📝 ' + q.completion + '</strong></div>';

}

function retryWrongQuestions() {
    if (wrongQuestions.length === 0) { showToast('🎉 لا توجد أسئلة خاطئة!', 'success'); return; }
    var allQ = []; var uniqueIds = new Set();
    for (var w = 0; w < wrongQuestions.length; w++) { var wrong = wrongQuestions[w]; var questionId = wrong.questionId; if (!questionId || uniqueIds.has(questionId)) continue; uniqueIds.add(questionId); var parts = questionId.split('_'); if (parts.length === 3) { var chKey = parts[0]; var cat = parts[1]; var idx = parseInt(parts[2]); var ch = chaptersData[chKey]; if (ch && ch[cat] && Array.isArray(ch[cat]) && ch[cat][idx]) { var q = Object.assign({}, ch[cat][idx]); q.cat = cat; q.chapterName = ch.name; q.questionId = questionId; allQ.push(q); } } }
    if (allQ.length === 0) { showToast('⚠️ لم يتم العثور على الأسئلة الخاطئة.', 'warning'); return; }

function isAnswerCorrect(chosen, correct) {
    if (!chosen || !correct) return false;
    var c = String(chosen).trim();
    var a = String(correct).trim();
    if (c === a) return true;
    if (c.startsWith(a + ')') || c.startsWith(a + ' ')) return true;
    if (a.startsWith(c + ')') || a.startsWith(c + ' ')) return true;
    var cl = c.toLowerCase();
    var al = a.toLowerCase();
    if (cl === al) return true;
    if (cl === 'true' && (al === 'true' || al === 'صواب')) return true;
    if (cl === 'false' && (al === 'false' || al === 'خطأ')) return true;
    return false;
}

function checkDefinitionAnswer(userText, correctText) {
    var u = userText.toLowerCase().trim().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g, '').split(/\s+/).filter(function(w) { return w.length > 2; });
    var c = correctText.toLowerCase().trim().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g, '').split(/\s+/).filter(function(w) { return w.length > 2; });
    if (u.length === 0 || c.length === 0) return false;
    var matches = 0;
    var cSet = new Set(c);
    u.forEach(function(w) { if (cSet.has(w)) matches++; });
    return (matches / Math.max(c.length, 1)) >= 0.5;
}

function renderQuestionHTML(q, i, prefix, total) {
    var catLabel = getCategoryLabel(q.cat);

    var h = '<div class="quiz-q"><strong>' + (i+1) + '. ' + q.text + '</strong> <span class="q-type-badge"><i class="fas ' + catIcon + '"></i> ' + catLabel + '</span>';

    if (q.cat === 'mcq' && q.options) {
        for (var o = 0; o < q.options.length; o++) {
            var opt = q.options[o];
            var escapedOpt = opt.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '&quot;');
            var escapedCorrect = (q.correct || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '&quot;');
            h += '<button class="quiz-opt" onclick="check' + prefix + 'Answer(this,\'' + escapedOpt + '\',\'' + escapedCorrect + '\',' + i + (total ? ',' + total : '') + ')">' + opt + '</button>';
        }
    } else if (q.cat === 'truefalse') {
        var escapedCorrect = String(q.correct || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '&quot;');
        h += '<button class="quiz-opt" onclick="check' + prefix + 'Answer(this,\'true\',\'' + escapedCorrect + '\',' + i + (total ? ',' + total : '') + ')">✅ صواب</button>';
        h += '<button class="quiz-opt" onclick="check' + prefix + 'Answer(this,\'false\',\'' + escapedCorrect + '\',' + i + (total ? ',' + total : '') + ')">❌ خطأ</button>';
    } else {

        h += '<textarea class="def-input" id="' + prefix + '-other-' + i + '" placeholder="اكتب إجابتك هنا..." style="min-height:60px;"></textarea>';

function updateLeaderboard() {
    var userEntry = {
        name: currentUser?.fullName || 'مستخدم', username: currentUser?.username || '', xp: xp || 0,
        questions: getTotalQuestionsSolved() || 0,
        accuracy: quizHistory.length > 0 ? Math.round(quizHistory.reduce(function(s, h) { return s + (h.correct || 0); }, 0) / quizHistory.reduce(function(s, h) { return s + (h.total || 1); }, 0) * 100) : 0

    showChallengeParticipantsList();

function joinChallenge() {
    if (challengeData && challengeData.status !== 'completed') {
        var isParticipant = challengeData.participants.some(function(p) { return p.username === currentUser?.username; });
        if (isParticipant) { showToast('⚠️ أنت بالفعل عضو في هذا التحدي!', 'warning'); return; }
    }
    var code = prompt('📝 أدخل كود التحدي:'); if (!code) return; code = code.toUpperCase();
    var savedData = JSON.parse(localStorage.getItem('gs_challengeData') || '{}');
    if (savedData.code === code && savedData.status !== 'completed') {
        var userName = currentUser?.fullName || 'مستخدم'; var userUsername = currentUser?.username || '';
        var exists = savedData.participants.some(function(p) { return p.username === userUsername; });
        if (exists) { showToast('⚠️ أنت بالفعل عضو في هذا التحدي! لا يمكنك الانضمام مرة أخرى.', 'warning'); return; }
        savedData.participants.push({name: userName, username: userUsername, score: 0, completed: false, joined: true});
        localStorage.setItem('gs_challengeData', JSON.stringify(savedData));
        challengeData = savedData;
        var statusText = challengeData.status === 'started' ? 'التحدي بدأ بالفعل! 🚀' : 'انتظر بدء التحدي من المنشئ';
        document.getElementById('challengeStatus').innerHTML =
            '<div style="background:var(--green);color:white;padding:15px;border-radius:16px;text-align:center;">✅ تم الانضمام إلى التحدي! ' + statusText + '</div>';
        showToast('✅ تم الانضمام إلى التحدي بنجاح!', 'success'); showChallengeParticipantsList();
        if (challengeData.status === 'started') { startChallengeForUser(); }
    } else { showToast('❌ كود التحدي غير صالح أو منتهي', 'error'); }
}

function showChallengeParticipantsList() {
    var container = document.getElementById('challengeParticipantsList');
    if (!challengeData || !challengeData.participants) { container.innerHTML = ''; return; }
    var h = '<h4 style="margin-top:10px;">👥 المشاركون (' + challengeData.participants.length + '):</h4><div class="challenge-participants">';

function startChallenge() {
    if (!challengeData || !challengeData.questions) { showToast('❌ لا توجد أسئلة في التحدي', 'error'); return; }
    if (challengeData.creatorUsername !== currentUser?.username) { showToast('❌ فقط منشئ التحدي يمكنه بدء التحدي!', 'error'); return; }

function startChallengeTimer() {
    if (!challengeData || !challengeData.endTime) return;
    var endTime = new Date(challengeData.endTime).getTime();
    if (challengeTimerInterval) clearInterval(challengeTimerInterval);
    challengeTimerInterval = setInterval(function() {
        var now = Date.now(); var remaining = Math.max(0, endTime - now);
        var days = Math.floor(remaining / (24 * 60 * 60 * 1000));
        var hours = Math.floor((remaining % (24 * 60 * 60 * 1000)) / (60 * 60 * 1000));
        var mins = Math.floor((remaining % (60 * 60 * 1000)) / (60 * 1000));
        var secs = Math.floor((remaining % (60 * 1000)) / 1000);
        var timerDisplay = document.getElementById('challengeTimerDisplay');
        if (timerDisplay) {
            if (remaining <= 0) { timerDisplay.innerHTML = '<div class="challenge-timer danger">⏰ انتهت مدة التحدي!</div>'; clearInterval(challengeTimerInterval); showChallengeFinalResults(); return; }
            var timeStr = (days > 0 ? days + ' يوم ' : '') + (hours > 0 ? hours + ' ساعة ' : '') + mins + ' د ' + secs + ' ث';
            var timerClass = remaining < 24 * 60 * 60 * 1000 ? 'warning' : '';
            timerDisplay.innerHTML = '<div class="challenge-timer ' + timerClass + '">⏱️ الوقت المتبقي: ' + timeStr + '</div>';
        }
    }, 1000);
}

    try {
        console.log('🔄 جلب الواجبات للأدمن...');
        const response = await fetch(API_BASE + '/api/homework-gs/all', {
            credentials: 'include',
            headers: { 
                'Cache-Control': 'no-cache',
                'Content-Type': 'application/json'
            }
        });

        console.log('📡 Response status:', response.status);

        if (!response.ok) {
            const errorText = await response.text();
            console.error('❌ Response error:', errorText);
            throw new Error(`HTTP ${response.status}: ${errorText}`);
        }

let selectedHomeworkQuestions = [];

function generateHomeworkQuestions() {
    const chapterId = document.getElementById('hwChapter').value;
    const category = document.getElementById('hwCategory').value;
    const count = parseInt(document.getElementById('hwCount').value) || 10;

    const allQ = getAllQuestions(chapterId, category);
    const shuffled = allQ.sort(() => Math.random() - 0.5);
    selectedHomeworkQuestions = shuffled.slice(0, Math.min(count, shuffled.length));

    const statusEl = document.getElementById('hwQuestionsStatus');
    if (statusEl) {
        statusEl.textContent = `✅ تم اختيار ${selectedHomeworkQuestions.length} سؤال`;
    }

    let preview = '';
    for (let i = 0; i < selectedHomeworkQuestions.length; i++) {
        const q = selectedHomeworkQuestions[i];
        preview += `<div style="padding:4px 0;font-size:0.75rem;border-bottom:1px solid var(--border-color);">
            <strong>${i+1}.</strong> ${q.text.substring(0, 60)}${q.text.length > 60 ? '...' : ''}
            <span style="color:var(--text-secondary);font-size:0.65rem;"> (${q.cat})</span>
        </div>`;
    }
    document.getElementById('hwQuestionsPreview').innerHTML = preview || '⚠️ لا توجد أسئلة متاحة';
}

async function createHomework() {
    if (selectedHomeworkQuestions.length === 0) {
        showToast('⚠️ يرجى اختيار الأسئلة أولاً', 'warning');
        return;
    }

    const title = document.getElementById('hwTitle').value.trim();
    const chapterId = document.getElementById('hwChapter').value;
    const category = document.getElementById('hwCategory').value;
    const deadline = document.getElementById('hwDeadline').value;
    const targetGrade = document.getElementById('hwGrade').value;

    if (!title) {
        showToast('⚠️ يرجى إدخال عنوان للواجب', 'warning');
        return;
    }
    if (!deadline) {
        showToast('⚠️ يرجى تحديد موعد التسليم', 'warning');
        return;
    }

    const chapterName = chaptersData[chapterId]?.name || 'فصل غير معروف';

    const data = {
        title,
        chapterId,
        chapterName,
        questionCount: selectedHomeworkQuestions.length,
        categoryFilter: category,
        deadline,
        targetGrade,
        questions: selectedHomeworkQuestions
    };

    try {
        console.log('📤 إرسال بيانات الواجب:', data);
        const response = await fetch(API_BASE + '/api/homework-gs', {
            method: 'POST',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });

        const result = await response.json();
        console.log('📥 رد السيرفر:', result);

        if (result.success) {
            showToast('✅ تم إنشاء الواجب بنجاح!', 'success');
            closeModal('createHomeworkModal');
            fetchHomeworksForAdmin();
        } else {
            showToast('❌ ' + (result.error || 'فشل في إنشاء الواجب'), 'error');
        }
    } catch (error) {
        console.error('❌ خطأ في إنشاء الواجب:', error);
        showToast('❌ خطأ في الاتصال بالسيرفر', 'error');
    }
}

async function viewHomeworkSubmissions(homeworkId) {

        const response = await fetch(API_BASE + '/api/homework-gs/' + homeworkId + '/submissions', {
            credentials: 'include'
        });
        if (!response.ok) throw new Error('فشل في جلب التسليمات');
        const submissions = await response.json();
        console.log('✅ تم جلب التسليمات:', submissions.length);

        let html = `<h2>📊 نتائج الواجب</h2>`;
        if (submissions.length === 0) {
            html += `<p style="color:var(--text-secondary);text-align:center;">لا توجد تسليمات حتى الآن</p>`;
        } else {
            html += `
                <div style="max-height:50vh;overflow-y:auto;">
                <table style="width:100%;border-collapse:collapse;font-size:0.8rem;text-align:center;">
                    <tr style="background:var(--gold);color:var(--darker);">

                        <th style="padding:8px;">📝 الكود</th>
                        <th style="padding:8px;">📊 الدرجة</th>

                        <th style="padding:8px;">🔄 التبويبات</th>
                        <th style="padding:8px;">التفاصيل</th>
                    </tr>`;
            for (let i = 0; i < submissions.length; i++) {
                const s = submissions[i];
                const timeMinutes = Math.floor((s.timeTaken || 0) / 60);
                const timeSeconds = (s.timeTaken || 0) % 60;
                const scoreColor = s.score >= 70 ? 'var(--green)' : s.score >= 40 ? 'var(--orange)' : 'var(--red)';
                html += `
                    <tr style="border-bottom:1px solid var(--border-color);">

                        <td style="padding:6px;font-weight:700;color:${scoreColor};">${s.score || 0}%</td>
                        <td style="padding:6px;font-size:0.7rem;">${String(timeMinutes).padStart(2, '0')}:${String(timeSeconds).padStart(2, '0')}</td>
                        <td style="padding:6px;font-size:0.7rem;color:${(s.tabSwitches || 0) > 3 ? 'var(--red)' : 'var(--text-secondary)'};">${s.tabSwitches || 0}</td>

                `;
            }
            html += `</table></div>`;
        }
        html += `<button class="modal-btn btn-close" onclick="closeModal('submissionsModal')">إغلاق</button>`;
        openModal('submissionsModal', html);
    } catch (error) {
        console.error('❌ خطأ في جلب التسليمات:', error);
        showToast('❌ خطأ في جلب التسليمات', 'error');
    }
}

async function viewStudentSubmission(homeworkId, submissionId) {
    try {
        const response = await fetch(API_BASE + '/api/homework-gs/' + homeworkId + '/submissions', {
            credentials: 'include'
        });
        const submissions = await response.json();
        const submission = submissions.find(s => s._id === submissionId);
        if (!submission) {
            showToast('⚠️ لم يتم العثور على التسليم', 'error');
            return;
        }

        let html = `<h2>📖 تفاصيل تسليم الطالب</h2>`;
        html += `<p style="font-size:0.85rem;"><strong>👤 ${submission.studentName || 'غير معروف'}</strong> | كود: ${submission.studentCode || '---'} | الدرجة: <strong style="color:${submission.score >= 70 ? 'var(--green)' : 'var(--red)'};">${submission.score || 0}%</strong></p>`;
        html += `<div style="max-height:40vh;overflow-y:auto;text-align:right;">`;

        const answers = submission.answers || [];
        if (answers.length === 0) {
            html += `<p style="color:var(--text-secondary);">لا توجد إجابات مسجلة</p>`;
        } else {
            for (const ans of answers) {
                const isCorrect = ans.isCorrect;

// ---------- حل الواجب (مع منع الغش) ----------
let currentHomeworkData = null;
let homeworkTabSwitchCount = 0;
let homeworkStartTime = null;

function startHomework(homeworkId) {
    // بدء مراقبة تبديل التبويب
    homeworkTabSwitchCount = 0;
    homeworkStartTime = Date.now();

    // إزالة المستمع القديم إذا كان موجوداً
    if (window._homeworkVisibilityHandler) {
        document.removeEventListener('visibilitychange', window._homeworkVisibilityHandler);
    }

    // إضافة مستمع جديد
    window._homeworkVisibilityHandler = function() {
        if (document.hidden) {
            homeworkTabSwitchCount++;
            showToast(`⚠️ تم تبديل التبويب ${homeworkTabSwitchCount} مرة. التبديل المتكرر قد يؤدي إلى إلغاء الواجب.`, 'warning');
        }
    };
    document.addEventListener('visibilitychange', window._homeworkVisibilityHandler);

    // جلب بيانات الواجب
    fetchHomeworkData(homeworkId);
}

async function fetchHomeworkData(homeworkId) {
    try {
        console.log('📥 جلب بيانات الواجب:', homeworkId);
        const response = await fetch(API_BASE + '/api/homework-gs/' + homeworkId, {
            credentials: 'include',
            headers: { 'Cache-Control': 'no-cache' }
        });
        if (!response.ok) {
            const error = await response.json();
            throw new Error(error.error || 'فشل في جلب الواجب');
        }
        const data = await response.json();
        console.log('✅ تم جلب بيانات الواجب:', data.title);
        currentHomeworkData = data;
        renderHomeworkForStudent(data);
    } catch (error) {
        console.error('❌ خطأ في جلب الواجب:', error);
        showToast('❌ ' + error.message, 'error');

function clearHomeworkListeners() {
    if (window._homeworkVisibilityHandler) {
        document.removeEventListener('visibilitychange', window._homeworkVisibilityHandler);
        window._homeworkVisibilityHandler = null;
    }
}

async function submitHomework() {
    if (!currentHomeworkData) {
        showToast('❌ لا توجد بيانات واجب', 'error');
        return;
    }

    // جمع الإجابات
    const answers = [];
    const questions = currentHomeworkData.questions || [];

    for (let i = 0; i < questions.length; i++) {
        const q = questions[i];
        let answer = '';

        if (q.cat === 'mcq' || q.cat === 'truefalse') {
            const selected = document.querySelector(`input[name="hw_q_${i}"]:checked`);
            if (selected) {
                answer = selected.value;
                console.log(`📝 السؤال ${i+1} (${q.cat}): الإجابة المختارة = "${answer}"`);
            } else {
                console.log(`⚠️ السؤال ${i+1} (${q.cat}): لم يتم اختيار إجابة`);
            }
        } else {
            const textarea = document.getElementById(`hw_text_${i}`);
            if (textarea) {
                answer = textarea.value.trim();
                console.log(`📝 السؤال ${i+1} (${q.cat}): الإجابة = "${answer}"`);
            }
        }

        answers.push({
            questionIndex: i,
            answer: answer || ''
        });
    }

    // التحقق من الإجابة على كل الأسئلة
    const unanswered = answers.filter(a => !a.answer || a.answer === '');
    if (unanswered.length > 0) {
        if (!confirm(`⚠️ هناك ${unanswered.length} سؤال(أسئلة) لم يتم الإجابة عليها. هل تريد التسليم على أي حال؟`)) {
            return;
        }
    }

    const timeTaken = Math.floor((Date.now() - (homeworkStartTime || Date.now())) / 1000);

    const data = {
        answers: answers,
        timeTaken: timeTaken,
        tabSwitches: homeworkTabSwitchCount || 0
    };

    console.log('📤 بيانات التسليم:', JSON.stringify(data, null, 2));

    try {
        console.log('📤 تسليم الواجب:', currentHomeworkData._id);
        const response = await fetch(API_BASE + '/api/homework-gs/' + currentHomeworkData._id + '/submit', {
            method: 'POST',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });

        const result = await response.json();
        console.log('📥 رد التسليم:', result);

        if (result.success) {
            showToast(`✅ تم تسليم الواجب بنجاح! نتيجتك: ${result.score}%`, 'success');
            clearHomeworkListeners();
            closeModal('solveHomeworkModal');
            fetchPendingHomeworks();
            if (result.score >= 80) spawnConfetti();
        } else {
            showToast('❌ ' + (result.error || 'فشل في تسليم الواجب'), 'error');
        }
    } catch (error) {
        console.error('❌ خطأ في تسليم الواجب:', error);
        showToast('❌ خطأ في الاتصال بالسيرفر', 'error');
    }
}

    printWindow.document.write(html);

}

// بدء المراجعة الذكية بعد اختيار الفصل
async function startSmartReview() {
    const chapterSelect = document.getElementById('smartReviewChapterSelect');
    selectedSmartReviewChapter = chapterSelect ? chapterSelect.value : 'all';

    closeModal('smartReviewChapterModal');

    try {
        showToast('🔄 جاري تحضير أسئلة المراجعة الذكية...', 'info');

        // جمع الأسئلة من الفصل المختار فقط
        const allQuestions = [];
        const testCategories = ['mcq', 'truefalse', 'complete', 'explain', 'list', 'situations'];

        const chaptersToProcess = selectedSmartReviewChapter === 'all' 
            ? Object.keys(chaptersData) 
            : [selectedSmartReviewChapter];

        for (const key of chaptersToProcess) {
            if (chaptersData.hasOwnProperty(key)) {
                const ch = chaptersData[key];
                for (const cat of testCategories) {
                    if (ch[cat] && Array.isArray(ch[cat])) {
                        for (let i = 0; i < ch[cat].length; i++) {
                            const q = Object.assign({}, ch[cat][i]);
                            q.cat = cat;
                            q.chapterName = ch.name || key;
                            q.questionId = key + '_' + cat + '_' + i;
                            q.chapterId = key;
                            allQuestions.push(q);
                        }
                    }
                }
            }
        }

        console.log(`📚 إجمالي الأسئلة المتاحة في الفصل المختار: ${allQuestions.length}`);

        if (allQuestions.length === 0) {
            showToast('❌ لا توجد أسئلة في هذا الفصل', 'error');
            return;
        }

        // إرسال الأسئلة مع الطلب
        const response = await fetch(API_BASE + '/api/smart-review-gs', {
            method: 'POST',
            credentials: 'include',
            headers: {
                'Content-Type': 'application/json',
                'Cache-Control': 'no-cache'
            },
            body: JSON.stringify({ 
                questions: allQuestions,
                userId: currentUser?.username,
                chapterId: selectedSmartReviewChapter
            })
        });

        console.log('📡 Response status:', response.status);

        if (!response.ok) {
            const error = await response.json();
            console.error('❌ Response error:', error);
            throw new Error(error.error || 'فشل في جلب المراجعة');
        }

        const data = await response.json();

        if (!data.success) {
            throw new Error(data.error || 'فشل في جلب المراجعة');
        }

        const questions = data.questions || [];

        if (questions.length === 0) {
            showToast('🎉 لا توجد أسئلة تحتاج مراجعة في هذا الفصل! أنت متميز!', 'success');

        // تخزين الأسئلة في المتغيرات العامة

        smartReviewCurrentIndex = 0;
        window._currentQuestions = questions;
        window._smartReviewTotal = questions.length;
        window._smartReviewScores = {};

        // عرض واجهة المراجعة
        let h = `
            <h2>🧠 مراجعة ذكية</h2>
            <div style="font-size:0.9rem;color:var(--gold-dark);margin-bottom:8px;font-weight:700;">
                📖 ${data.chapterName || 'جميع الفصول'} | ${questions.length} سؤال

            <div style="display:flex;gap:10px;justify-content:center;margin-top:15px;flex-wrap:wrap;">

// ====================== دالة مقارنة الإجابات المحسنة (10 مستويات) ======================

function isAnswerCorrectSmart(userAnswer, question) {
    if (!userAnswer || !question) return false;

    // تنظيف الإجابات
    const user = String(userAnswer).trim();
    let correct = '';

    // الحصول على الإجابة الصحيحة حسب نوع السؤال
    if (question.cat === 'mcq') {
        correct = String(question.correct || '').trim();
    } else if (question.cat === 'truefalse') {
        correct = String(question.correct || '').trim();
    } else {
        correct = String(question.completion || question.answer || '').trim();
    }

    if (!correct) return false;

    // ========== 1. مقارنة مباشرة ==========
    if (user === correct) return true;

    // ========== 2. مقارنة بعد إزالة المسافات الزائدة ==========
    if (user.replace(/\s+/g, ' ') === correct.replace(/\s+/g, ' ')) return true;

    // ========== 3. مقارنة مع تجاهل حالة الأحرف ==========
    if (user.toLowerCase() === correct.toLowerCase()) return true;

    // ========== 4. مقارنة مع إزالة علامات الترقيم ==========
    const cleanUser = user.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()"']/g, '').trim();
    const cleanCorrect = correct.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()"']/g, '').trim();
    if (cleanUser.toLowerCase() === cleanCorrect.toLowerCase()) return true;

    // ========== 5. مقارنة مع إزالة الأقواس والأرقام ==========
    const cleanUser2 = user.replace(/^[\d\s.)-]+/, '').trim();
    const cleanCorrect2 = correct.replace(/^[\d\s.)-]+/, '').trim();
    if (cleanUser2.toLowerCase() === cleanCorrect2.toLowerCase()) return true;

    // ========== 6. للأسئلة من نوع MCQ (اختيار من متعدد) ==========
    if (question.cat === 'mcq' && question.options) {
        // البحث عن الخيار الصحيح في قائمة الخيارات
        const correctOption = question.options.find(opt => {
            const cleanOpt = opt.replace(/^[\d\s.)-]+/, '').trim();
            return cleanOpt.toLowerCase() === cleanCorrect.toLowerCase();
        });

        if (correctOption) {
            const cleanUserOpt = user.replace(/^[\d\s.)-]+/, '').trim();
            const cleanCorrectOpt = correctOption.replace(/^[\d\s.)-]+/, '').trim();
            if (cleanUserOpt.toLowerCase() === cleanCorrectOpt.toLowerCase()) return true;
        }
    }

    // ========== 7. للأسئلة من نوع True/False ==========
    if (question.cat === 'truefalse') {
        const userLower = user.toLowerCase();
        const correctLower = correct.toLowerCase();

        if (correctLower === 'true' || correctLower === 'صواب' || correctLower === 'صح') {
            return userLower === 'true' || userLower === 'صواب' || userLower === 'صح';
        }
        if (correctLower === 'false' || correctLower === 'خطأ' || correctLower === 'غلط') {
            return userLower === 'false' || userLower === 'خطأ' || userLower === 'غلط';
        }
        return userLower === correctLower;
    }

    // ========== 8. مقارنة بالكلمات المفتاحية (للأسئلة الطويلة) ==========
    if (correct.length > 10 && user.length > 5) {
        const keywords = correct.split(/\s+/)
            .filter(word => word.length > 3)
            .map(word => word.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()"']/g, '').toLowerCase());

        if (keywords.length > 0) {
            const userWords = user.split(/\s+/)
                .filter(word => word.length > 2)
                .map(word => word.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()"']/g, '').toLowerCase());

            let matchCount = 0;
            for (const kw of keywords) {
                for (const uw of userWords) {
                    if (uw.includes(kw) || kw.includes(uw)) {
                        matchCount++;
                        break;
                    }
                }
            }

            if (matchCount / keywords.length >= 0.6) return true;
        }
    }

    // ========== 9. مقارنة جزئية ==========
    if (correct.length > 5 && user.length > 3) {
        const userLower = user.toLowerCase();
        const correctLower = correct.toLowerCase();

        if (correctLower.includes(userLower) || userLower.includes(correctLower)) {
            const shorter = Math.min(userLower.length, correctLower.length);
            const longer = Math.max(userLower.length, correctLower.length);
            if (shorter / longer >= 0.7) return true;
        }
    }

    // ========== 10. مقارنة مع إزالة "ال" والتعريف ==========
    const userNoAl = user.replace(/^(ال|أل|آل)\s*/i, '').trim();
    const correctNoAl = correct.replace(/^(ال|أل|آل)\s*/i, '').trim();
    if (userNoAl.toLowerCase() === correctNoAl.toLowerCase()) return true;

    return false;
}

// ====================== دالة الحصول على الإجابة الصحيحة للعرض ======================

function getFullAnswerSmart(question) {
    if (!question) return '';

    if (question.cat === 'mcq') {
        if (question.options && question.correct) {
            const cleanCorrect = question.correct.replace(/^[\d\s.)-]+/, '').trim();
            const found = question.options.find(opt => {
                const cleanOpt = opt.replace(/^[\d\s.)-]+/, '').trim();
                return cleanOpt.toLowerCase() === cleanCorrect.toLowerCase();
            });
            return found || question.correct;
        }
        return question.correct || '';
    }

    if (question.cat === 'truefalse') {
        const val = String(question.correct || '').toLowerCase();
        if (val === 'true' || val === 'صواب') return 'صواب (True)';
        if (val === 'false' || val === 'خطأ') return 'خطأ (False)';
        return question.correct || '';
    }

    if (question.cat === 'complete') {
        return question.completion || '';
    }

    if (question.cat === 'explain') {
        return question.answer || '';
    }

    return question.completion || question.answer || question.correct || '';
}

function checkSmartReviewAnswer(btn, chosen, index) {

    if (!question) return;

    // تعطيل جميع الأزرار
    const parent = btn.parentElement;
    parent.querySelectorAll('.quiz-opt').forEach(b => b.disabled = true);

    // استخدام دالة المقارنة المحسنة
    const isCorrect = isAnswerCorrectSmart(chosen, question);

    btn.classList.add(isCorrect ? 'correct' : 'wrong');

// ====================== الأدوات المساعدة ======================
function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.appendChild(document.createTextNode(text));
    return div.innerHTML;
}

function getSmartApiBase() {
    if (typeof API_BASE !== 'undefined' && API_BASE && API_BASE.trim() !== '') 
        return API_BASE.trim().replace(/\/+$/, "");
    try {
        return new URL(window.location.href).origin;
    } catch(e) {}
    return '';
}

async function smartFetch(endpoint, options = {}) {
    const api = getSmartApiBase();
    if (!api) throw new Error('NO_BASE|لم يتم تحديد رابط السيرفر');

    try {
        const response = await fetch(api + endpoint, {
            ...options, 
            credentials: 'include',
            headers: { 
                'Content-Type': 'application/json', 
                ...(options.headers || {}) 
            }
        });

        const data = await response.json().catch(() => ({}));

        if (!response.ok) {
            throw new Error('SERVER_ERROR|' + (data.error || `خطأ في الخادم: ${response.status}`));
        }

        return data;
    } catch (error) {
        if (error.message && error.message.includes('|')) throw error;
        throw new Error('NETWORK_ERROR|فشل الاتصال بالخادم، تأكد من اتصالك بالإنترنت');
    }
}

function handleTournamentError(error) {
    const msg = (error.message || 'حدث خطأ غير متوقع').split('|').pop();
    showToast('❌ ' + msg, 'error');
}

// ====================== دالة حوار التأكيد المخصصة ======================
function showConfirmDialog(title, message, confirmText, cancelText) {
    return new Promise((resolve) => {
        const dialogHTML = `
        <div class="confirm-dialog-overlay" id="confirmDialog">
            <div class="confirm-dialog">
                <div class="confirm-dialog-icon">🤔</div>
                <h3>${escapeHtml(title)}</h3>
                <p>${escapeHtml(message).replace(/\n/g, '<br>')}</p>
                <div class="confirm-dialog-actions">
                    <button class="confirm-dialog-btn confirm-dialog-confirm" onclick="resolveConfirm(true)">
                        ${escapeHtml(confirmText || 'نعم')}
                    </button>
                    <button class="confirm-dialog-btn confirm-dialog-cancel" onclick="resolveConfirm(false)">
                        ${escapeHtml(cancelText || 'إلغاء')}
                    </button>
                </div>
            </div>
        </div>`;

        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = dialogHTML;
        document.body.appendChild(tempDiv.firstElementChild);

        window.resolveConfirm = (value) => {
            const dialog = document.getElementById('confirmDialog');
            if (dialog) dialog.remove();
            delete window.resolveConfirm;
            resolve(value);
        };
    });
}

        questions: questions || [], 
        startTime: Date.now(),

        title: title || 'بطولة',

    _tourSelectedAnswers = {};

    renderTournamentQuizPage();
}

                        </span>
                        <span class="quiz-meta-item" id="tourProgress">
                            <i class="fas fa-check-circle"></i> 0/${questions.length} تمت الإجابة
                        </span>
                    </div>
                </div>
            </div>
            <div class="quiz-timer-section">
                <div class="quiz-timer" id="tourTimer">
                    <i class="fas fa-hourglass-half"></i>
                    <span class="timer-display">${String(totalMins).padStart(2, '0')}:${String(totalSecs).padStart(2, '0')}</span>
                </div>
                <button class="quiz-submit-btn" id="tourSubmitBtn" onclick="submitTournamentAnswers(false)">
                    <i class="fas fa-paper-plane"></i> تسليم الإجابات
                </button>
            </div>
        </div>
        
        <!-- شريط التقدم -->
        <div class="quiz-progress-bar">
            <div class="quiz-progress-fill" id="tourProgressBar" style="width: 0%;"></div>
        </div>
        
        <!-- قائمة الأسئلة -->
        <div class="quiz-questions-container" id="tourScrollContainer">`;

    questions.forEach((q, i) => {
        const type = q.cat || 'mcq';
        const badgeMap = {
            truefalse: 'badge-tf', complete: 'badge-complete',
            explain: 'badge-explain', list: 'badge-list',
            situations: 'badge-situation', mcq: 'badge-mcq'
        };
        const badgeClass = badgeMap[type] || 'badge-mcq';

        html += `
        <div class="quiz-question-card" id="tourQ_${i}" data-question-index="${i}">
            <div class="quiz-question-header">
                <span class="question-badge ${badgeClass}">
                    <i class="fas ${getCategoryIcon(type)}"></i> ${getCategoryLabel(type)}
                </span>
                <span class="question-number">سؤال ${i + 1}</span>
            </div>
            
            <div class="quiz-question-text">
                ${escapeHtml(q.text || '')}
            </div>`;

        if (q.translation) {
            html += `
            <div class="quiz-question-translation">
                <i class="fas fa-language"></i> ${escapeHtml(q.translation)}
            </div>`;
        }

        html += `<div class="quiz-answer-area">`;

        if (type === 'mcq' && q.options && q.options.length > 0) {
            html += `<div class="quiz-options-grid">`;
            q.options.forEach((opt, j) => {
                const optionLabel = String.fromCharCode(65 + j); // A, B, C, D...
                html += `
                <button class="quiz-option-btn" 
                        data-qindex="${i}" 
                        data-value="${escapeHtml(opt)}"
                        onclick="selectTournamentOpt(this, ${i})">
                    <span class="option-label">${optionLabel}</span>
                    <span class="option-text">${escapeHtml(opt)}</span>
                </button>`;
            });
            html += `</div>`;
        } else if (type === 'truefalse') {
            html += `
            <div class="quiz-tf-options">
                <button class="quiz-tf-btn quiz-tf-true" 
                        data-qindex="${i}" data-value="صواب"
                        onclick="selectTournamentOpt(this, ${i})">
                    <i class="fas fa-check"></i> صواب (True)
                </button>
                <button class="quiz-tf-btn quiz-tf-false" 
                        data-qindex="${i}" data-value="خطأ"
                        onclick="selectTournamentOpt(this, ${i})">
                    <i class="fas fa-times"></i> خطأ (False)
                </button>
            </div>`;
        } else {
            const placeholder = type === 'complete' ? 'أكمل الجملة هنا...' : 
                               type === 'list' ? 'اكتب النقاط (كل نقطة في سطر)...' : 
                               type === 'explain' ? 'اشرح الإجابة بالتفصيل...' : 
                               'اكتب إجابتك هنا...';
            const minHeight = (type === 'list' || type === 'explain' || type === 'situations') ? 
                              '120px' : '60px';

            html += `
            <textarea class="quiz-text-input" id="tourText_${i}"
                      placeholder="${placeholder}"
                      oninput="updateTourProgress()"
                      style="min-height: ${minHeight};"></textarea>`;
        }

        html += `
            </div>
            <div class="quiz-question-status" id="tourStatus_${i}">
                <i class="fas fa-circle"></i> لم تتم الإجابة بعد
            </div>
        </div>`;
    });

    html += `
        </div>
        
        <!-- زر التسليم السفلي -->
        <div class="quiz-footer">
            <button class="quiz-submit-btn quiz-submit-btn-large" onclick="submitTournamentAnswers(false)">
                <i class="fas fa-paper-plane"></i> تسليم جميع الإجابات
            </button>
        </div>
    </div>`;

    openModal('tournamentQuizModal', html);
    startTournamentTimer();

    // إضافة أنماط CSS ديناميكية
    injectTournamentStyles();
}
