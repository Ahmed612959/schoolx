// ====================== تحديد الإجابة ======================
window.selectTournamentOpt = function(btn, qIndex) {
    if (tournamentSubmitted) return;

    const questionCard = document.getElementById('tourQ_' + qIndex);
    if (!questionCard) return;

    // إزالة التحديد السابق من نفس السؤال
    const allOptions = questionCard.querySelectorAll('.quiz-option-btn, .quiz-tf-btn');
    allOptions.forEach(opt => {
        opt.classList.remove('selected', 'true', 'false');
    });

    // تحديد الزر المضغوط
    if (btn.classList.contains('quiz-tf-btn')) {
        btn.classList.add('selected');
        if (btn.classList.contains('quiz-tf-true')) btn.classList.add('true');
        if (btn.classList.contains('quiz-tf-false')) btn.classList.add('false');
    } else {
        btn.classList.add('selected');
    }

    // تخزين الإجابة
    _tourSelectedAnswers[qIndex] = btn.getAttribute('data-value');

    // تحديث حالة السؤال
    const statusEl = document.getElementById('tourStatus_' + qIndex);
    if (statusEl) {
        statusEl.innerHTML = '<i class="fas fa-check-circle"></i> تمت الإجابة';
        statusEl.classList.add('answered');
    }
    questionCard.classList.add('answered');

    updateTourProgress();
};

// ====================== تحديث التقدم ======================
function updateTourProgress() {
    const questions = tournamentState.questions || [];
    let answered = 0;

    questions.forEach((q, i) => {
        const type = q.cat || 'mcq';
        if (type === 'mcq' || type === 'truefalse') {
            if (_tourSelectedAnswers[i]) answered++;
        } else {
            const el = document.getElementById('tourText_' + i);
            if (el && el.value.trim().length > 0) {
                answered++;
                const statusEl = document.getElementById('tourStatus_' + i);
                const cardEl = document.getElementById('tourQ_' + i);
                if (statusEl) {
                    statusEl.innerHTML = '<i class="fas fa-check-circle"></i> تمت الإجابة';
                    statusEl.classList.add('answered');
                }
                if (cardEl) cardEl.classList.add('answered');
            }
        }
    });

    const progressEl = document.getElementById('tourProgress');
    const progressBar = document.getElementById('tourProgressBar');
    const percentage = questions.length > 0 ? Math.round((answered / questions.length) * 100) : 0;

    if (progressEl) {
        progressEl.innerHTML = `<i class="fas fa-check-circle"></i> ${answered}/${questions.length} تمت الإجابة`;
    }
    if (progressBar) {
        progressBar.style.width = percentage + '%';
    }
}

// ====================== المؤقت ======================
function startTournamentTimer() {
    if (tournamentTimerInterval) clearInterval(tournamentTimerInterval);

    tournamentTimerInterval = setInterval(() => {
        const elapsed = Math.floor((Date.now() - tournamentState.startTime) / 1000);
        const tLeft = Math.max(0, tournamentState.timeLimitSeconds - elapsed);

        if (tLeft <= 0) {
            clearInterval(tournamentTimerInterval);
            showToast('⏰ انتهى الوقت! سيتم التسليم تلقائياً', 'warning');
            setTimeout(() => submitTournamentAnswers(true), 1500);
            return;
        }

        const timerEl = document.getElementById('tourTimer');
        if (timerEl) {
            const m = Math.floor(tLeft / 60);
            const s = tLeft % 60;
            const displayEl = timerEl.querySelector('.timer-display');
            if (displayEl) {
                displayEl.textContent = String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
            }

            // تغيير لون المؤقت
            timerEl.classList.remove('warning', 'danger');
            if (tLeft <= 60) {
                timerEl.classList.add('danger');
            } else if (tLeft <= 180) {
                timerEl.classList.add('warning');
            }

            // تحذير صوتي عند بقاء دقيقة
            if (tLeft === 60 && !tournamentState.warningShown) {
                tournamentState.warningShown = true;
                showToast('⚠️ تبقى دقيقة واحدة فقط!', 'warning');
            }
        }
    }, 1000);
}

// ====================== تسليم الإجابات ======================
async function submitTournamentAnswers(autoSubmit = false) {
    if (tournamentSubmitted) return;

    if (!autoSubmit) {
        const confirmed = await showConfirmDialog(
            '📝 تأكيد التسليم',
            'هل أنت متأكد من تسليم إجاباتك؟\nلن تتمكن من التعديل بعد التسليم.',
            'نعم، سلم الآن',
            'لا، عد للإجابة'
        );
        if (!confirmed) return;
    }

    if (tournamentTimerInterval) clearInterval(tournamentTimerInterval);

    const questions = tournamentState.questions || [];

    // حساب الأسئلة غير المجاب عنها
    let unanswered = 0;
    questions.forEach((q, i) => {
        const type = q.cat || 'mcq';
        if (type === 'mcq' || type === 'truefalse') {
            if (!_tourSelectedAnswers[i]) unanswered++;
        } else {
            const el = document.getElementById('tourText_' + i);
            if (!el || el.value.trim().length === 0) unanswered++;
        }
    });

    if (!autoSubmit && unanswered > 0) {
        const proceed = await showConfirmDialog(
            '⚠️ أسئلة بدون إجابة',
            `لديك ${unanswered} سؤال بدون إجابة.\nهل تريد التسليم على أي حال؟`,
            'سلم على أي حال',
            'عد للإجابة'
        );
        if (!proceed) {
            startTournamentTimer();
            return;
        }
    }

    tournamentSubmitted = true;

    const submitBtn = document.getElementById('tourSubmitBtn');
    const submitBtns = document.querySelectorAll('.quiz-submit-btn');
    submitBtns.forEach(btn => {
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري التصحيح...';
    });

    // جمع وتصحيح الإجابات
    const answers = [];
    let correctCount = 0;

    questions.forEach((q, i) => {
        const type = q.cat || 'mcq';
        let userAnswer = '';
        let isCorrect = false;

        if (type === 'mcq' || type === 'truefalse') {
            userAnswer = _tourSelectedAnswers[i] || '';
        } else {
            const textEl = document.getElementById('tourText_' + i);
            userAnswer = textEl ? textEl.value.trim() : '';
        }

        // التصحيح المحلي
        isCorrect = checkAnswerLocally(q, userAnswer, type);
        if (isCorrect) correctCount++;

        answers.push({ questionIndex: i, answer: userAnswer, isCorrect });
    });

    // تلوين الإجابات
    colorizeAnswers(questions, answers);

    // حساب النتيجة
    const totalQuestions = questions.length;
    const score = totalQuestions > 0 ? Math.round((correctCount / totalQuestions) * 100) : 0;
    const wrongCount = totalQuestions - correctCount;
    const finalTimeTaken = Math.floor((Date.now() - tournamentState.startTime) / 1000);

    // إرسال للخادم
    try {
        const result = await smartFetch(`/api/tournaments-gs/${tournamentState.id}/participate`, {
            method: 'POST',
            body: JSON.stringify({ answers, timeTaken: finalTimeTaken })
        });

        const finalScore = result.score !== undefined ? result.score : score;
        const finalCorrect = result.correctCount !== undefined ? result.correctCount : correctCount;
        const finalWrong = totalQuestions - finalCorrect;
        const rank = result.rank || 0;
        const xpEarned = result.xpEarned || 10;

        showResultModal(finalScore, finalCorrect, finalWrong, finalTimeTaken, rank, xpEarned, false);

        if (typeof addXP === 'function') addXP(xpEarned);
        if (finalScore >= 70) spawnConfetti();

    } catch (error) {
        handleTournamentError(error);
        showResultModal(score, correctCount, wrongCount, finalTimeTaken, 0, 0, true);
    }
}

function checkAnswerLocally(question, userAnswer, type) {
    if (!userAnswer) return false;

    const userAnsLower = userAnswer.trim().toLowerCase();

    switch (type) {
        case 'mcq': {
            const correctAns = String(question.correct || '').trim();
            // مقارنة مباشرة
            if (userAnswer.trim() === correctAns) return true;
            // مقارنة غير حساسة لحالة الأحرف
            if (userAnsLower === correctAns.toLowerCase()) return true;
            // مقارنة مع بداية النص (للإجابات الطويلة)
            if (userAnsLower.startsWith(correctAns.toLowerCase()) && userAnsLower.length >= correctAns.length) return true;
            return false;
        }

        case 'truefalse': {
            const correctIsTrue = (
                question.correct === true || 
                String(question.correct).toLowerCase() === 'true'
            );
            const userIsTrue = ['صواب', 'true', 'صح', 'نعم', 'yes'].includes(userAnsLower);
            const userIsFalse = ['خطأ', 'false', 'غلط', 'لا', 'no'].includes(userAnsLower);

            if (correctIsTrue) return userIsTrue;
            return userIsFalse;
        }

        case 'complete': {
            const completion = String(question.completion || '').trim().toLowerCase();
            if (!completion || userAnsLower.length < 2) return false;

            // تطابق تام
            if (userAnsLower === completion) return true;
            // احتواء
            if (userAnsLower.includes(completion) || completion.includes(userAnsLower)) return true;

            // تحليل الكلمات المفتاحية
            const keywords = completion.split(/\s+/).filter(w => w.length > 3);
            if (keywords.length > 0) {
                const matched = keywords.filter(kw => userAnsLower.includes(kw));
                return (matched.length / keywords.length) >= 0.6;
            }
            return false;
        }

        case 'list': {
            // قائمة: تحقق من وجود 3 نقاط على الأقل
            const lines = userAnsLower.split(/[\n,،]/).filter(l => l.trim().length > 3);
            return lines.length >= 3;
        }

        case 'explain':
        case 'situations': {
            // شرح ومواقف: تحقق من طول الإجابة
            return userAnsLower.length > 15;
        }

        default:
            return userAnsLower.length > 3;
    }
}

function colorizeAnswers(questions, answers) {
    questions.forEach((q, i) => {
        const type = q.cat || 'mcq';
        const ans = answers[i];

        if (type === 'mcq' || type === 'truefalse') {
            const questionCard = document.getElementById('tourQ_' + i);
            if (!questionCard) return;

            const allOptions = questionCard.querySelectorAll('.quiz-option-btn, .quiz-tf-btn');
            allOptions.forEach(btn => {
                btn.disabled = true;
                btn.classList.remove('selected');

                const btnValue = btn.getAttribute('data-value') || '';
                const isCorrectOption = isCorrectAnswer(q, btnValue, type);
                const wasSelected = (_tourSelectedAnswers[i] === btnValue);

                if (isCorrectOption) {
                    btn.classList.add('correct');
                } else if (wasSelected && !isCorrectOption) {
                    btn.classList.add('wrong');
                }
            });
        } else {
            const textEl = document.getElementById('tourText_' + i);
            if (textEl) {
                textEl.disabled = true;
                textEl.classList.add(ans && ans.isCorrect ? 'correct-input' : 'wrong-input');
            }
        }
    });
}

function isCorrectAnswer(question, optionValue, type) {
    if (type === 'mcq') {
        return optionValue.trim() === String(question.correct || '').trim();
    } else if (type === 'truefalse') {
        const correctIsTrue = (
            question.correct === true || 
            String(question.correct).toLowerCase() === 'true'
        );
        return correctIsTrue ? (optionValue === 'صواب') : (optionValue === 'خطأ');
    }
    return false;
}

    const today = new Date();
    const nextWeek = new Date(today);
    nextWeek.setDate(today.getDate() + 7);

    setTimeout(() => {
        const startEl = document.getElementById('tournamentStartDate');
        const endEl = document.getElementById('tournamentEndDate');
        if (startEl) startEl.value = today.toISOString().split('T')[0];
        if (endEl) endEl.value = nextWeek.toISOString().split('T')[0];
        previewTournamentQuestions();
    }, 100);
}

function previewTournamentQuestions() {
    const chapterId = document.getElementById('tournamentChapter')?.value;
    const count = parseInt(document.getElementById('tournamentCount')?.value) || 20;

    if (!chapterId || typeof getAllQuestions !== 'function') return;

    const allQ = getAllQuestions(chapterId, 'all');
    _tournamentQuestions = allQ.sort(() => Math.random() - 0.5).slice(0, Math.min(count, allQ.length));

    const preview = document.getElementById('tournamentQPreview');
    if (!preview) return;

    if (_tournamentQuestions.length === 0) {
        preview.innerHTML = '❌ لا توجد أسئلة متاحة في هذا الفصل';
        preview.className = 'q-preview error';
    } else {
        const typeCounts = {};
        _tournamentQuestions.forEach(q => {
            const label = getCategoryLabel(q.cat || 'mcq');
            typeCounts[label] = (typeCounts[label] || 0) + 1;
        });
        const typeText = Object.entries(typeCounts)
            .map(([k, v]) => `${k}: ${v}`)
            .join(' | ');
        preview.innerHTML = `✅ <strong>${_tournamentQuestions.length} سؤال</strong> تم اختيارهم | ${typeText}`;
        preview.className = 'q-preview success';
    }
}

async function createTournament() {
    const title = document.getElementById('tournamentTitle')?.value.trim();
    const chapterId = document.getElementById('tournamentChapter')?.value;
    const timeLimitMinutes = parseInt(document.getElementById('tournamentTime')?.value) || 10;
    const startDate = document.getElementById('tournamentStartDate')?.value;
    const endDate = document.getElementById('tournamentEndDate')?.value;

    if (!title) return showToast('⚠️ يرجى إدخال عنوان البطولة', 'warning');
    if (!startDate || !endDate) return showToast('⚠️ يرجى تحديد تواريخ البداية والنهاية', 'warning');
    if (startDate > endDate) return showToast('⚠️ تاريخ البداية يجب أن يكون قبل تاريخ النهاية', 'warning');

    previewTournamentQuestions();

    if (_tournamentQuestions.length === 0) {
        return showToast('⚠️ لا توجد أسئلة متاحة في هذا الفصل', 'warning');
    }

    const btn = document.getElementById('createTournamentBtn');
    if (btn) {
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري إنشاء البطولة...';
    }

    try {
        const result = await smartFetch('/api/tournaments-gs', {
            method: 'POST',
            body: JSON.stringify({
                title,
                chapterId,
                chapterName: chaptersData[chapterId]?.name || 'فصل',
                questionCount: _tournamentQuestions.length,
                categoryFilter: 'all',
                timeLimitMinutes,
                startDate,
                endDate,
                questions: _tournamentQuestions
            })
        });

        if (result.success) {
            spawnConfetti();
            showToast('🎉 تم إنشاء البطولة بنجاح! الكود: ' + result.tournament.code, 'success');
            closeModal('createTournamentModal');
            _tournamentQuestions = [];
            fetchActiveTournaments();
        } else {
            showToast('❌ ' + (result.error || 'فشل إنشاء البطولة'), 'error');
        }
    } catch (error) {
        handleTournamentError(error);
    } finally {
        if (btn) {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-rocket"></i> إنشاء البطولة';
        }
    }
}


</script>
