<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏜️ مغامرة الصحراء - بنك الأسئلة التفاعلي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #f0b90b;
            --orange: #f59e0b;
            --red: #ef4444;
            --brown: #8B4513;
            --sand: #f5e6d3;
            --dark: #1a1a2e;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: #1a1408;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            background-image: radial-gradient(ellipse at 30% 20%, #3d2b0a 0%, #1a1408 70%);
        }

        /* شاشة التحميل */
        #loadingScreen {
            position:fixed; top:0; left:0; width:100%; height:100%;
            background:#0d0b06; z-index:9999; display:flex; flex-direction:column;
            align-items:center; justify-content:center; transition:0.5s;
        }
        #loadingScreen.hidden { opacity:0; pointer-events:none; }
        .loader-camel { font-size:4rem; animation: camelWalk 1s infinite; }
        @keyframes camelWalk { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-10px);} }
        .loader-text { color:var(--gold); margin-top:15px; font-weight:700; }

        /* الخلفية المتحركة */
        .stars { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; }
        .star { position:absolute; background:#fff; border-radius:50%; animation: twinkle 2s infinite; }
        @keyframes twinkle { 0%,100%{opacity:0.3;} 50%{opacity:1;} }

        /* الحاوية */
        .container { max-width:1200px; margin:0 auto; padding:15px; position:relative; z-index:2; }

        /* الهيدر */
        .header {
            text-align:center; padding:20px; background:linear-gradient(180deg, rgba(139,69,19,0.5), transparent);
            border-bottom:2px solid var(--gold); margin-bottom:20px;
        }
        .header h1 { font-size:2.2rem; color:var(--gold); text-shadow:0 0 20px rgba(240,185,11,0.6); }
        .header .subtitle { color:#ccc; margin:5px 0; }
        .stats-row { display:flex; justify-content:center; gap:20px; flex-wrap:wrap; margin:15px 0; }
        .stat-box { background:rgba(0,0,0,0.5); border:1px solid var(--gold); border-radius:15px; padding:10px 18px; min-width:90px; }
        .stat-box .val { font-size:1.4rem; font-weight:900; color:var(--gold); }
        .stat-box .lbl { font-size:0.7rem; color:#aaa; }

        /* الخريطة الصحراوية */
        .desert-map {
            position:relative; width:100%; height:480px; background:linear-gradient(180deg, #e8c97a 0%, #d4a74a 30%, #c19a3e 60%, #a67c28 100%);
            border-radius:24px; overflow:hidden; border:4px solid #6b3a0a; box-shadow:0 0 60px rgba(240,185,11,0.2);
            margin:15px 0;
        }
        .dune { position:absolute; background:linear-gradient(180deg, #dbb45c, #b8882e); border-radius:50%; opacity:0.7; }
        .oasis-marker {
            position:absolute; transform:translate(-50%,-50%); z-index:5; text-align:center; cursor:pointer;
            transition:0.3s; filter:drop-shadow(0 4px 6px rgba(0,0,0,0.5));
        }
        .oasis-marker:hover { transform:translate(-50%,-50%) scale(1.2); z-index:10; }
        .oasis-marker .oasis-icon { font-size:2.5rem; display:block; }
        .oasis-marker .oasis-name { background:rgba(0,0,0,0.7); color:var(--gold); padding:2px 10px; border-radius:10px; font-size:0.7rem; white-space:nowrap; margin-top:2px; }
        .oasis-marker.locked { filter:grayscale(100%); opacity:0.5; cursor:not-allowed; }
        .oasis-marker.completed .oasis-name { background:#10b981; color:#fff; }
        .camel-rider { position:absolute; font-size:2rem; z-index:6; pointer-events:none; animation: camelRide 8s infinite; }
        @keyframes camelRide { 0%{left:5%;top:70%;} 50%{left:85%;top:45%;} 100%{left:5%;top:70%;} }

        /* مودال */
        .modal-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; display:none; align-items:center; justify-content:center; backdrop-filter:blur(5px); }
        .modal-overlay.active { display:flex; }
        .modal-content { background:linear-gradient(145deg, #3b2a0f, #1f1406); border:2px solid var(--gold); border-radius:20px; padding:25px; max-width:700px; width:95%; max-height:85vh; overflow-y:auto; position:relative; }
        .close-btn { position:absolute; top:12px; right:12px; background:rgba(255,255,255,0.1); border:none; color:#fff; font-size:1.3rem; width:32px; height:32px; border-radius:50%; cursor:pointer; }
        .close-btn:hover { background:var(--red); }

        /* بطاقات المعركة */
        .battle-scene { text-align:center; }
        .vs-monster { font-size:5rem; animation: monsterFloat 2s infinite; }
        @keyframes monsterFloat { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-15px);} }
        .question-card { background:rgba(255,255,255,0.05); border:1px solid var(--orange); border-radius:15px; padding:15px; margin:12px 0; }
        .option-btn { display:block; width:100%; padding:12px; margin:6px 0; background:rgba(255,255,255,0.08); border:2px solid #5c3a0a; border-radius:10px; color:#fff; cursor:pointer; font-family:'Tajawal',sans-serif; font-size:0.95rem; transition:0.2s; text-align:right; }
        .option-btn:hover { border-color:var(--gold); background:rgba(240,185,11,0.15); }
        .option-btn.correct { border-color:#10b981; background:rgba(16,185,129,0.2); }
        .option-btn.wrong { border-color:var(--red); background:rgba(239,68,68,0.2); }
        .hp-bar { background:#333; height:16px; border-radius:8px; margin:10px 0; overflow:hidden; }
        .hp-fill { height:100%; transition:0.4s; border-radius:8px; }
        .hp-player { background:linear-gradient(90deg, #10b981, #34d399); }
        .hp-monster { background:linear-gradient(90deg, #ef4444, #f87171); }

        /* أزرار */
        .btn { padding:10px 22px; border-radius:25px; border:none; cursor:pointer; font-family:'Tajawal',sans-serif; font-weight:700; font-size:0.9rem; transition:0.3s; display:inline-flex; align-items:center; gap:6px; margin:3px; }
        .btn-gold { background:linear-gradient(135deg, var(--gold), var(--orange)); color:#000; }
        .btn-red { background:linear-gradient(135deg, #dc2626, #b91c1c); color:#fff; }
        .btn-green { background:linear-gradient(135deg, #10b981, #059669); color:#fff; }
        .btn:hover { transform:translateY(-2px); box-shadow:0 8px 20px rgba(0,0,0,0.3); }
        .btn:active { transform:scale(0.95); }

        /* تأثيرات */
        .confetti { position:fixed; pointer-events:none; z-index:3000; animation: confettiFall 2s forwards; }
        @keyframes confettiFall { 0%{opacity:1; transform:translateY(0) rotate(0);} 100%{opacity:0; transform:translateY(100vh) rotate(720deg);} }
        .toast { position:fixed; top:20px; left:50%; transform:translateX(-50%); background:#1f1406; border:2px solid var(--gold); padding:12px 25px; border-radius:30px; z-index:2000; font-weight:700; animation: toastIn 0.4s, toastOut 0.4s 2.5s forwards; }
        @keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(-30px);} to{opacity:1;transform:translateX(-50%) translateY(0);} }
        @keyframes toastOut { from{opacity:1;transform:translateX(-50%) translateY(0);} to{opacity:0;transform:translateX(-50%) translateY(-30px);} }

        @media (max-width:600px) {
            .desert-map { height:320px; }
            .oasis-marker .oasis-icon { font-size:1.8rem; }
        }
    </style>
</head>
<body>

<div id="loadingScreen">
    <div class="loader-camel">🐪</div>
    <div class="loader-text">🏜️ جاري تجهيز رحلتك الصحراوية...</div>
</div>

<div class="stars" id="starsContainer"></div>

<div class="container" id="mainContainer" style="display:none;">
    <div class="header">
        <h1>🏜️ مغامرة الصحراء الأسطورية</h1>
        <p class="subtitle">⚔️ حارب وحوش الجهل واجمع كنوز المعرفة</p>
        <div class="stats-row">
            <div class="stat-box"><span class="val" id="xpVal">0</span><div class="lbl">⭐ خبرة</div></div>
            <div class="stat-box"><span class="val" id="goldVal">0</span><div class="lbl">🪙 ذهب</div></div>
            <div class="stat-box"><span class="val" id="oasisVal">0/6</span><div class="lbl">🏝️ واحات</div></div>
            <div class="stat-box"><span class="val" id="streakVal">0</span><div class="lbl">🔥 تتابع</div></div>
        </div>
    </div>

    <div class="desert-map" id="desertMap">
        <!-- الخريطة تُملأ برمجياً -->
    </div>

    <div style="text-align:center; margin:15px 0;">
        <button class="btn btn-gold" onclick="refreshMap()">🗺️ تحديث</button>
        <button class="btn btn-green" onclick="showAllQuests()">📋 المهام</button>
        <button class="btn btn-red" onclick="resetProgress()">🔄 إعادة</button>
    </div>
</div>

<!-- المودال -->
<div class="modal-overlay" id="modal">
    <div class="modal-content" id="modalContent">
        <button class="close-btn" onclick="closeModal()">✕</button>
        <div id="modalBody"></div>
    </div>
</div>

<script>
// ==================== إعداد البيانات ====================
// الواحات (تمثل فصول الأسئلة)
const OASIS_DATA = [
    { id: 'chapter1', name: 'واحة البداية', icon: '🌴', pos: {x:10, y:80}, chapterKey:'chapter1', unlocked:true, completed:false,
      story:'واحة خضراء في قلب الصحراء... هنا يبدأ طريق المعرفة. شيخ القبيلة ينتظرك ليعلمك أساسيات التمريض.' },
    { id: 'chapter2', name: 'واحة الجراحين', icon: '🏥', pos: {x:28, y:68}, chapterKey:'chapter2', unlocked:false, completed:false,
      story:'خيام طبية ومشارط معقمة... الجراح الماهر يعلمك فن التعقيم والعمليات.' },
    { id: 'chapter3', name: 'كثبان التنفس', icon: '🌬️', pos: {x:48, y:55}, chapterKey:'chapter3', unlocked:false, completed:false,
      story:'رياح الصحراء تحمل أسرار الرئة... الساحرة تعلمك كيف تسمع أصوات التنفس.' },
    { id: 'chapter4', name: 'جبل القلوب', icon: '❤️', pos: {x:68, y:42}, chapterKey:'chapter4', unlocked:false, completed:false,
      story:'جبل بركاني ينبض كالقلب... الحكيم يعلمك قراءة نبضات القلوب.' },
    { id: 'chapter5', name: 'سراب البطن', icon: '🌀', pos: {x:85, y:30}, chapterKey:'chapter5', unlocked:false, completed:false,
      story:'سراب يخفي أمراض الجهاز الهضمي... الطاهي العجوز يكشف أسرار البطن.' },
    { id: 'chapter6', name: 'قلعة الطوارئ', icon: '🏰', pos: {x:50, y:20}, chapterKey:'chapter6', unlocked:false, completed:false,
      story:'قلعة على قمة الكثبان... هنا تتعلم إنقاذ الأرواح في اللحظات الحرجة.' }
];

// حالة اللاعب
let playerData = {
    xp: 0, gold: 0, streak: 0, completedOasis: [], discoveredOasis: ['chapter1'],
    currentOasis: 'chapter1', title: 'رحالة مبتدئ'
};

// تحميل البيانات المحفوظة
try {
    const saved = localStorage.getItem('desert_adventure');
    if (saved) {
        const p = JSON.parse(saved);
        playerData = {...playerData, ...p};
    }
} catch(e) {}

function saveData() {
    localStorage.setItem('desert_adventure', JSON.stringify(playerData));
}

// دمج بيانات الأسئلة من الفصول (إن وجدت)
function getQuestionsFromChapter(chapterKey) {
    if (typeof window[chapterKey] !== 'undefined') {
        const ch = window[chapterKey];
        let allQ = [];
        const categories = ['mcq', 'truefalse', 'complete', 'explain', 'list', 'situations'];
        categories.forEach(cat => {
            if (ch[cat] && Array.isArray(ch[cat])) {
                ch[cat].forEach((q, i) => {
                    allQ.push({...q, cat: cat, chapterName: ch.name || chapterKey, questionId: chapterKey+'_'+cat+'_'+i});
                });
            }
        });
        return allQ;
    }
    return [];
}

// ==================== الخريطة ====================
function renderMap() {
    const map = document.getElementById('desertMap');
    map.innerHTML = '';

    // كثبان رملية
    for (let i=0; i<12; i++) {
        const dune = document.createElement('div');
        dune.className = 'dune';
        const size = 60 + Math.random()*120;
        dune.style.cssText = `width:${size}px; height:${size/2}px; left:${Math.random()*90}%; top:${Math.random()*90}%;`;
        map.appendChild(dune);
    }

    // جمال مسافر
    const camel = document.createElement('div');
    camel.className = 'camel-rider';
    camel.textContent = '🐪';
    map.appendChild(camel);

    // الواحات
    OASIS_DATA.forEach(oasis => {
        if (playerData.discoveredOasis.includes(oasis.id)) oasis.unlocked = true;
        if (playerData.completedOasis.includes(oasis.id)) oasis.completed = true;

        const marker = document.createElement('div');
        marker.className = 'oasis-marker';
        if (!oasis.unlocked) marker.classList.add('locked');
        if (oasis.completed) marker.classList.add('completed');
        marker.style.left = oasis.pos.x + '%';
        marker.style.top = oasis.pos.y + '%';

        marker.innerHTML = `
            <span class="oasis-icon">${oasis.icon}</span>
            <span class="oasis-name">${oasis.name}</span>
            ${oasis.completed ? '<div>✅</div>' : (!oasis.unlocked ? '<div>🔒</div>' : '')}
        `;
        marker.onclick = () => {
            if (oasis.unlocked) openOasis(oasis);
            else showToast('🔒 أكمل الواحة السابقة أولاً!');
        };
        map.appendChild(marker);
    });

    updateStats();
}

// ==================== فتح واحة ====================
function openOasis(oasis) {
    playerData.currentOasis = oasis.id;
    saveData();
    const questions = getQuestionsFromChapter(oasis.chapterKey);
    const qCount = questions.length;

    let html = `
        <div style="text-align:center;">
            <div style="font-size:4rem;">${oasis.icon}</div>
            <h2 style="color:var(--gold);">${oasis.name}</h2>
            <p style="color:#ccc;">${oasis.story}</p>
            <p style="color:var(--orange);">📚 الأسئلة المتاحة: ${qCount} سؤال</p>
    `;

    if (!oasis.completed) {
        html += `
            <button class="btn btn-gold" onclick="startBattle('${oasis.id}')" style="margin:10px;">
                ⚔️ بدء تحدي الواحة (${Math.min(qCount, 8)} أسئلة)
            </button>
        `;
    } else {
        html += `<p style="color:#10b981;">✅ تم تحرير هذه الواحة!</p>`;
    }

    html += `<button class="btn" onclick="closeModal()" style="margin-top:10px;">رجوع</button></div>`;
    document.getElementById('modalBody').innerHTML = html;
    document.getElementById('modal').classList.add('active');
}

// ==================== المعركة (أسئلة) ====================
let battleState = null;

function startBattle(oasisId) {
    const oasis = OASIS_DATA.find(o => o.id === oasisId);
    if (!oasis) return;
    const allQ = getQuestionsFromChapter(oasis.chapterKey);
    if (allQ.length === 0) {
        showToast('⚠️ لا توجد أسئلة متاحة لهذه الواحة');
        return;
    }
    // خلط واختيار 8 أسئلة
    const shuffled = allQ.sort(() => Math.random() - 0.5).slice(0, 8);
    battleState = {
        oasis: oasis,
        questions: shuffled,
        currentIndex: 0,
        playerHP: 100,
        monsterHP: 100,
        correctCount: 0,
        combo: 0
    };
    showBattleQuestion();
}

function showBattleQuestion() {
    if (!battleState) return;
    const q = battleState.questions[battleState.currentIndex];
    if (!q) return endBattle();

    let optionsHTML = '';
    if (q.cat === 'mcq' && q.options) {
        q.options.forEach(opt => {
            const safeOpt = opt.replace(/'/g, "\\'").replace(/"/g, '&quot;');
            optionsHTML += `<button class="option-btn" onclick="answerQuestion('${safeOpt}', '${(q.correct||'').replace(/'/g, "\\'")}')">${opt}</button>`;
        });
    } else if (q.cat === 'truefalse') {
        optionsHTML += `<button class="option-btn" onclick="answerQuestion('true', '${String(q.correct||'true')}')">✅ صواب</button>`;
        optionsHTML += `<button class="option-btn" onclick="answerQuestion('false', '${String(q.correct||'true')}')">❌ خطأ</button>`;
    } else {
        optionsHTML = `
            <input type="text" id="textAnswer" placeholder="اكتب إجابتك..." style="width:100%;padding:10px;border-radius:10px;border:2px solid var(--gold);background:rgba(0,0,0,0.5);color:#fff;font-family:Tajawal;">
            <button class="btn btn-gold" onclick="answerQuestion(document.getElementById('textAnswer').value, '${(q.completion||q.answer||'').replace(/'/g, "\\'")}')">تحقق</button>
        `;
    }

    const progress = Math.round((battleState.currentIndex / battleState.questions.length)*100);

    document.getElementById('modalBody').innerHTML = `
        <div class="battle-scene">
            <div class="vs-monster">🐪 vs 👾</div>
            <div style="display:flex; gap:20px; justify-content:center;">
                <div style="flex:1;">
                    <div>🧑‍⚕️ أنت</div>
                    <div class="hp-bar"><div class="hp-fill hp-player" style="width:${battleState.playerHP}%"></div></div>
                    <span>${battleState.playerHP}/100</span>
                </div>
                <div style="flex:1;">
                    <div>👾 وحش الجهل</div>
                    <div class="hp-bar"><div class="hp-fill hp-monster" style="width:${battleState.monsterHP}%"></div></div>
                    <span>${battleState.monsterHP}/100</span>
                </div>
            </div>
            <div class="progress-bar-container" style="margin:10px 0;"><div style="width:${progress}%; height:6px; background:var(--gold); border-radius:3px;"></div></div>
            <p style="color:#ccc;">سؤال ${battleState.currentIndex+1}/${battleState.questions.length}</p>
            <div class="question-card">
                <strong>${q.text}</strong>
                ${q.translation ? `<p style="color:#aaa; font-size:0.85rem;">${q.translation}</p>` : ''}
            </div>
            <div>${optionsHTML}</div>
            <p style="color:var(--orange);">🔥 كومبو: x${battleState.combo}</p>
        </div>
    `;
    document.getElementById('modal').classList.add('active');
}

function answerQuestion(chosen, correct) {
    if (!battleState) return;
    const isCorrect = checkAnswer(chosen, correct);
    const damage = 10 + (battleState.combo * 3);

    if (isCorrect) {
        battleState.correctCount++;
        battleState.combo++;
        battleState.monsterHP = Math.max(0, battleState.monsterHP - damage);
        playerData.xp += 5 + battleState.combo;
        playerData.gold += 2;
        showToast(`✅ صحيح! -${damage} للوحش`);
        spawnConfetti(10);
    } else {
        battleState.combo = 0;
        battleState.playerHP = Math.max(0, battleState.playerHP - 12);
        showToast(`❌ خطأ! الإجابة: ${correct}`);
    }

    battleState.currentIndex++;

    if (battleState.playerHP <= 0) {
        showToast('💀 لقد هُزمت! حاول مرة أخرى.');
        endBattle(false);
    } else if (battleState.monsterHP <= 0 || battleState.currentIndex >= battleState.questions.length) {
        endBattle(true);
    } else {
        showBattleQuestion();
    }
    saveData();
    updateStats();
}

function checkAnswer(chosen, correct) {
    if (!chosen || !correct) return false;
    const c = String(chosen).trim().toLowerCase();
    const a = String(correct).trim().toLowerCase();
    if (c === a) return true;
    if (a.includes(c) && c.length > 3) return true;
    return false;
}

function endBattle(won = true) {
    if (!battleState) return;
    const oasis = battleState.oasis;
    if (won && battleState.correctCount >= Math.ceil(battleState.questions.length * 0.6)) {
        if (!playerData.completedOasis.includes(oasis.id)) {
            playerData.completedOasis.push(oasis.id);
            playerData.xp += 100;
            playerData.gold += 50;
            // فتح التالية
            const idx = OASIS_DATA.findIndex(o => o.id === oasis.id);
            if (idx < OASIS_DATA.length-1) {
                const next = OASIS_DATA[idx+1];
                if (!playerData.discoveredOasis.includes(next.id)) {
                    playerData.discoveredOasis.push(next.id);
                }
            }
            showToast('🎉 تم تحرير الواحة! +100XP +50 ذهب');
            spawnConfetti(40);
        }
    }
    saveData();
    updateStats();
    refreshMap();
    closeModal();
    battleState = null;
}

// ==================== دوال مساعدة ====================
function showToast(msg) {
    const t = document.createElement('div'); t.className='toast'; t.textContent=msg;
    document.body.appendChild(t); setTimeout(()=>t.remove(), 3000);
}
function spawnConfetti(count=20) {
    for(let i=0;i<count;i++){
        const el=document.createElement('div'); el.className='confetti';
        el.style.left=Math.random()*100+'%';
        el.style.background=['#f0b90b','#f59e0b','#ef4444','#10b981','#8b5cf6'][Math.floor(Math.random()*5)];
        el.style.width=el.style.height=(5+Math.random()*10)+'px';
        el.style.animationDelay=Math.random()*0.5+'s';
        document.body.appendChild(el);
        setTimeout(()=>el.remove(), 2000);
    }
}
function openModal() { document.getElementById('modal').classList.add('active'); }
function closeModal() { document.getElementById('modal').classList.remove('active'); }
function updateStats() {
    document.getElementById('xpVal').textContent = playerData.xp;
    document.getElementById('goldVal').textContent = playerData.gold;
    document.getElementById('oasisVal').textContent = playerData.completedOasis.length + '/' + OASIS_DATA.length;
    document.getElementById('streakVal').textContent = playerData.streak;
}
function refreshMap() { renderMap(); }
function showAllQuests() {
    let html = '<h2>📋 المهام</h2>';
    OASIS_DATA.forEach(o => {
        if (!playerData.discoveredOasis.includes(o.id)) return;
        html += `<div style="background:rgba(255,255,255,0.05); margin:5px 0; padding:10px; border-radius:8px;">
            ${o.icon} ${o.name} ${playerData.completedOasis.includes(o.id)?'✅':''}
            ${!playerData.completedOasis.includes(o.id)?`<button class="btn btn-gold" onclick="closeModal();openOasis(OASIS_DATA.find(x=>x.id==='${o.id}'))">⚔️</button>`:''}
        </div>`;
    });
    document.getElementById('modalBody').innerHTML = html;
    openModal();
}
function resetProgress() {
    if(confirm('إعادة ضبط كل التقدم؟')){
        playerData = {xp:0,gold:0,streak:0,completedOasis:[],discoveredOasis:['chapter1'],currentOasis:'chapter1',title:'رحالة مبتدئ'};
        saveData(); updateStats(); renderMap(); showToast('🔄 تم إعادة الضبط');
    }
}

// نجوم
function createStars() {
    const c = document.getElementById('starsContainer');
    for(let i=0;i<80;i++){
        const s=document.createElement('div'); s.className='star';
        s.style.cssText=`top:${Math.random()*100}%;left:${Math.random()*100}%;width:${1+Math.random()*3}px;height:${1+Math.random()*3}px;animation-delay:${Math.random()*3}s`;
        c.appendChild(s);
    }
}

// ==================== بدء التطبيق ====================
function init() {
    createStars();
    renderMap();
    updateStats();
    document.getElementById('loadingScreen').classList.add('hidden');
    document.getElementById('mainContainer').style.display = 'block';
}
window.addEventListener('load', () => setTimeout(init, 600));
</script>
</body>
</html>
