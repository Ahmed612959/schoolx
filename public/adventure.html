<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🗺️ خريطة المغامرة - معهد رعاية الضبعية</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af5a;
            --gold-dark: #b8943a;
            --dark: #1a3a48;
            --darker: #0e2a35;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(180deg, #0a0a1a 0%, #0f1a2e 30%, #0d1a2d 60%, #0a0a1a 100%);
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
            position: relative;
        }

        /* نجوم متحركة */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: starTwinkle 3s infinite;
        }

        @keyframes starTwinkle {
            0%,
            100% {
                opacity: 0.3;
                transform: scale(1);
            }
            50% {
                opacity: 1;
                transform: scale(1.5);
            }
        }

        /* سفن في الخلفية */
        .bg-ship {
            position: fixed;
            font-size: 2rem;
            opacity: 0.1;
            pointer-events: none;
            z-index: 0;
            animation: bgShipFloat 15s linear infinite;
        }

        @keyframes bgShipFloat {
            0% {
                transform: translateX(-100px) translateY(0);
            }
            50% {
                transform: translateX(calc(100vw + 100px)) translateY(-50px);
            }
            100% {
                transform: translateX(-100px) translateY(0);
            }
        }

        /* الحاوية الرئيسية */
        .main-container {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* شاشة التحميل */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
        }

        .loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-spinner {
            width: 80px;
            height: 80px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            color: var(--gold);
            font-size: 1.2rem;
            font-weight: 700;
        }

        .loading-status {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            margin-top: 10px;
        }

        .loading-bar-container {
            width: 300px;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            margin-top: 15px;
            overflow: hidden;
        }

        .loading-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--gold), #f59e0b);
            border-radius: 10px;
            width: 0%;
            transition: width 0.3s ease;
        }

        /* الهيدر */
        .header {
            text-align: center;
            padding: 30px 20px;
            position: relative;
        }

        .header h1 {
            font-size: 2.5rem;
            color: var(--gold);
            text-shadow: 0 0 30px rgba(212, 175, 90, 0.5);
            margin-bottom: 10px;
        }

        .header .subtitle {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1rem;
            margin-bottom: 5px;
        }

        .header .badge {
            display: inline-block;
            background: rgba(212, 175, 90, 0.2);
            border: 1px solid var(--gold);
            padding: 8px 20px;
            border-radius: 50px;
            color: var(--gold);
            font-weight: 700;
            margin-top: 10px;
        }

        /* شريط الحالة */
        .status-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin: 20px 0;
        }

        .status-item {
            background: rgba(30, 41, 59, 0.8);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 15px 25px;
            text-align: center;
            min-width: 120px;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .status-item:hover {
            border-color: var(--gold);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .status-item .icon {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }
        .status-item .value {
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--gold);
        }
        .status-item .label {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.6);
        }

        /* الخريطة */
        .map-container {
            background: rgba(20, 30, 50, 0.6);
            border-radius: 25px;
            padding: 25px;
            margin: 20px 0;
            border: 3px solid rgba(212, 175, 90, 0.3);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
        }

        .map-title {
            text-align: center;
            color: var(--gold);
            font-size: 1.3rem;
            margin-bottom: 15px;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .map-area {
            position: relative;
            width: 100%;
            height: 520px;
            background: 
                linear-gradient(180deg, #1a3a4a 0%, #0d2535 30%, #1a3a4a 50%, #0d2535 70%, #1a3a4a 100%);
            border-radius: 20px;
            overflow: hidden;
            border: 4px solid #3a1f04;
            box-shadow: 
                inset 0 0 100px rgba(0, 0, 0, 0.5),
                0 0 0 8px rgba(212, 175, 90, 0.2);
        }

        /* تأثير المخطوطة */
        .map-area::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(ellipse at 30% 20%, transparent 40%, rgba(139, 105, 20, 0.4) 100%),
                radial-gradient(ellipse at 70% 80%, transparent 30%, rgba(101, 67, 33, 0.5) 100%),
                repeating-linear-gradient(0deg, transparent, transparent 4px, rgba(139, 105, 20, 0.05) 4px, rgba(139, 105, 20, 0.05) 5px);
            pointer-events: none;
            z-index: 1;
        }

        /* حواف محروقة */
        .map-area::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            box-shadow: inset 0 0 80px rgba(0, 0, 0, 0.6);
            pointer-events: none;
            z-index: 1;
            border-radius: 16px;
        }

        /* خطوط الطول والعرض */
        .map-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .grid-line-h,
        .grid-line-v {
            position: absolute;
            background: rgba(139, 105, 20, 0.08);
        }

        .grid-line-h {
            width: 100%;
            height: 1px;
        }
        .grid-line-v {
            width: 1px;
            height: 100%;
        }

        /* جزر */
        .island-marker {
            position: absolute;
            transform: translate(-50%, -50%);
            z-index: 3;
            text-align: center;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }

        .island-marker:hover {
            z-index: 10;
        }

        .island-marker .island-icon {
            font-size: 2.5rem;
            filter: drop-shadow(3px 3px 3px rgba(0, 0, 0, 0.5));
            transition: all 0.3s;
            display: block;
        }

        .island-marker:hover .island-icon {
            font-size: 3.5rem;
            filter: drop-shadow(0 0 15px rgba(212, 175, 90, 0.8));
        }

        .island-marker .island-name {
            background: rgba(10, 15, 25, 0.9);
            color: var(--gold);
            padding: 3px 10px;
            border-radius: 8px;
            font-size: 0.65rem;
            font-weight: 700;
            white-space: nowrap;
            border: 1px solid rgba(212, 175, 90, 0.3);
            margin-top: 2px;
        }

        .island-marker.completed .island-name {
            background: #10b981;
            color: white;
            border-color: #10b981;
        }

        .island-marker.locked {
            filter: grayscale(90%);
            opacity: 0.4;
            cursor: not-allowed;
        }

        .island-marker.locked:hover .island-icon {
            font-size: 2.5rem;
            filter: grayscale(90%);
        }

        .island-marker.current {
            animation: currentPulse 2s infinite;
        }

        @keyframes currentPulse {
            0%,
            100% {
                filter: drop-shadow(0 0 5px #fbbf24);
            }
            50% {
                filter: drop-shadow(0 0 25px #f59e0b);
            }
        }

        .island-badge {
            font-size: 0.7rem;
            margin-top: 2px;
        }

        /* مخلوقات بحرية */
        .sea-creature {
            position: absolute;
            font-size: 1.5rem;
            opacity: 0.3;
            pointer-events: none;
            z-index: 0;
            animation: creatureFloat 4s ease-in-out infinite;
        }

        @keyframes creatureFloat {
            0%,
            100% {
                transform: translate(0, 0);
            }
            25% {
                transform: translate(15px, -15px);
            }
            50% {
                transform: translate(0, -5px);
            }
            75% {
                transform: translate(-10px, -10px);
            }
        }

        /* بوصلة */
        .compass {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 5;
            font-size: 2.5rem;
            opacity: 0.7;
            filter: drop-shadow(2px 2px 2px rgba(0, 0, 0, 0.5));
        }

        .compass-label {
            position: absolute;
            top: 55px;
            right: 42px;
            z-index: 5;
            color: #3a1f04;
            font-weight: 900;
            font-size: 0.7rem;
        }

        /* سفينة اللاعب */
        .player-ship {
            position: absolute;
            font-size: 1.8rem;
            z-index: 4;
            pointer-events: none;
            animation: shipBob 3s ease-in-out infinite;
        }

        @keyframes shipBob {
            0%,
            100% {
                transform: translate(-50%, -50%) rotate(-3deg) translateY(0);
            }
            25% {
                transform: translate(-50%, -50%) rotate(0deg) translateY(-5px);
            }
            50% {
                transform: translate(-50%, -50%) rotate(3deg) translateY(0);
            }
            75% {
                transform: translate(-50%, -50%) rotate(0deg) translateY(5px);
            }
        }

        /* مسارات متقطعة */
        .map-paths {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* أزرار التحكم */
        .controls {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin: 20px 0;
        }

        .btn {
            padding: 12px 25px;
            border-radius: 50px;
            border: 2px solid transparent;
            cursor: pointer;
            font-family: 'Tajawal', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            transition: all 0.3s;
            color: white;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-map {
            background: linear-gradient(135deg, #0369a1, #0284c7);
            border-color: rgba(255, 255, 255, 0.3);
        }
        .btn-quests {
            background: linear-gradient(135deg, #10b981, #059669);
            border-color: rgba(255, 255, 255, 0.3);
        }
        .btn-achievements {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            border-color: rgba(255, 255, 255, 0.3);
        }
        .btn-daily {
            background: linear-gradient(135deg, #ec4899, #db2777);
            border-color: rgba(255, 255, 255, 0.3);
        }
        .btn-back {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }
        .btn-danger {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            border-color: rgba(255, 255, 255, 0.3);
        }
        .btn-purple {
            background: linear-gradient(135deg, #7c3aed, #6d28d9);
            border-color: rgba(255, 255, 255, 0.3);
        }

        /* مودال */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }

        .modal-overlay.active {
            display: flex;
            animation: modalFadeIn 0.3s ease;
        }

        @keyframes modalFadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .modal-content {
            background: linear-gradient(180deg, #1a2a3a, #0f1a2a);
            border-radius: 25px;
            padding: 30px;
            max-width: 700px;
            width: 95%;
            max-height: 85vh;
            overflow-y: auto;
            text-align: center;
            border: 3px solid var(--gold);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7), 0 0 40px rgba(212, 175, 90, 0.2);
            position: relative;
            animation: modalSlideUp 0.4s ease;
        }

        @keyframes modalSlideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-content h2 {
            color: var(--gold);
            margin-bottom: 15px;
            font-size: 1.5rem;
        }

        .modal-content .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content .close-btn:hover {
            background: rgba(239, 68, 68, 0.5);
            transform: rotate(90deg);
        }

        /* شريط التقدم */
        .progress-bar-container {
            background: rgba(255, 255, 255, 0.1);
            height: 8px;
            border-radius: 10px;
            margin: 10px 0;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--gold), #f59e0b);
            border-radius: 10px;
            transition: width 0.5s ease;
        }

        /* بطاقة مهمة */
        .quest-card {
            background: rgba(30, 41, 59, 0.8);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 15px;
            margin: 10px 0;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .quest-card:hover {
            border-color: var(--gold);
            transform: translateX(-5px);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }

        .quest-card .quest-icon {
            font-size: 2.5rem;
        }
        .quest-card .quest-info {
            flex: 1;
            text-align: right;
        }
        .quest-card .quest-name {
            color: white;
            font-weight: 700;
            font-size: 1rem;
        }
        .quest-card .quest-desc {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.8rem;
        }
        .quest-card .quest-reward {
            color: var(--gold);
            font-size: 0.8rem;
            margin-top: 3px;
        }

        /* إشعار */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #1a3a4a, #0f1a2a);
            border: 2px solid var(--gold);
            padding: 15px 30px;
            border-radius: 50px;
            z-index: 2000;
            color: white;
            font-weight: 700;
            animation: toastIn 0.5s ease, toastOut 0.5s ease 2.5s forwards;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
        @keyframes toastOut {
            from {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
            to {
                opacity: 0;
                transform: translateX(-50%) translateY(-50px);
            }
        }

        /* جسيمات */
        .particle {
            position: fixed;
            pointer-events: none;
            z-index: 3000;
            animation: particleFall 2s ease-out forwards;
            border-radius: 50%;
        }

        @keyframes particleFall {
            0% {
                opacity: 1;
                transform: translate(0, 0) rotate(0deg) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(var(--dx), var(--dy)) rotate(720deg) scale(0);
            }
        }

        /* زر العودة للرئيسية */
        .back-home {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 999;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Tajawal', sans-serif;
            font-size: 0.85rem;
            transition: all 0.3s;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(10px);
        }

        .back-home:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: var(--gold);
            transform: translateY(-2px);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.5rem;
            }
            .map-area {
                height: 350px;
            }
            .status-bar {
                gap: 8px;
            }
            .status-item {
                padding: 10px 15px;
                min-width: 80px;
            }
            .status-item .value {
                font-size: 1.1rem;
            }
            .island-marker .island-icon {
                font-size: 1.8rem;
            }
            .island-marker:hover .island-icon {
                font-size: 2.2rem;
            }
            .island-marker .island-name {
                font-size: 0.5rem;
                padding: 2px 6px;
            }
            .btn {
                padding: 8px 15px;
                font-size: 0.75rem;
            }
            .modal-content {
                padding: 20px;
                max-width: 95%;
            }
        }

        @media (max-width: 480px) {
            .status-bar {
                gap: 4px;
            }
            .status-item {
                padding: 8px 10px;
                min-width: 60px;
            }
            .status-item .value {
                font-size: 0.9rem;
            }
            .status-item .label {
                font-size: 0.6rem;
            }
            .map-area {
                height: 280px;
            }
            .island-marker .island-icon {
                font-size: 1.5rem;
            }
            .controls {
                gap: 6px;
            }
            .btn {
                padding: 6px 10px;
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>

    <!-- شاشة التحميل -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-spinner"></div>
        <div class="loading-text">🏴‍☠️ جاري تجهيز المغامرة...</div>
        <div class="loading-status" id="loadingStatus">تحميل الملفات...</div>
        <div class="loading-bar-container">
            <div class="loading-bar-fill" id="loadingBar"></div>
        </div>
    </div>

    <!-- نجوم الخلفية -->
    <div class="stars" id="starsContainer"></div>

    <!-- سفن خلفية -->
    <div class="bg-ship" style="top:15%;left:-100px;animation-delay:0s;">⛵</div>
    <div class="bg-ship" style="top:55%;left:-100px;animation-delay:5s;font-size:1.5rem;">🛶</div>
    <div class="bg-ship" style="top:75%;left:-100px;animation-delay:10s;font-size:1.8rem;">⛵</div>

    <!-- زر العودة للصفحة الرئيسية -->
    <a href="Medical%20Surgical%20Nursing%20Bank.html" class="back-home">🏠 الرئيسية</a>

    <!-- الحاوية الرئيسية -->
    <div class="main-container" id="mainContainer" style="display:none;">
        <!-- الهيدر -->
        <div class="header">
            <h1>🗺️ خريطة المغامرة الأسطورية</h1>
            <p class="subtitle">⚓ أبحر في بحر المعرفة واكتشف أسرار التمريض</p>
            <div class="badge" id="adventurerTitle">🏴‍☠️ Ancient Pirate Map</div>
        </div>

        <!-- شريط الحالة -->
        <div class="status-bar" id="statusBar">
            <div class="status-item">
                <div class="icon">⭐</div>
                <div class="value" id="xpDisplay">0</div>
                <div class="label">نقاط الخبرة</div>
            </div>
            <div class="status-item">
                <div class="icon">🪙</div>
                <div class="value" id="goldDisplay">0</div>
                <div class="label">قطع ذهبية</div>
            </div>
            <div class="status-item">
                <div class="icon">🏝️</div>
                <div class="value" id="islandsDisplay">0/6</div>
                <div class="label">جزر مكتملة</div>
            </div>
            <div class="status-item">
                <div class="icon">🔥</div>
                <div class="value" id="streakDisplay">0</div>
                <div class="label">تتابع (أيام)</div>
            </div>
            <div class="status-item">
                <div class="icon">💎</div>
                <div class="value" id="artifactsDisplay">0</div>
                <div class="label">كنوز</div>
            </div>
        </div>

        <!-- الخريطة -->
        <div class="map-container">
            <div class="map-title">🗺️ Mare Medicinae ~ بحر المعرفة</div>
            <div class="map-area" id="mapArea">
                <!-- البوصلة -->
                <div class="compass">🧭</div>
                <div class="compass-label">N</div>
                <!-- الجزر تتضاف هنا -->
            </div>
        </div>

        <!-- أزرار التحكم -->
        <div class="controls">
            <button class="btn btn-map" onclick="refreshMap()">🗺️ تحديث الخريطة</button>
            <button class="btn btn-quests" onclick="viewAllQuests()">📋 سجل المهام</button>
            <button class="btn btn-achievements" onclick="viewAchievements()">🏆 الإنجازات</button>
            <button class="btn btn-daily" onclick="viewDailyReward()">🎁 المكافأة اليومية</button>
            <button class="btn btn-purple" onclick="viewCharacter()">👤 شخصيتي</button>
            <button class="btn btn-danger" onclick="resetAdventure()">🔄 إعادة المغامرة</button>
        </div>
    </div>

    <!-- المودال -->
    <div class="modal-overlay" id="mainModal">
        <div class="modal-content" id="modalContent">
            <button class="close-btn" onclick="closeAdventureModal()">✕</button>
            <div id="modalBody"></div>
        </div>
    </div>

    <!-- ==================== تحميل ملفات المغامرة ==================== -->
    <script>
        // ===== نظام تحميل الملفات =====
        var SystemLoader = {
            totalFiles: 5,
            loadedFiles: 0,
            files: [
                { name: 'ancient-map-core.js', system: 'AncientMap', label: 'النظام الأساسي' },
                { name: 'ancient-map-rewards.js', system: 'AncientAchievements', label: 'المكافآت والإنجازات' },
                { name: 'ancient-map-characters.js', system: 'AncientCharacters', label: 'الشخصيات والمشاهد' },
                { name: 'ancient-map-quests.js', system: 'AncientQuests', label: 'المهام والمغامرات' },
                { name: 'ancient-map-adventure.js', system: 'AncientBattle', label: 'المعارك' }
            ],

            loadAll: function() {
                var self = this;
                console.log('🚀 بدء تحميل ملفات المغامرة...');
                this.updateLoadingBar(0);
                this.updateLoadingStatus('جاري تحميل الملفات...');

                var promises = this.files.map(function(file, index) {
                    return self.loadScript(file).then(function() {
                        self.updateLoadingBar(((index + 1) / self.totalFiles) * 100);
                        self.updateLoadingStatus('تم تحميل: ' + file.label);
                    });
                });

                Promise.all(promises).then(function() {
                    console.log('✅ جميع الملفات (' + self.totalFiles + ') تم تحميلها بنجاح!');
                    self.updateLoadingBar(100);
                    self.updateLoadingStatus('✅ جميع الأنظمة جاهزة!');
                    setTimeout(function() {
                        self.hideLoading();
                        self.initPage();
                    }, 500);
                }).catch(function(error) {
                    console.error('❌ فشل تحميل الملفات:', error);
                    self.updateLoadingStatus('❌ فشل التحميل - تأكد من وجود جميع الملفات');
                    // عرض رسالة خطأ
                    setTimeout(function() {
                        document.getElementById('loadingStatus').innerHTML = 
                            '❌ فشل تحميل الملفات!<br><small>تأكد من وجود الملفات في نفس المجلد</small>';
                    }, 1000);
                });
            },

            loadScript: function(file) {
                return new Promise(function(resolve, reject) {
                    // التحقق إذا كان النظام محمل بالفعل
                    if (file.system && window[file.system]) {
                        console.log('⏭️ ' + file.label + ' محمل مسبقاً');
                        resolve();
                        return;
                    }

                    var script = document.createElement('script');
                    script.src = file.name;
                    script.onload = function() {
                        console.log('✅ ' + file.label + ' (' + file.name + ')');
                        resolve();
                    };
                    script.onerror = function() {
                        console.error('❌ فشل تحميل: ' + file.name);
                        // نجرب مسار نسبي مختلف
                        if (!file.name.startsWith('./')) {
                            var script2 = document.createElement('script');
                            script2.src = './' + file.name;
                            script2.onload = function() {
                                console.log('✅ ' + file.label + ' (مسار نسبي)');
                                resolve();
                            };
                            script2.onerror = function() {
                                reject(new Error('فشل تحميل ' + file.name));
                            };
                            document.head.appendChild(script2);
                        } else {
                            reject(new Error('فشل تحميل ' + file.name));
                        }
                    };
                    document.head.appendChild(script);
                });
            },

            updateLoadingBar: function(percent) {
                var bar = document.getElementById('loadingBar');
                if (bar) bar.style.width = percent + '%';
            },

            updateLoadingStatus: function(text) {
                var status = document.getElementById('loadingStatus');
                if (status) status.textContent = text;
            },

            hideLoading: function() {
                var loading = document.getElementById('loadingScreen');
                var main = document.getElementById('mainContainer');
                if (loading) loading.classList.add('hidden');
                if (main) main.style.display = 'block';
                setTimeout(function() {
                    if (loading) loading.style.display = 'none';
                }, 500);
            },

            initPage: function() {
                console.log('🎮 تهيئة صفحة المغامرة...');
                if (typeof initAdventurePage === 'function') {
                    initAdventurePage();
                }
            }
        };

        // بدء التحميل
        SystemLoader.loadAll();
    </script>

    <!-- ==================== كود صفحة المغامرة ==================== -->
    <script>
        // ==================== دوال مساعدة ====================
        function showAdventureToast(message, type) {
            var toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            if (type === 'error') toast.style.borderColor = '#ef4444';
            if (type === 'success') toast.style.borderColor = '#10b981';
            document.body.appendChild(toast);
            setTimeout(function() { toast.remove(); }, 3000);
        }

        function spawnAdventureParticles(x, y, count, color) {
            count = count || 40;
            color = color || '#fbbf24';
            for (var i = 0; i < count; i++) {
                var p = document.createElement('div');
                p.className = 'particle';
                var angle = Math.random() * Math.PI * 2;
                var distance = 50 + Math.random() * 150;
                var size = 4 + Math.random() * 10;
                p.style.cssText = [
                    'left:' + x + 'px',
                    'top:' + y + 'px',
                    'width:' + size + 'px',
                    'height:' + size + 'px',
                    'background:' + color,
                    '--dx:' + (Math.cos(angle) * distance) + 'px',
                    '--dy:' + (Math.sin(angle) * distance) + 'px',
                    'animation-delay:' + Math.random() * 0.5 + 's',
                    'box-shadow:0 0 ' + (size * 2) + 'px ' + color
                ].join(';');
                document.body.appendChild(p);
                setTimeout(function() { p.remove(); }, 2500);
            }
        }

        function openAdventureModal(content) {
            document.getElementById('modalBody').innerHTML = content;
            document.getElementById('mainModal').classList.add('active');
        }

        function closeAdventureModal() {
            document.getElementById('mainModal').classList.remove('active');
        }

        // إغلاق بالنقر خارج المودال
        document.getElementById('mainModal').addEventListener('click', function(e) {
            if (e.target === this) closeAdventureModal();
        });

        // ==================== الوصول للنظام ====================
        function getAdventurer() {
            if (window.AncientMap && window.AncientMap.adventurer) {
                return window.AncientMap.adventurer;
            }
            return null;
        }

        function getIslands() {
            if (window.AncientMap && window.AncientMap.islands) {
                return window.AncientMap.islands;
            }
            return [];
        }

        function isSystemReady() {
            return !!(window.AncientMap && window.AncientMap.adventurer && window.AncientMap.islands);
        }

        // ==================== عرض الخريطة ====================
        function refreshMap() {
            if (!isSystemReady()) {
                showAdventureToast('⏳ النظام لم يكتمل تحميله بعد...', 'error');
                return;
            }
            closeAdventureModal();
            renderMap();
            showAdventureToast('🗺️ تم تحديث الخريطة');
        }

        function renderMap() {
            if (!isSystemReady()) return;

            var mapArea = document.getElementById('mapArea');
            var adventurer = getAdventurer();
            var islands = getIslands();

            // تحديث حالة الجزر
            islands.forEach(function(island) {
                if (adventurer.discoveredIslands && adventurer.discoveredIslands.indexOf(island.id) !== -1) {
                    island.unlocked = true;
                }
                if (adventurer.completedIslands && adventurer.completedIslands.indexOf(island.id) !== -1) {
                    island.completed = true;
                }
            });

            // حفظ المراجع المهمة
            var compassEl = mapArea.querySelector('.compass');
            var compassLabel = mapArea.querySelector('.compass-label');

            // مسح الخريطة
            mapArea.innerHTML = '';

            // إعادة المراجع
            if (compassEl) mapArea.appendChild(compassEl);
            if (compassLabel) mapArea.appendChild(compassLabel);

            // إضافة شبكة الخطوط
            var grid = document.createElement('div');
            grid.className = 'map-grid';
            for (var i = 10; i < 100; i += 15) {
                var hLine = document.createElement('div');
                hLine.className = 'grid-line-h';
                hLine.style.top = i + '%';
                grid.appendChild(hLine);

                var vLine = document.createElement('div');
                vLine.className = 'grid-line-v';
                vLine.style.left = i + '%';
                grid.appendChild(vLine);
            }
            mapArea.appendChild(grid);

            // مخلوقات بحرية
            var creatures = [
                { x: 12, y: 55, icon: '🐋', size: '2rem', delay: 0 },
                { x: 65, y: 75, icon: '🦑', size: '1.8rem', delay: 0.5 },
                { x: 48, y: 25, icon: '🐙', size: '1.5rem', delay: 1 },
                { x: 88, y: 55, icon: '🦈', size: '2rem', delay: 1.5 },
                { x: 30, y: 65, icon: '🐠', size: '1.2rem', delay: 2 },
                { x: 75, y: 40, icon: '🐢', size: '1.3rem', delay: 0.8 },
                { x: 20, y: 35, icon: '🦀', size: '1rem', delay: 1.2 }
            ];
            creatures.forEach(function(c) {
                var el = document.createElement('div');
                el.className = 'sea-creature';
                el.style.cssText = 'left:' + c.x + '%;top:' + c.y + '%;font-size:' + c.size +
                    ';animation-delay:' + c.delay + 's;';
                el.textContent = c.icon;
                mapArea.appendChild(el);
            });

            // مسارات بين الجزر
            var svgNS = 'http://www.w3.org/2000/svg';
            var svg = document.createElementNS(svgNS, 'svg');
            svg.setAttribute('style',
                'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1;');
            for (var i = 0; i < islands.length - 1; i++) {
                if (!islands[i].unlocked) continue;
                var from = islands[i].position;
                var to = islands[i + 1].position;
                var line = document.createElementNS(svgNS, 'line');
                line.setAttribute('x1', from.x + '%');
                line.setAttribute('y1', from.y + '%');
                line.setAttribute('x2', to.x + '%');
                line.setAttribute('y2', to.y + '%');
                line.setAttribute('stroke', islands[i + 1].unlocked ? '#3a1f04' : '#5c4a2a');
                line.setAttribute('stroke-width', islands[i + 1].unlocked ? '2' : '1');
                line.setAttribute('stroke-dasharray', islands[i + 1].unlocked ? '8,4' : '12,6');
                line.setAttribute('opacity', islands[i + 1].unlocked ? '0.5' : '0.2');
                svg.appendChild(line);
            }
            mapArea.appendChild(svg);

            // إضافة الجزر
            islands.forEach(function(island) {
                var marker = document.createElement('div');
                marker.className = 'island-marker';
                if (island.completed) marker.classList.add('completed');
                if (!island.unlocked) marker.classList.add('locked');
                if (adventurer.currentPosition && adventurer.currentPosition.island === island.id && !
                    island.completed) {
                    marker.classList.add('current');
                }

                marker.style.cssText = 'left:' + island.position.x + '%;top:' + island.position.y + '%;';

                var badgesHTML = '';
                if (island.completed) badgesHTML += '<div class="island-badge">✅</div>';
                if (!island.unlocked) badgesHTML += '<div class="island-badge">🔒</div>';

                marker.innerHTML =
                    '<span class="island-icon">' + island.icon + '</span>' +
                    '<div class="island-name">' + island.name + '</div>' +
                    badgesHTML;

                marker.onclick = function() {
                    if (island.unlocked) {
                        if (window.AncientMap && window.AncientMap.openIsland) {
                            window.AncientMap.openIsland(island.id);
                        } else {
                            openIslandLocal(island);
                        }
                    } else {
                        showAdventureToast('🔒 هذه الجزيرة مقفلة! أكمل الجزر السابقة أولاً.', 'error');
                    }
                };

                mapArea.appendChild(marker);
            });

            // سفينة اللاعب
            if (adventurer.currentPosition) {
                var ship = document.createElement('div');
                ship.className = 'player-ship';
                ship.style.cssText = 'left:' + adventurer.currentPosition.x + '%;top:' + adventurer.currentPosition
                    .y + '%;';
                ship.textContent = '⛵';
                mapArea.appendChild(ship);
            }

            // إعادة البوصلة للأمام
            if (compassEl) mapArea.appendChild(compassEl);
            if (compassLabel) mapArea.appendChild(compassLabel);

            updateStatusBar();
        }

        // ==================== فتح جزيرة (محلي) ====================
        function openIslandLocal(island) {
            var adventurer = getAdventurer();
            if (!adventurer) return;

            var h = '<div style="text-align:center;">';
            h += '<div style="font-size:5rem;">' + island.icon + '</div>';
            h += '<h2 style="color:#fbbf24;">' + island.name + '</h2>';
            h += '<p style="color:#94a3b8;">' + (island.subtitle || '') + '</p>';
            h += '<p>🌤️ ' + (island.weather || 'مشمس') + ' | 🕐 ' + (island.timeOfDay || 'نهار') + '</p>';

            if (island.story) {
                h += '<div style="background:rgba(30,41,59,0.8);padding:15px;border-radius:10px;margin:10px 0;white-space:pre-line;line-height:2;text-align:right;font-size:0.9rem;">' +
                    island.story + '</div>';
            }

            // مهام
            if (island.quests && island.quests.length > 0) {
                h += '<h3 style="color:#fbbf24;margin-top:15px;">📋 المهام المتاحة:</h3>';
                island.quests.forEach(function(quest) {
                    h += '<div class="quest-card" onclick="startQuestLocal(\'' + island.id + '\',\'' + quest
                        .id + '\')">';
                    h += '<div class="quest-icon">' + quest.icon + '</div>';
                    h += '<div class="quest-info">';
                    h += '<div class="quest-name">' + quest.name + '</div>';
                    h += '<div class="quest-desc">' + (quest.description || quest.type || '') + '</div>';
                    h += '<div class="quest-reward">⭐ +' + quest.xpReward + ' XP | 🪙 +' + quest.goldReward +
                        ' ذهب</div>';
                    h += '</div>';
                    h += '</div>';
                });
            }

            // أزرار
            if (!island.completed) {
                h += '<button class="btn btn-quests" onclick="completeIslandLocal(\'' + island.id +
                    '\')" style="width:100%;margin-top:15px;">✅ إكمال الجزيرة (+200 XP)</button>';
            } else {
                h += '<p style="color:#10b981;font-weight:700;margin-top:10px;">✅ تم إكمال هذه الجزيرة!</p>';
            }

            h += '<button class="btn btn-back" onclick="closeAdventureModal()" style="width:100%;margin-top:10px;">العودة للخريطة</button>';
            h += '</div>';

            openAdventureModal(h);
        }

        // ==================== بدء مهمة ====================
        function startQuestLocal(islandId, questId) {
            var islands = getIslands();
            var island = islands.find(function(is) { return is.id === islandId; });
            if (!island) return;

            var quest = island.quests.find(function(q) { return q.id === questId; });
            if (!quest) return;

            if (quest.type === 'dialogue') {
                startDialogueQuest(quest);
            } else if (quest.type === 'explore') {
                startExploreQuest(quest);
            } else {
                // مكافأة فورية
                giveReward(quest.xpReward, quest.goldReward);
                spawnAdventureParticles(window.innerWidth / 2, window.innerHeight / 2, 40, '#fbbf24');
                showAdventureToast('✅ اكتملت المهمة! +' + quest.xpReward + ' XP', 'success');
                closeAdventureModal();
                renderMap();
            }
        }

        function startDialogueQuest(quest) {
            var steps = quest.steps || [];
            var currentStep = 0;

            function showStep() {
                if (currentStep >= steps.length) {
                    giveReward(quest.xpReward, quest.goldReward);
                    spawnAdventureParticles(window.innerWidth / 2, window.innerHeight / 2, 50, '#fbbf24');
                    showAdventureToast('✅ اكتملت المهمة! +' + quest.xpReward + ' XP', 'success');
                    closeAdventureModal();
                    renderMap();
                    return;
                }

                var h = '<div style="text-align:center;padding:20px;">';
                h += '<div style="font-size:4rem;">' + quest.icon + '</div>';
                h += '<h3 style="color:#fbbf24;">' + quest.name + '</h3>';

                // شريط تقدم
                var progress = Math.round((currentStep / steps.length) * 100);
                h += '<div class="progress-bar-container">';
                h += '<div class="progress-bar-fill" style="width:' + progress + '%;"></div>';
                h += '</div>';

                h += '<div style="background:rgba(30,41,59,0.9);border-radius:15px;padding:20px;margin:15px 0;border:2px solid #fbbf24;">';
                h += '<p style="color:white;font-size:1.1rem;">' + steps[currentStep] + '</p>';
                h += '</div>';
                h += '<p style="color:#94a3b8;">الخطوة ' + (currentStep + 1) + '/' + steps.length + '</p>';
                h +=
                    '<button class="btn btn-map" onclick="window._advanceDialogue()" style="padding:10px 30px;">⏭️ التالي</button>';
                h += '</div>';

                openAdventureModal(h);
                window._dialogueCurrentStep = currentStep;
                window._dialogueSteps = steps;
                window._dialogueQuest = quest;
            }

            window._advanceDialogue = function() {
                currentStep = (window._dialogueCurrentStep || 0) + 1;
                window._dialogueCurrentStep = currentStep;
                showStep();
            };

            showStep();
        }

        function startExploreQuest(quest) {
            var locations = quest.locations || [];
            var found = 0;

            var h = '<div style="text-align:center;padding:20px;">';
            h += '<h3 style="color:#fbbf24;">🔍 ' + quest.name + '</h3>';
            h += '<p style="color:#94a3b8;">اكتشف ' + locations.length + ' أماكن في الجزيرة</p>';
            h += '<p style="color:#fbbf24;">تم العثور: <span id="localExpCount">0</span>/' + locations.length +
            '</p>';
            h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:15px;">';

            locations.forEach(function(loc, i) {
                h += '<div id="localExpLoc-' + i +
                    '" onclick="window._exploreLocal(' + i + ')" style="background:#1a3a4a;border:2px solid #fbbf24;border-radius:10px;padding:15px;cursor:pointer;transition:all 0.3s;">';
                h += '<div style="font-size:2rem;">🔍</div><div style="color:white;">؟؟؟</div></div>';
            });

            h += '</div></div>';
            openAdventureModal(h);

            window._localExploreLocations = locations;
            window._localExploreFound = 0;
            window._localExploreTotal = locations.length;
            window._localExploreQuest = quest;

            window._exploreLocal = function(idx) {
                var loc = window._localExploreLocations[idx];
                var el = document.getElementById('localExpLoc-' + idx);

                if (el && !el.classList.contains('found')) {
                    el.classList.add('found');
                    el.innerHTML = '<div style="font-size:2rem;">✅</div><div style="color:#10b981;font-weight:700;">' +
                        loc + '</div>';
                    el.style.borderColor = '#10b981';
                    el.style.background = 'rgba(16,185,129,0.2)';
                    el.onclick = null;

                    window._localExploreFound++;
                    document.getElementById('localExpCount').textContent = window._localExploreFound;

                    if (window._localExploreFound >= window._localExploreTotal) {
                        var q = window._localExploreQuest;
                        setTimeout(function() {
                            giveReward(q.xpReward, q.goldReward);
                            spawnAdventureParticles(window.innerWidth / 2, window.innerHeight / 2, 60,
                                '#10b981');
                            showAdventureToast('✅ تم استكشاف كل الأماكن! +' + q.xpReward + ' XP',
                                'success');
                            closeAdventureModal();
                            renderMap();
                        }, 800);
                    }
                }
            };
        }

        // ==================== إكمال جزيرة ====================
        function completeIslandLocal(islandId) {
            var adventurer = getAdventurer();
            var islands = getIslands();
            var island = islands.find(function(is) { return is.id === islandId; });

            if (!island || island.completed) return;

            island.completed = true;
            if (!adventurer.completedIslands) adventurer.completedIslands = [];
            if (adventurer.completedIslands.indexOf(islandId) === -1) {
                adventurer.completedIslands.push(islandId);
            }

            // فتح التالية
            var idx = islands.indexOf(island);
            if (idx < islands.length - 1) {
                var next = islands[idx + 1];
                if (!adventurer.discoveredIslands) adventurer.discoveredIslands = [];
                if (adventurer.discoveredIslands.indexOf(next.id) === -1) {
                    adventurer.discoveredIslands.push(next.id);
                }
                next.unlocked = true;
            }

            giveReward(200, 100);
            spawnAdventureParticles(window.innerWidth / 2, window.innerHeight / 2, 70, '#fbbf24');
            showAdventureToast('🏝️ تم إكمال ' + island.name + '! جزيرة جديدة في الأفق!', 'success');

            if (window.AncientMap && window.AncientMap.saveState) {
                window.AncientMap.saveState();
            }

            closeAdventureModal();
            renderMap();
        }

        // ==================== المكافآت ====================
        function giveReward(xpAmount, goldAmount) {
            var adventurer = getAdventurer();
            if (!adventurer) return;

            adventurer.xp = (adventurer.xp || 0) + xpAmount;
            adventurer.gold = (adventurer.gold || 0) + goldAmount;
            adventurer.level = Math.floor((adventurer.xp || 0) / 500) + 1;

            if (window.AncientMap && window.AncientMap.saveState) {
                window.AncientMap.saveState();
            }

            updateStatusBar();
        }

        // ==================== شريط الحالة ====================
        function updateStatusBar() {
            var adventurer = getAdventurer();
            if (!adventurer) return;

            var islands = getIslands();

            document.getElementById('xpDisplay').textContent = adventurer.xp || 0;
            document.getElementById('goldDisplay').textContent = adventurer.gold || 0;
            document.getElementById('streakDisplay').textContent = adventurer.streak || 0;

            var completed = adventurer.completedIslands ? adventurer.completedIslands.length : 0;
            document.getElementById('islandsDisplay').textContent = completed + '/' + islands.length;

            var artifacts = adventurer.collectedArtifacts ? adventurer.collectedArtifacts.length : 0;
            document.getElementById('artifactsDisplay').textContent = artifacts;

            document.getElementById('adventurerTitle').textContent = '⚓ ' + (adventurer.title || 'مغامر');
        }

        // ==================== النوافذ ====================
        function viewAllQuests() {
            if (!isSystemReady()) {
                showAdventureToast('⏳ جاري تحميل النظام...', 'error');
                return;
            }

            if (window.AncientQuests && window.AncientQuests.openQuestLog) {
                window.AncientQuests.openQuestLog();
                return;
            }

            var islands = getIslands();
            var h = '<h2>📋 سجل المهام</h2><div style="max-height:55vh;overflow-y:auto;">';

            islands.forEach(function(island) {
                if (!island.unlocked) return;
                h += '<h4 style="color:#fbbf24;text-align:right;">' + island.icon + ' ' + island.name +
                    (island.completed ? ' ✅' : '') + '</h4>';
                if (island.quests) {
                    island.quests.forEach(function(quest) {
                        h += '<div class="quest-card" onclick="openIslandLocal(getIslands().find(function(is){return is.id===\'' +
                            island.id + '\';}))">';
                        h += '<div class="quest-icon">' + quest.icon + '</div>';
                        h += '<div class="quest-info">';
                        h += '<div class="quest-name">' + quest.name + '</div>';
                        h += '<div class="quest-reward">⭐ +' + quest.xpReward + ' XP</div>';
                        h += '</div></div>';
                    });
                }
            });

            if (islands.every(function(is) { return !is.quests || is.quests.length === 0; })) {
                h += '<p style="color:#94a3b8;text-align:center;padding:20px;">لا توجد مهام متاحة حالياً</p>';
            }

            h += '</div><button class="btn btn-back" onclick="closeAdventureModal()" style="width:100%;margin-top:10px;">إغلاق</button>';
            openAdventureModal(h);
        }

        function viewAchievements() {
            if (window.AncientAchievements) {
                var progress = window.AncientAchievements.getProgress();
                var achievements = window.AncientAchievements.achievements;

                var h = '<h2>🏆 الإنجازات</h2>';
                h += '<p style="color:#94a3b8;">تم فتح: ' + progress.unlocked + '/' + progress.total + ' (' + progress
                    .percent + '%)</p>';
                h += '<div class="progress-bar-container"><div class="progress-bar-fill" style="width:' + progress.percent +
                    '%;"></div></div>';
                h += '<div style="max-height:50vh;overflow-y:auto;">';

                achievements.forEach(function(a) {
                    var unlocked = window.AncientAchievements.unlocked.has(a.id);
                    h += '<div style="background:' + (unlocked ? 'rgba(16,185,129,0.1)' : 'rgba(30,41,59,0.5)') +
                        ';border:2px solid ' + (unlocked ? '#10b981' : '#475569') +
                        ';border-radius:12px;padding:12px;margin:5px 0;display:flex;align-items:center;gap:12px;">';
                    h += '<span style="font-size:2rem;">' + (unlocked ? a.icon : (a.secret ? '🔒' : '🔐')) +
                        '</span>';
                    h += '<div style="flex:1;text-align:right;">';
                    h += '<div style="font-weight:700;color:' + (unlocked ? '#10b981' : 'white') + ';">' + (
                        unlocked ? a.name : (a.secret ? '???' : a.name)) + '</div>';
                    h += '<div style="font-size:0.75rem;color:#94a3b8;">' + (unlocked ? a.description : (a.secret ?
                        'إنجاز سري...' : a.description)) + '</div>';
                    h += '</div></div>';
                });

                h += '</div><button class="btn btn-back" onclick="closeAdventureModal()" style="width:100%;margin-top:10px;">إغلاق</button>';
                openAdventureModal(h);
            } else {
                var h = '<h2>🏆 الإنجازات</h2>';
                h += '<p style="color:#94a3b8;">نظام الإنجازات قيد التحميل...</p>';
                h += '<button class="btn btn-back" onclick="closeAdventureModal()" style="width:100%;margin-top:10px;">إغلاق</button>';
                openAdventureModal(h);
            }
        }

        function viewDailyReward() {
            var adventurer = getAdventurer();
            if (!adventurer) {
                showAdventureToast('⏳ جاري تحميل البيانات...', 'error');
                return;
            }

            if (window.AncientDaily && window.AncientDaily.showDailyReward) {
                window.AncientDaily.showDailyReward();
                return;
            }

            var streak = adventurer.streak || 1;
            var bonus = 30 + streak * 5;
            var xpBonus = 20 + streak * 3;

            var h = '<div style="text-align:center;">';
            h += '<h2>🎁 المكافأة اليومية</h2>';
            h += '<div style="font-size:5rem;">🎁</div>';
            h += '<p style="color:white;font-size:1.2rem;">🔥 تتابع: ' + streak + ' يوم</p>';
            h += '<div style="background:rgba(30,41,59,0.8);border-radius:15px;padding:20px;margin:15px 0;">';
            h += '<p style="font-size:1.5rem;color:#fbbf24;">🪙 +' + bonus + ' ذهب</p>';
            h += '<p style="font-size:1.2rem;color:#fbbf24;">⭐ +' + xpBonus + ' XP</p>';
            h += '</div>';
            h += '<button class="btn btn-daily" onclick="giveReward(' + xpBonus + ',' + bonus +
                ');spawnAdventureParticles(window.innerWidth/2,window.innerHeight/2,60,\'#fbbf24\');showAdventureToast(\'🎉 تم استلام المكافأة!\',\'success\');closeAdventureModal();renderMap();" style="width:100%;">🎉 استلم المكافأة</button>';
            h += '</div>';
            openAdventureModal(h);
        }

        function viewCharacter() {
            var adventurer = getAdventurer();
            if (!adventurer) {
                showAdventureToast('⏳ جاري تحميل البيانات...', 'error');
                return;
            }

            var h = '<div style="text-align:center;">';
            h += '<div style="font-size:5rem;">👤</div>';
            h += '<h2 style="color:#fbbf24;">' + (adventurer.name || 'مغامر') + '</h2>';
            h += '<p style="color:#94a3b8;">' + (adventurer.title || 'صبي المقصورة') + '</p>';

            h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:15px 0;">';
            h += '<div style="background:rgba(30,41,59,0.8);padding:10px;border-radius:10px;"><small>⭐ المستوى</small><br><b style="color:#fbbf24;">' +
                (adventurer.level || 1) + '</b></div>';
            h += '<div style="background:rgba(30,41,59,0.8);padding:10px;border-radius:10px;"><small>⭐ XP</small><br><b style="color:#fbbf24;">' +
                (adventurer.xp || 0) + '</b></div>';
            h += '<div style="background:rgba(30,41,59,0.8);padding:10px;border-radius:10px;"><small>🪙 ذهب</small><br><b style="color:#f59e0b;">' +
                (adventurer.gold || 0) + '</b></div>';
            h += '<div style="background:rgba(30,41,59,0.8);padding:10px;border-radius:10px;"><small>❤️ صحة</small><br><b style="color:#ef4444;">' +
                (adventurer.health || 100) + '/' + (adventurer.maxHealth || 100) + '</b></div>';
            h += '<div style="background:rgba(30,41,59,0.8);padding:10px;border-radius:10px;"><small>⛵ السفينة</small><br><b style="color:#3b82f6;">' +
                (adventurer.shipName || 'السنونو') + '</b></div>';
            h += '<div style="background:rgba(30,41,59,0.8);padding:10px;border-radius:10px;"><small>🔥 تتابع</small><br><b style="color:#f59e0b;">' +
                (adventurer.streak || 0) + ' يوم</b></div>';
            h += '</div>';

            h += '<p style="font-size:0.8rem;color:#94a3b8;">👥 الطاقم: ' + (adventurer.crew ? adventurer.crew.join(
                ', ') : 'ببغاء حكيم 🦜') + '</p>';

            h += '<button class="btn btn-back" onclick="closeAdventureModal()" style="width:100%;margin-top:10px;">إغلاق</button>';
            h += '</div>';
            openAdventureModal(h);
        }

        function resetAdventure() {
            if (confirm('⚠️ هل أنت متأكد من إعادة ضبط المغامرة بالكامل؟\n\nسيتم مسح كل التقدم والجزر والمكافآت!')) {
                // مسح البيانات المحلية
                localStorage.removeItem('ancient_map_v5');
                localStorage.removeItem('ancient_map_v4');
                localStorage.removeItem('ancient_achievements');
                localStorage.removeItem('ancient_reward_streak');
                localStorage.removeItem('ancient_last_reward');
                localStorage.removeItem('ancient_secrets');

                // إعادة تهيئة AncientMap
                if (window.AncientMap) {
                    window.AncientMap.adventurer = {
                        name: 'مغامر',
                        title: 'صبي المقصورة',
                        level: 1,
                        xp: 0,
                        gold: 0,
                        health: 100,
                        maxHealth: 100,
                        shipLevel: 1,
                        shipName: 'السنونو',
                        discoveredIslands: ['port_royal'],
                        completedIslands: [],
                        defeatedCreatures: [],
                        collectedArtifacts: [],
                        achievements: [],
                        currentPosition: { island: 'port_royal', x: 8, y: 85 },
                        crew: ['ببغاء حكيم 🦜'],
                        abilities: [],
                        totalAdventures: 0,
                        lastLogin: null,
                        streak: 0
                    };
                    window.AncientMap.islands.forEach(function(island, i) {
                        island.unlocked = (i === 0);
                        island.completed = false;
                    });
                    if (window.AncientMap.saveState) window.AncientMap.saveState();
                }

                spawnAdventureParticles(window.innerWidth / 2, window.innerHeight / 2, 80, '#ef4444');
                showAdventureToast('🔄 تم إعادة ضبط المغامرة بالكامل!');
                closeAdventureModal();
                renderMap();
            }
        }

        // ==================== إنشاء النجوم ====================
        function createStars() {
            var container = document.getElementById('starsContainer');
            if (!container) return;
            for (var i = 0; i < 120; i++) {
                var star = document.createElement('div');
                star.className = 'star';
                var size = 1 + Math.random() * 3;
                star.style.cssText = [
                    'top:' + Math.random() * 100 + '%',
                    'left:' + Math.random() * 100 + '%',
                    'width:' + size + 'px',
                    'height:' + size + 'px',
                    'animation-delay:' + Math.random() * 3 + 's',
                    'animation-duration:' + (2 + Math.random() * 3) + 's'
                ].join(';');
                container.appendChild(star);
            }
        }

        // ==================== تهيئة الصفحة ====================
        function initAdventurePage() {
            console.log('🎮 تهيئة صفحة المغامرة...');
            createStars();

            if (isSystemReady()) {
                console.log('✅ AncientMap متصل وجاهز');
                if (window.AncientMap.init) window.AncientMap.init();
                renderMap();
                updateStatusBar();
            } else {
                console.log('⚠️ AncientMap غير متصل - انتظار...');
                // المحاولة مرة أخرى
                var attempts = 0;
                var retryInterval = setInterval(function() {
                    attempts++;
                    if (isSystemReady()) {
                        clearInterval(retryInterval);
                        console.log('✅ تم الاتصال بـ AncientMap بعد ' + attempts + ' محاولات');
                        if (window.AncientMap.init) window.AncientMap.init();
                        renderMap();
                        updateStatusBar();
                    } else if (attempts >= 20) {
                        clearInterval(retryInterval);
                        console.error('❌ فشل الاتصال بـ AncientMap');
                    }
                }, 1000);
            }

            console.log('🗺️ صفحة المغامرة جاهزة!');
            console.log('🎮 استخدم الأزرار للتنقل بين الجزر والمهام');
        }

        // ==================== بدء الصفحة ====================
        // لو SystemLoader موجود، هو هينادي initAdventurePage
        // لو مش موجود (يعني الملفات اتحملت لوحدها)، نناديها مباشرة
        setTimeout(function() {
            if (document.getElementById('loadingScreen') && document.getElementById('loadingScreen').style
                .display !== 'none') {
                // لسه في شاشة التحميل - SystemLoader مش شغال
                console.log('⚠️ SystemLoader غير نشط - تهيئة مباشرة');
                document.getElementById('loadingScreen').classList.add('hidden');
                document.getElementById('mainContainer').style.display = 'block';
                setTimeout(function() {
                    document.getElementById('loadingScreen').style.display = 'none';
                }, 500);
                initAdventurePage();
            }
        }, 5000);

        console.log('🏴‍☠️ Adventure Page Loaded - Waiting for systems...');
    </script>
</body>
</html>
