function generateQuestionsHTML(questions) {
    var html = '';
    for (var i = 0; i < questions.length; i++) {
        html += getQuestionHTML(questions[i], i);
    }
    return html;
}

function getQuestionHTML(q, index) {
    var type = q.cat || 'mcq';
    var badgeClass = 'badge-' + type;
    var catLabel = getCategoryLabel(type);
    var catIcon = getCategoryIcon(type);
    
    var html = `
        <div class="tour-q-card" id="qCard_${index}" data-index="${index}">
            <div class="tour-q-header">
                <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
                    <span class="tour-q-number">#${index + 1}</span>
                    <span class="tour-q-badge ${badgeClass}"><i class="fas ${catIcon}"></i> ${catLabel}</span>
                </div>
                <span style="font-size:0.7rem;color:var(--text-secondary);">
                    ${q.chapterName || ''}
                </span>
            </div>
            <div class="tour-q-text">${q.text || q.question || ''}</div>
    `;
    
    if (q.translation) {
        html += `<div class="tour-q-translation">🌐 ${q.translation}</div>`;
    }
    
    // عرض الخيارات حسب النوع
    if (type === 'mcq' && q.options && q.options.length > 0) {
        html += `<div class="tour-options-grid" id="optionsGrid_${index}">`;
        for (var i = 0; i < q.options.length; i++) {
            var opt = q.options[i];
            var escapedOpt = opt.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
            html += `
                <label class="tour-opt-label" id="optLabel_${index}_${i}" onclick="selectTourOption(this, ${index}, ${i})">
                    <input type="radio" name="q_${index}" value="${escapedOpt}" class="tour-radio-input">
                    <span class="tour-opt-visual" id="optVisual_${index}_${i}"></span>
                    <span class="tour-opt-text">${opt}</span>
                </label>
            `;
        }
        html += `</div>`;
    } else if (type === 'truefalse') {
        html += `
            <div class="tour-options-grid" id="optionsGrid_${index}">
                <label class="tour-opt-label" onclick="selectTourOption(this, ${index}, 0)">
                    <input type="radio" name="q_${index}" value="صواب" class="tour-radio-input">
                    <span class="tour-opt-visual" id="optVisual_${index}_0"></span>
                    <span class="tour-opt-text">✅ صواب</span>
                </label>
                <label class="tour-opt-label" onclick="selectTourOption(this, ${index}, 1)">
                    <input type="radio" name="q_${index}" value="خطأ" class="tour-radio-input">
                    <span class="tour-opt-visual" id="optVisual_${index}_1"></span>
                    <span class="tour-opt-text">❌ خطأ</span>
                </label>
            </div>
        `;
    } else {
        var placeholder = type === 'complete' ? 'أكمل الفراغ هنا...' : 
                         type === 'list' ? 'اكتب النقاط (كل نقطة في سطر)...' : 
                         'اكتب إجابتك هنا...';
        html += `
            <div class="tour-input-group">
                <span class="tour-input-label">✏️ الإجابة:</span>
                ${type === 'list' || type === 'explain' || type === 'situations' ? 
                    `<textarea class="tour-textarea" id="tourText_${index}" placeholder="${placeholder}"></textarea>` :
                    `<input type="text" class="tour-text-input" id="tourText_${index}" placeholder="${placeholder}">`
                }
            </div>
        `;
    }
    
    html += `
            <div id="tourFeedback_${index}" style="display:none;padding:0 20px 15px;"></div>
        </div>
    `;
    
    return html;
}

// ====== 5. دوال التفاعل ======

function selectTourOption(label, qIndex, optIndex) {
    // إزالة التحديد من جميع خيارات نفس السؤال
    var allLabels = document.querySelectorAll('[id^="optLabel_' + qIndex + '_"]');
    for(var i=0; i<allLabels.length; i++) {
        allLabels[i].classList.remove('selected');
        allLabels[i].querySelector('.tour-opt-visual').innerHTML = '';
    }
    
    // تحديد الخيار الحالي
    label.classList.add('selected');
    var visual = document.getElementById('optVisual_' + qIndex + '_' + optIndex);
    if(visual) visual.innerHTML = '✓';
    
    // تحديث شريط التقدم
    updateTourProgress();
}

function updateTourProgress() {
    var total = tournamentState.questions?.length || 0;
    var answered = 0;
    
    for (var i = 0; i < total; i++) {
        var question = tournamentState.questions[i];
        var type = question.cat || 'mcq';
        
        if (type === 'mcq' || type === 'truefalse') {
            var selected = document.querySelector('input[name="q_' + i + '"]:checked');
            if (selected) answered++;
        } else {
            var textEl = document.getElementById('tourText_' + i);
            if (textEl && textEl.value.trim() !== '') answered++;
        }
    }
    
    var progress = total > 0 ? (answered / total) * 100 : 0;
    var fill = document.getElementById('tourProgressFill');
    if(fill) fill.style.width = Math.min(progress, 100) + '%';
    
    // تحديث النص في الهيدر
    var subEl = document.querySelector('.tour-header-sub');
    if(subEl) subEl.textContent = `📚 ${answered}/${total} سؤال تمت الإجابة`;
}

function startTournamentTimer() {
    if(tournamentTimerInterval) clearInterval(tournamentTimerInterval);
    
    // مدة البطولة 10 دقائق (600 ثانية)
    var duration = 600;
    var startTime = tournamentState.startTime || Date.now();
    
    tournamentTimerInterval = setInterval(function() {
        var elapsed = Math.floor((Date.now() - startTime) / 1000);
        var tLeft = Math.max(0, duration - elapsed);
        
        if (tLeft <= 0) {
            clearInterval(tournamentTimerInterval);
            showTournamentToast('⏰ انتهى الوقت! يتم تسليم الإجابات تلقائياً...', 'warning');
            setTimeout(submitTournamentAnswers, 1000);
            return;
        }
        
        var m = Math.floor(tLeft / 60);
        var s = tLeft % 60;
        var timerEl = document.getElementById('tourTimer');
        if(timerEl) {
            timerEl.innerHTML = String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
            timerEl.classList.remove('warn', 'danger');
            if(tLeft <= 60) timerEl.classList.add('danger');
            else if(tLeft <= 180) timerEl.classList.add('warn');
        }
        
        // تحديث شريط التقدم كل 5 ثواني
        if (elapsed % 5 === 0) updateTourProgress();
    }, 1000);
}

// ====== 6. تسليم البطولة ======

function collectTournamentAnswers() {
    var answers = [];
    var questions = tournamentState.questions || [];
    
    for (var i = 0; i < questions.length; i++) {
        var q = questions[i];
        var type = q.cat || 'mcq';
        var userAnswer = '';
        
        if (type === 'mcq' || type === 'truefalse') {
            var selectedRadio = document.querySelector('input[name="q_' + i + '"]:checked');
            if (selectedRadio) {
                userAnswer = selectedRadio.value.trim();
            }
        } else {
            var textEl = document.getElementById('tourText_' + i);
            if (textEl) {
                userAnswer = textEl.value.trim();
            }
        }
        
        answers.push({ questionIndex: i, answer: userAnswer });
    }
    
    return answers;
}

async function submitTournamentAnswers() {
    if(tournamentTimerInterval) clearInterval(tournamentTimerInterval);
    
    var timeTaken = Math.floor((Date.now() - tournamentState.startTime) / 1000);
    var answers = collectTournamentAnswers();
    var answeredCount = answers.filter(a => a.answer !== '').length;
    var totalCount = tournamentState.questions?.length || 0;
    var unansweredCount = totalCount - answeredCount;
    
    // عرض نافذة تأكيد
    var confirmMsg = '⚙️ <b>تأكيد التسليم النهائي</b>\n\n';
    confirmMsg += '📝 تمت الإجابة على: <b>' + answeredCount + '</b> من ' + totalCount + ' سؤال\n';
    if(unansweredCount > 0) {
        confirmMsg += '⚠️ لم يتم الإجابة على: <b>' + unansweredCount + '</b> سؤال (سيحتسب كإجابة خاطئة)\n';
    }
    confirmMsg += '\n⏱️ الوقت المستغرق: ' + Math.floor(timeTaken/60) + ' د و ' + (timeTaken%60) + ' ث\n\n';
    confirmMsg += 'هل أنت متأكد من التسليم النهائي؟';
    
    if (!confirm(confirmMsg)) {
        startTournamentTimer(); // إعادة تشغيل المؤقت
        return;
    }
    
    // تعطيل أزرار التسليم لتجنب الضغط المتكرر
    var submitBtn = document.querySelector('.tour-submit-btn');
    if(submitBtn) {
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري التسليم...';
        submitBtn.style.opacity = '0.6';
    }
    
    try {
        var result = await smartFetch('/api/tournaments/' + tournamentState.id + '/participate', {
            method: 'POST',
            body: JSON.stringify({ answers: answers, timeTaken: timeTaken })
        });
        
        if (result.success) {
            var correctCount = Math.round((result.score / 100) * totalCount);
            var wrongCount = totalCount - correctCount;
            var rank = result.rank || 0;
            
            // إضافة XP
            addXP(10);
            
            // عرض النتيجة
            showTournamentResult(result.score, correctCount, wrongCount, totalCount, timeTaken, rank);
        } else {
            showTournamentToast(result.error || 'فشل في تسليم البطولة', 'error');
            // إعادة تمكين الزر
            if(submitBtn) {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> تسليم';
                submitBtn.style.opacity = '1';
            }
        }
    } catch (error) {
        handleTournamentError(error);
        // إعادة تمكين الزر
        if(submitBtn) {
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> تسليم';
            submitBtn.style.opacity = '1';
        }
    }
}

async function finishTournament(tournamentId) {
    if (!confirm('🏁 هل أنت متأكد من إنهاء هذه البطولة وتوزيع المكافآت على الفائزين؟')) return;
    
    try {
        showTournamentToast('🔄 جاري إنهاء البطولة...', 'info');
        var result = await smartFetch('/api/tournaments/' + tournamentId + '/finish', { 
            method: 'POST' 
        });
        
        if (result.success) {
            var winners = result.winners || {};
            var msg = '✅ تم إنهاء البطولة وتوزيع المكافآت!';
            if (winners.first) msg += '\n🥇 الفائز الأول: ' + winners.first;
            if (winners.second) msg += '\n🥈 الفائز الثاني: ' + winners.second;
            if (winners.third) msg += '\n🥉 الفائز الثالث: ' + winners.third;
            showTournamentToast(msg, 'success');
            fetchActiveTournaments();
            // عرض النتائج
            setTimeout(function() {
                viewTournamentResults(tournamentId);
            }, 500);
        } else {
            showTournamentToast(result.error || 'فشل في إنهاء البطولة', 'error');
        }
    } catch (error) {
        handleTournamentError(error);
    }
}

// بدء المراجعة الذكية بعد اختيار الفصل
async function startSmartReview() {
    const chapterSelect = document.getElementById('smartReviewChapterSelect');
    selectedSmartReviewChapter = chapterSelect ? chapterSelect.value : 'all';
    
    closeModal('smartReviewChapterModal');
    
    try {
        showToast('🔄 جاري تحضير أسئلة المراجعة الذكية...', 'info');
        
        // جمع الأسئلة من الفصل المختار فقط
        const allQuestions = [];
        const testCategories = ['mcq', 'truefalse', 'complete', 'explain', 'list', 'situations'];
        
        const chaptersToProcess = selectedSmartReviewChapter === 'all' 
            ? Object.keys(chaptersData) 
            : [selectedSmartReviewChapter];
        
        for (const key of chaptersToProcess) {
            if (chaptersData.hasOwnProperty(key)) {
                const ch = chaptersData[key];
                for (const cat of testCategories) {
                    if (ch[cat] && Array.isArray(ch[cat])) {
                        for (let i = 0; i < ch[cat].length; i++) {
                            const q = Object.assign({}, ch[cat][i]);
                            q.cat = cat;
                            q.chapterName = ch.name || key;
                            q.questionId = key + '_' + cat + '_' + i;
                            q.chapterId = key;
                            allQuestions.push(q);
                        }
                    }
                }
            }
        }
        
        console.log(`📚 إجمالي الأسئلة المتاحة في الفصل المختار: ${allQuestions.length}`);

            showToast('❌ لا توجد أسئلة في هذا الفصل', 'error');

            method: 'POST',
            credentials: 'include',
            headers: {
                'Content-Type': 'application/json',
                'Cache-Control': 'no-cache'

                questions: allQuestions,

            html += `
                <button class="quiz-opt" onclick="checkSmartReviewAnswer(this, '${escapedOpt}', ${index})" 
                        style="display:block;width:100%;text-align:right;padding:10px 15px;margin:5px 0;border:2px solid var(--border-color);border-radius:10px;background:var(--card-bg);cursor:pointer;font-family:'Tajawal',sans-serif;font-size:0.9rem;transition:all 0.3s ease;">
                    ${opt}
                </button>
            `;
        }
        html += `</div>`;
    } else if (q.cat === 'truefalse') {
        html += `
            <div style="margin-top:10px;display:flex;gap:10px;flex-wrap:wrap;">
                <button class="quiz-opt" onclick="checkSmartReviewAnswer(this, 'صواب', ${index})" 
                        style="padding:10px 25px;border:2px solid var(--border-color);border-radius:10px;background:var(--card-bg);cursor:pointer;font-family:'Tajawal',sans-serif;font-size:0.9rem;transition:all 0.3s ease;flex:1;">
                    ✅ صواب
                </button>
                <button class="quiz-opt" onclick="checkSmartReviewAnswer(this, 'خطأ', ${index})" 
                        style="padding:10px 25px;border:2px solid var(--border-color);border-radius:10px;background:var(--card-bg);cursor:pointer;font-family:'Tajawal',sans-serif;font-size:0.9rem;transition:all 0.3s ease;flex:1;">
                    ❌ خطأ
                </button>
            </div>
        `;
    } else {
        // أسئلة مقالية (complete, explain, list, situations)
        const placeholder = q.cat === 'complete' ? 'أكمل الفراغ...' : 
                           q.cat === 'explain' ? 'اكتب الشرح...' : 
                           q.cat === 'list' ? 'اكتب القائمة...' : 'اكتب الإجابة...';
        html += `
            <div style="margin-top:10px;">
                <textarea class="def-input" id="smartReview-text-${index}" 
                          placeholder="${placeholder}" 
                          style="width:100%;min-height:80px;padding:10px;border-radius:10px;border:2px solid var(--border-color);background:var(--card-bg);color:var(--text-primary);font-family:'Tajawal',sans-serif;font-size:0.9rem;resize:vertical;"></textarea>
                <button class="modal-btn btn-primary" onclick="checkSmartReviewText(${index})" 
                        style="margin-top:8px;padding:8px 20px;border-radius:10px;border:none;background:var(--gold);color:#0e2a35;font-weight:700;cursor:pointer;transition:all 0.3s ease;">
                    🔍 تحقق
                </button>
            </div>
        `;
    }
    
    html += `<div class="quiz-fb" id="smartReview-fb-${index}" style="margin-top:8px;"></div>`;
    html += `</div>`;
    
    return html;
}

// ====================== دالة مقارنة الإجابات المحسنة (10 مستويات) ======================

function isAnswerCorrectSmart(userAnswer, question) {
    if (!userAnswer || !question) return false;
    
    // تنظيف الإجابات
    const user = String(userAnswer).trim();
    let correct = '';
    
    // الحصول على الإجابة الصحيحة حسب نوع السؤال
    if (question.cat === 'mcq') {
        correct = String(question.correct || '').trim();
    } else if (question.cat === 'truefalse') {
        correct = String(question.correct || '').trim();
    } else {
        correct = String(question.completion || question.answer || '').trim();
    }
    
    if (!correct) return false;
    
    // ========== 1. مقارنة مباشرة ==========
    if (user === correct) return true;
    
    // ========== 2. مقارنة بعد إزالة المسافات الزائدة ==========
    if (user.replace(/\s+/g, ' ') === correct.replace(/\s+/g, ' ')) return true;
    
    // ========== 3. مقارنة مع تجاهل حالة الأحرف ==========
    if (user.toLowerCase() === correct.toLowerCase()) return true;
    
    // ========== 4. مقارنة مع إزالة علامات الترقيم ==========
    const cleanUser = user.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()"']/g, '').trim();
    const cleanCorrect = correct.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()"']/g, '').trim();
    if (cleanUser.toLowerCase() === cleanCorrect.toLowerCase()) return true;
    
    // ========== 5. مقارنة مع إزالة الأقواس والأرقام ==========
    const cleanUser2 = user.replace(/^[\d\s.)-]+/, '').trim();
    const cleanCorrect2 = correct.replace(/^[\d\s.)-]+/, '').trim();
    if (cleanUser2.toLowerCase() === cleanCorrect2.toLowerCase()) return true;
    
    // ========== 6. للأسئلة من نوع MCQ (اختيار من متعدد) ==========
    if (question.cat === 'mcq' && question.options) {
        // البحث عن الخيار الصحيح في قائمة الخيارات
        const correctOption = question.options.find(opt => {
            const cleanOpt = opt.replace(/^[\d\s.)-]+/, '').trim();
            return cleanOpt.toLowerCase() === cleanCorrect.toLowerCase();
        });
        
        if (correctOption) {
            const cleanUserOpt = user.replace(/^[\d\s.)-]+/, '').trim();
            const cleanCorrectOpt = correctOption.replace(/^[\d\s.)-]+/, '').trim();
            if (cleanUserOpt.toLowerCase() === cleanCorrectOpt.toLowerCase()) return true;
        }
    }
    
    // ========== 7. للأسئلة من نوع True/False ==========
    if (question.cat === 'truefalse') {
        const userLower = user.toLowerCase();
        const correctLower = correct.toLowerCase();
        
        if (correctLower === 'true' || correctLower === 'صواب' || correctLower === 'صح') {
            return userLower === 'true' || userLower === 'صواب' || userLower === 'صح';
        }
        if (correctLower === 'false' || correctLower === 'خطأ' || correctLower === 'غلط') {
            return userLower === 'false' || userLower === 'خطأ' || userLower === 'غلط';
        }
        return userLower === correctLower;
    }
    
    // ========== 8. مقارنة بالكلمات المفتاحية (للأسئلة الطويلة) ==========
    if (correct.length > 10 && user.length > 5) {
        const keywords = correct.split(/\s+/)
            .filter(word => word.length > 3)
            .map(word => word.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()"']/g, '').toLowerCase());
        
        if (keywords.length > 0) {
            const userWords = user.split(/\s+/)
                .filter(word => word.length > 2)
                .map(word => word.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()"']/g, '').toLowerCase());
            
            let matchCount = 0;
            for (const kw of keywords) {
                for (const uw of userWords) {
                    if (uw.includes(kw) || kw.includes(uw)) {
                        matchCount++;
                        break;
                    }
                }
            }
            
            if (matchCount / keywords.length >= 0.6) return true;
        }
    }
    
    // ========== 9. مقارنة جزئية ==========
    if (correct.length > 5 && user.length > 3) {
        const userLower = user.toLowerCase();
        const correctLower = correct.toLowerCase();
        
        if (correctLower.includes(userLower) || userLower.includes(correctLower)) {
            const shorter = Math.min(userLower.length, correctLower.length);
            const longer = Math.max(userLower.length, correctLower.length);
            if (shorter / longer >= 0.7) return true;
        }
    }
    
    // ========== 10. مقارنة مع إزالة "ال" والتعريف ==========
    const userNoAl = user.replace(/^(ال|أل|آل)\s*/i, '').trim();
    const correctNoAl = correct.replace(/^(ال|أل|آل)\s*/i, '').trim();
    if (userNoAl.toLowerCase() === correctNoAl.toLowerCase()) return true;
    
    return false;
}

// ====================== دالة الحصول على الإجابة الصحيحة للعرض ======================

function getFullAnswerSmart(question) {
    if (!question) return '';
    
    if (question.cat === 'mcq') {
        if (question.options && question.correct) {
            const cleanCorrect = question.correct.replace(/^[\d\s.)-]+/, '').trim();
            const found = question.options.find(opt => {
                const cleanOpt = opt.replace(/^[\d\s.)-]+/, '').trim();
                return cleanOpt.toLowerCase() === cleanCorrect.toLowerCase();
            });
            return found || question.correct;
        }
        return question.correct || '';
    }
    
    if (question.cat === 'truefalse') {
        const val = String(question.correct || '').toLowerCase();
        if (val === 'true' || val === 'صواب') return 'صواب (True)';
        if (val === 'false' || val === 'خطأ') return 'خطأ (False)';
        return question.correct || '';
    }
    
    if (question.cat === 'complete') {
        return question.completion || '';
    }
    
    if (question.cat === 'explain') {
        return question.answer || '';
    }
    
    return question.completion || question.answer || question.correct || '';
}

// ====================== التحقق من إجابة MCQ ======================

function checkSmartReviewAnswer(btn, chosen, index) {
    const question = smartReviewQuestions[index];
    if (!question) return;
    
    // تعطيل جميع الأزرار
    const parent = btn.parentElement;
    parent.querySelectorAll('.quiz-opt').forEach(b => b.disabled = true);
    
    // استخدام دالة المقارنة المحسنة
    const isCorrect = isAnswerCorrectSmart(chosen, question);
    
    // تمييز الإجابة
    btn.classList.add(isCorrect ? 'correct' : 'wrong');
    
    // إذا كانت الإجابة خاطئة، أظهر الإجابة الصحيحة باللون الأخضر
    if (!isCorrect) {
        parent.querySelectorAll('.quiz-opt').forEach(b => {
            const optText = b.textContent.trim();
            if (isAnswerCorrectSmart(optText, question)) {
                b.classList.add('correct');
            }
        });
    }
    
    // حفظ النتيجة
    smartReviewScores[index] = isCorrect;
    smartReviewAnswered++;
    updateSmartReviewProgress();
    
    // عرض التغذية الراجعة مع الإجابة الصحيحة
    const fb = document.getElementById(`smartReview-fb-${index}`);
    if (fb) {
        const correctAnswer = getFullAnswerSmart(question);
        fb.innerHTML = `
            <div style="padding:12px;border-radius:10px;margin-top:8px;background:${isCorrect ? '#f0fdf4' : '#fef2f2'};border-right:4px solid ${isCorrect ? '#22c55e' : '#ef4444'};">
                <strong style="color:${isCorrect ? '#059669' : '#dc2626'};">${isCorrect ? '✅ صحيح! أحسنت!' : '❌ خطأ'}</strong>
                ${!isCorrect ? ` 
                    <div style="margin-top:5px;">
                        <span style="color:#059669;font-weight:700;">✅ الإجابة الصحيحة: ${correctAnswer}</span>
                    </div>
                ` : ''}
                <div style="font-size:0.8rem;color:var(--text-secondary);margin-top:3px;border-top:1px solid var(--border-color);padding-top:5px;">
                    📝 إجابتك: "${chosen}"
                </div>
            </div>
        `;
    }
    
    // إضافة XP
    if (isCorrect) {
        addXP(3);
    }
    
    // حفظ التقدم في السيرفر
    saveSmartReviewProgress(question.questionId, isCorrect);
}

// ====================== التحقق من الإجابة المقالية ======================

function checkSmartReviewText(index) {
    const question = smartReviewQuestions[index];
    if (!question) return;
    
    const input = document.getElementById(`smartReview-text-${index}`);
    if (!input || input.disabled) return;
    
    const userAnswer = input.value.trim();
    
    // الحصول على الإجابة الصحيحة
    const correctAnswer = question.completion || question.answer || '';
    
    // استخدام دالة المقارنة المحسنة
    const isCorrect = isAnswerCorrectSmart(userAnswer, {
        ...question,
        cat: 'text',
        completion: correctAnswer
    });
    
    input.classList.add(isCorrect ? 'correct-input' : 'wrong-input');
    input.disabled = true;
    
    // حفظ النتيجة
    smartReviewScores[index] = isCorrect;
    smartReviewAnswered++;
    updateSmartReviewProgress();
    
    // عرض التغذية الراجعة
    const fb = document.getElementById(`smartReview-fb-${index}`);
    if (fb) {
        fb.innerHTML = `
            <div style="padding:12px;border-radius:10px;margin-top:8px;background:${isCorrect ? '#f0fdf4' : '#fef2f2'};border-right:4px solid ${isCorrect ? '#22c55e' : '#ef4444'};">
                <strong style="color:${isCorrect ? '#059669' : '#dc2626'};">${isCorrect ? '✅ صحيح! أحسنت!' : '❌ خطأ'}</strong>
                ${!isCorrect ? ` 
                    <div style="margin-top:5px;">
                        <span style="color:#059669;font-weight:700;">✅ الإجابة الصحيحة: ${correctAnswer}</span>
                    </div>
                ` : ''}
                <div style="font-size:0.8rem;color:var(--text-secondary);margin-top:3px;border-top:1px solid var(--border-color);padding-top:5px;">
                    📝 إجابتك: "${userAnswer || '(فارغ)'}"
                </div>
            </div>
        `;
    }
    
    // إضافة XP
    if (isCorrect) {
        addXP(5);
    }
    
    // حفظ التقدم في السيرفر
    saveSmartReviewProgress(question.questionId, isCorrect);
}

// ====================== تحديث شريط التقدم ======================

function updateSmartReviewProgress() {
    const progressEl = document.getElementById('smartReviewProgress');
    if (progressEl) {
        progressEl.textContent = `📊 التقدم: ${smartReviewAnswered}/${smartReviewTotal}`;
    }
    
    // إذا تم حل جميع الأسئلة
    if (smartReviewAnswered >= smartReviewTotal && smartReviewTotal > 0) {
        showSmartReviewResults();
    }
}

// ====================== عرض النتائج النهائية ======================

function showSmartReviewResults() {
    const correctCount = Object.values(smartReviewScores).filter(v => v === true).length;
    const score = Math.round((correctCount / smartReviewTotal) * 100);
    
    const scoreEl = document.getElementById('smartReviewScore');
    if (scoreEl) {
        let message = '';
        let emoji = '';
        let bgColor = '';
        if (score >= 90) { 
            emoji = '🌟'; 
            message = 'ممتاز! أنت متميز!'; 
            bgColor = '#d1fae5';
        } else if (score >= 70) { 
            emoji = '👏'; 
            message = 'جيد جداً! استمر!'; 
            bgColor = '#fef3c7';
        } else if (score >= 50) { 
            emoji = '💪'; 
            message = 'تحتاج إلى مزيد من الممارسة!'; 
            bgColor = '#fde68a';
        } else { 
            emoji = '📚'; 
            message = 'أنت بحاجة إلى مراجعة أكثر!'; 
            bgColor = '#fca5a5';
        }
        
        scoreEl.innerHTML = `
            <div style="background:${bgColor};padding:15px;border-radius:12px;margin-top:10px;border:2px solid var(--gold);">
                <div style="font-size:1.5rem;font-weight:900;color:var(--gold-dark);">
                    ${emoji} النتيجة: ${correctCount}/${smartReviewTotal} (${score}%)
                </div>
                <div style="font-size:0.9rem;color:var(--text-secondary);margin-top:5px;">
                    ${message}
                </div>
                ${score >= 80 ? '<div style="margin-top:5px;font-size:1.1rem;">🎉 تم تحقيق إنجاز جديد!</div>' : ''}
            </div>
        `;
        
        if (score >= 80) {
            spawnConfetti();
            checkAchievements();
        }
    }
}

// ====================== إنهاء المراجعة ======================

function submitSmartReview() {
    // التحقق من الأسئلة غير المجابة
    const unanswered = [];
    for (let i = 0; i < smartReviewTotal; i++) {
        if (smartReviewScores[i] === undefined) {
            unanswered.push(i + 1);
        }
    }
    
    if (unanswered.length > 0) {
        if (!confirm(`⚠️ هناك ${unanswered.length} سؤال(أسئلة) لم يتم الإجابة عليها (${unanswered.join(', ')}). هل تريد إنهاء المراجعة؟`)) {
            return;
        }
    }
    
    showSmartReviewResults();
    showToast('✅ تم إنهاء المراجعة الذكية بنجاح!', 'success');
}

// ====================== إعادة تعيين المراجعة ======================

function resetSmartReview() {
    smartReviewQuestions = [];
    smartReviewCurrentIndex = 0;
    smartReviewScores = {};
    smartReviewTotal = 0;
    smartReviewAnswered = 0;
}

// ====================== حفظ تقدم المراجعة في السيرفر ======================

async function saveSmartReviewProgress(questionId, isCorrect) {
    try {
        await fetch(API_BASE + '/api/smart-review/save-progress', {
            method: 'POST',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                questionId, 
                isCorrect,
                chapterId: selectedSmartReviewChapter 
            })
        });
    } catch (error) {
        console.error('❌ خطأ في حفظ التقدم:', error);
    }
}
