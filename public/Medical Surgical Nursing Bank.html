<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Surgical Nursing - بنك الأسئلة | معهد رعاية الضبعية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af5a; --gold-dark: #b8943a; --gold-light: #f5edd6;
            --dark: #1a3a48; --darker: #0e2a35; --light-bg: #f8fafb;
            --blue: #3b82f6; --green: #10b981; --orange: #f59e0b; --purple: #8b5cf6; --red: #ef4444;
            --card-bg: #ffffff; --text-primary: #334155; --text-secondary: #64748b; --border-color: #edf2f7;
            --shadow-xs: 0 1px 3px rgba(0,0,0,0.04); --shadow-sm: 0 4px 15px rgba(0,0,0,0.06);
            --shadow-md: 0 8px 25px rgba(0,0,0,0.08); --shadow-lg: 0 15px 40px rgba(0,0,0,0.12);
            --radius-sm: 16px; --radius-md: 22px; --radius-lg: 30px; --radius-xl: 60px;
            --transition: all 0.3s ease;
        }
        body.dark-mode {
            --light-bg: #0f172a; --card-bg: #1e293b; --text-primary: #e2e8f0;
            --text-secondary: #94a3b8; --border-color: #334155; --dark: #f1f5f9; --darker: #e2e8f0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Tajawal', sans-serif; background: var(--light-bg);
            min-height: 100vh; padding-bottom: 60px; position: relative; overflow-x: hidden;
            color: var(--text-primary); line-height: 1.7; transition: background 0.4s ease;
        }
        .animated-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; pointer-events: none; }
        .orb { position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.22; animation: orbFloat 20s infinite ease-in-out; }
        .orb:nth-child(1) { width: 600px; height: 600px; background: radial-gradient(circle, rgba(212,175,90,0.35), transparent 70%); top: -150px; left: -100px; }
        .orb:nth-child(2) { width: 450px; height: 450px; background: radial-gradient(circle, rgba(99,102,241,0.25), transparent 70%); bottom: -120px; right: -80px; animation-delay: -5s; }
        .orb:nth-child(3) { width: 400px; height: 400px; background: radial-gradient(circle, rgba(236,72,153,0.22), transparent 70%); top: 50%; left: 50%; animation-delay: -10s; }
        @keyframes orbFloat { 0%,100%{transform:translate(0,0)scale(1)rotate(0deg)}25%{transform:translate(50px,-30px)scale(1.05)rotate(3deg)}50%{transform:translate(-25px,20px)scale(.95)rotate(-2deg)}75%{transform:translate(-40px,-10px)scale(1.02)rotate(1deg)} }
        .progress-container { position: fixed; top: 0; right: 0; left: 0; width: 100%; height: 4px; background: transparent; z-index: 1000; }
        .progress-bar { height: 4px; background: linear-gradient(90deg, var(--gold), var(--orange), var(--red)); width: 0%; border-radius: 0 3px 3px 0; transition: width 0.1s linear; }

        .sync-indicator { position: fixed; top: 8px; left: 50%; transform: translateX(-50%); z-index: 1001; font-size: 0.7rem; padding: 4px 12px; border-radius: 15px; background: var(--card-bg); color: var(--text-secondary); box-shadow: var(--shadow-sm); transition: var(--transition); display: flex; align-items: center; gap: 5px; }
        .sync-indicator.synced { color: var(--green); }
        .sync-indicator.syncing { color: var(--orange); }
        .sync-indicator.error { color: var(--red); }

        .header { background: linear-gradient(165deg, #060f1a 0%, #0f2333 40%, #0d1f2d 70%, #050d14 100%); padding: 20px 30px 14px; text-align: center; position: relative; overflow: hidden; box-shadow: 0 10px 50px rgba(0,0,0,0.5); border-bottom: 1px solid rgba(212,175,90,0.15); }
        .header h1 { color: var(--gold); font-size: 1.9rem; margin-bottom: 4px; font-weight: 900; }
        .header h1 i { margin-left: 10px; background: linear-gradient(135deg, rgba(212,175,90,0.35), rgba(212,175,90,0.1)); padding: 11px; border-radius: 50%; }
        .header p { color: rgba(255,255,255,0.8); font-size: 0.85rem; }
        .header-badge { display: inline-block; background: linear-gradient(135deg, rgba(212,175,90,0.25), rgba(212,175,90,0.08)); padding: 7px 18px; border-radius: 50px; margin-top: 6px; font-size: 0.78rem; color: var(--gold); border: 1px solid rgba(212,175,90,0.35); font-weight: 600; }
        .control-bar { display: flex; justify-content: center; align-items: center; gap: 5px; padding: 4px 10px; flex-wrap: wrap; margin-top: 6px; }
        .control-btn, .quiz-btn, .exam-btn, .flashcard-btn, .dashboard-btn { color: white; border: none; padding: 6px 12px; border-radius: 20px; cursor: pointer; font-family: 'Tajawal', sans-serif; font-size: 0.73rem; font-weight: 700; transition: var(--transition); display: flex; align-items: center; gap: 4px; }
        .control-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); font-weight: 400; }
        .control-btn:hover { background: rgba(255,255,255,0.2); }
        .quiz-btn { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .exam-btn { background: linear-gradient(135deg, #6366f1, #4f46e5); }
        .flashcard-btn { background: linear-gradient(135deg, #10b981, #059669); }
        .dashboard-btn { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .quiz-btn:hover, .exam-btn:hover, .flashcard-btn:hover, .dashboard-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.3); }

        .xp-bar-container { display: flex; align-items: center; gap: 6px; justify-content: center; margin: 6px 0; }
        .xp-label { font-size: 0.7rem; color: var(--gold); font-weight: 700; }
        .xp-bar { width: 120px; height: 8px; background: rgba(255,255,255,0.2); border-radius: 10px; overflow: hidden; }
        .xp-fill { height: 100%; background: linear-gradient(90deg, var(--gold), #f59e0b); border-radius: 10px; transition: width 0.5s ease; }
        .level-badge { font-size: 0.7rem; font-weight: 700; padding: 2px 10px; border-radius: 15px; }
        .level-bronze{background:#fdf2e9;color:#cd7f32}.level-silver{background:#f1f5f9;color:#a0aec0}.level-gold{background:#fef9e7;color:var(--gold)}.level-diamond{background:#eef2ff;color:#6366f1}

        .sidebar-toggle { position: fixed; top: 50%; right: 0; transform: translateY(-50%); background: var(--gold-dark); color: white; border: none; padding: 11px 7px; border-radius: 0 10px 10px 0; cursor: pointer; z-index: 500; font-size: 0.9rem; transition: var(--transition); }
        .sidebar-toggle:hover { padding-right: 12px; }
        .sidebar { position: fixed; top: 0; right: -300px; width: 280px; height: 100%; background: var(--card-bg); z-index: 1500; transition: right 0.4s ease; box-shadow: -5px 0 30px rgba(0,0,0,0.3); overflow-y: auto; padding: 18px; }
        .sidebar.open { right: 0; }
        .sidebar-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1499; display: none; }
        .sidebar-overlay.active { display: block; }
        .sidebar h3 { color: var(--gold-dark); margin-bottom: 12px; font-size: 0.95rem; text-align: center; }
        .side-chapter, .side-category { display: block; width: 100%; text-align: right; padding: 9px 13px; margin: 4px 0; border: 2px solid transparent; border-radius: 22px; background: transparent; cursor: pointer; font-family: 'Tajawal', sans-serif; font-size: 0.78rem; transition: var(--transition); color: var(--text-primary); }
        .side-category { font-size: 0.73rem; padding: 7px 10px; }
        .side-chapter:hover, .side-category:hover { border-color: var(--gold); background: rgba(212,175,90,0.05); }
        .side-chapter.active, .side-category.active { background: var(--gold); color: var(--darker); font-weight: 700; }

        .favorites-bar { display: flex; justify-content: center; gap: 5px; margin-bottom: 12px; flex-wrap: wrap; }
        .fav-filter-btn { background: var(--card-bg); border: 2px solid #e2e8f0; padding: 6px 12px; border-radius: 22px; cursor: pointer; font-family: 'Tajawal', sans-serif; font-size: 0.75rem; transition: var(--transition); }
        .fav-filter-btn:hover { border-color: var(--gold); }
        .fav-filter-btn.active { background: #fffbeb; border-color: #f59e0b; color: #f59e0b; font-weight: 700; }
        .container { max-width: 1400px; margin: 25px auto; padding: 0 25px; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 22px; }
        @media(max-width:950px){.stats-grid{grid-template-columns:repeat(2,1fr)}}
        @media(max-width:500px){.stats-grid{grid-template-columns:1fr}}
        .stat-card { background: var(--card-bg); border-radius: var(--radius-lg); padding: 20px 14px; text-align: center; box-shadow: var(--shadow-md); transition: var(--transition); }
        .stat-card:hover { transform: translateY(-6px); }
        .stat-card .icon-wrap { width: 48px; height: 48px; border-radius: 15px; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; font-size: 1.2rem; }
        .stat-card:nth-child(1) .icon-wrap{background:#eff6ff;color:var(--blue)}.stat-card:nth-child(2) .icon-wrap{background:#ecfdf5;color:var(--green)}.stat-card:nth-child(3) .icon-wrap{background:#fffbeb;color:var(--orange)}.stat-card:nth-child(4) .icon-wrap{background:#f5f3ff;color:var(--purple)}
        .stat-card .number { font-size: 1.7rem; font-weight: 900; color: var(--dark); }
        .stat-card .label { font-size: 0.75rem; color: var(--text-secondary); font-weight: 600; }
        .chapter-section { background: var(--card-bg); border-radius: var(--radius-xl); padding: 7px; margin-bottom: 22px; box-shadow: var(--shadow-sm); display: flex; flex-wrap: wrap; justify-content: center; gap: 4px; position: sticky; top: 8px; z-index: 100; }
        .chapter-btn { background: transparent; border: 2px solid transparent; padding: 9px 15px; border-radius: 50px; font-family: 'Tajawal', sans-serif; font-size: 0.78rem; font-weight: 700; cursor: pointer; transition: var(--transition); color: var(--text-secondary); display: flex; align-items: center; gap: 6px; }
        .chapter-btn:hover { background: rgba(212,175,90,0.1); color: var(--gold-dark); }
        .chapter-btn.active { background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: #0e2a35; }
        .category-tabs { background: var(--card-bg); border-radius: var(--radius-xl); padding: 6px; margin-bottom: 22px; display: flex; flex-wrap: wrap; justify-content: center; gap: 4px; box-shadow: var(--shadow-sm); }
        .category-btn { background: transparent; border: 2px solid transparent; padding: 8px 14px; border-radius: 32px; font-family: 'Tajawal', sans-serif; font-size: 0.76rem; font-weight: 600; cursor: pointer; transition: var(--transition); color: var(--text-secondary); display: flex; align-items: center; gap: 6px; }
        .category-btn .count { background: rgba(0,0,0,0.05); padding: 2px 7px; border-radius: 16px; font-size: 0.65rem; }
        .category-btn:hover { background: rgba(212,175,90,0.08); }
        .category-btn.active { background: var(--dark); color: white; }
        body.dark-mode .category-btn.active { background: var(--gold); color: #0e2a35; }

        .questions-section { margin-bottom: 22px; animation: slideIn 0.4s ease forwards; }
        @keyframes slideIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
        .section-title { font-size: 1.05rem; font-weight: 800; color: var(--dark); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; padding: 10px 15px; background: var(--card-bg); border-radius: var(--radius-md); border-right: 4px solid var(--gold); }
        .section-title .section-count { background: var(--gold-light); color: var(--gold-dark); padding: 3px 10px; border-radius: 16px; font-size: 0.74rem; margin-right: auto; font-weight: 700; }
        .question-card { background: var(--card-bg); border-radius: var(--radius-md); margin-bottom: 14px; overflow: hidden; box-shadow: var(--shadow-xs); transition: var(--transition); border: 1px solid var(--border-color); }
        .question-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
        .question-card.hide-answers .answer-box,.question-card.hide-answers .answer-translation,.question-card.hide-answers .list-items-box{display:none!important}
        .question-header { background: #fafcfd; padding: 10px 15px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        body.dark-mode .question-header { background: #1a2538; }
        .question-badge { padding: 4px 10px; border-radius: 50px; font-size: 0.67rem; font-weight: 700; display: inline-flex; align-items: center; gap: 4px; }
        .badge-def{background:#eff6ff;color:#2563eb}.badge-mcq{background:#ecfdf5;color:#059669}.badge-tf{background:#fffbeb;color:#d97706}.badge-complete{background:#faf5ff;color:#7c3aed}.badge-explain{background:#ecfeff;color:#0891b2}.badge-list{background:#fff1f2;color:#e11d48}.badge-situation{background:#eef2ff;color:#4f46e5}
        .question-number { font-size: 0.67rem; color: #94a3b8; }
        .card-actions { display: flex; gap: 3px; margin-right: auto; }
        .action-btn { background: transparent; border: 1px solid #e2e8f0; color: var(--text-secondary); padding: 3px 7px; border-radius: 14px; cursor: pointer; font-size: 0.64rem; transition: var(--transition); display: flex; align-items: center; gap: 2px; }
        .action-btn:hover { background: rgba(212,175,90,0.1); color: var(--gold-dark); border-color: var(--gold); }
        .action-btn.bookmarked{color:#f59e0b;border-color:#f59e0b;background:#fffbeb}.action-btn.hard-marked{color:#ef4444;border-color:#ef4444;background:#fef2f2}
        .question-content { padding: 15px; }
        .question-text { font-size: 0.94rem; font-weight: 700; color: var(--dark); margin-bottom: 10px; line-height: 1.7; }
        .translation-box { background: #f8fafc; padding: 10px 13px; border-radius: var(--radius-sm); margin-bottom: 10px; font-size: 0.8rem; color: #475569; border-right: 4px solid var(--gold); }
        .difficulty-badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:.63rem;font-weight:600;margin-right:4px;cursor:pointer}.diff-easy{background:#ecfdf5;color:#059669}.diff-medium{background:#fffbeb;color:#d97706}.diff-hard{background:#fef2f2;color:#dc2626}
        .note-box{margin-top:6px}.note-input{width:100%;padding:7px 10px;border-radius:10px;border:1px solid #e2e8f0;font-family:'Tajawal',sans-serif;font-size:.75rem;resize:vertical;min-height:35px;background:var(--card-bg);color:var(--text-primary)}
        .options-list{margin:10px 0;padding-right:15px}.options-list li{margin:6px 0;color:var(--text-primary);list-style:none;position:relative;padding-right:18px;font-size:.87rem}.options-list li:before{content:"◆";color:var(--gold);position:absolute;right:0;font-size:.42rem;top:6px}
        .answer-box{padding:10px 14px;border-radius:var(--radius-sm);margin-top:10px;border-right:4px solid #22c55e;background:#f0fdf4}.answer-box.false-answer{background:#fef2f2;border-right-color:#ef4444}
        .answer-translation{background:#eff6ff;padding:8px 11px;border-radius:10px;margin-top:6px;font-size:.78rem;color:#1e40af}
        .list-items-box{background:#fafafa;padding:12px 14px;border-radius:var(--radius-sm);margin-top:10px;border-right:4px solid var(--red)}.list-items-box li{margin:6px 0;padding-right:16px;font-size:.84rem}.list-items-box li:before{content:"●";color:var(--gold);position:absolute;right:0;font-size:.38rem;top:7px}
        .empty-state{background:var(--card-bg);border-radius:var(--radius-lg);padding:50px 20px;text-align:center;border:2px dashed var(--gold);margin:20px 0}
        .back-to-top{position:fixed;bottom:30px;left:30px;width:46px;height:46px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));border:none;border-radius:50%;color:#0e2a35;font-size:1.1rem;cursor:pointer;z-index:999;opacity:0;visibility:hidden;transform:translateY(20px);transition:var(--transition);box-shadow:0 8px 25px rgba(212,175,90,0.4)}.back-to-top.visible{opacity:1;visibility:visible;transform:translateY(0)}
        .footer{text-align:center;padding:25px;color:var(--text-secondary);font-size:.82rem;border-top:1px solid var(--border-color);margin-top:35px}.footer .developer-name{color:var(--gold-dark);font-weight:700}.footer .institute-name{color:var(--dark);font-weight:700}

        .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.75);z-index:2000;display:flex;align-items:center;justify-content:center;display:none}.modal-overlay.active{display:flex}
        .modal-content{background:var(--card-bg);border-radius:var(--radius-lg);padding:22px;max-width:800px;width:92%;max-height:85vh;overflow-y:auto;text-align:center}
        .modal-content h2{color:var(--dark);margin-bottom:15px;font-size:1.3rem}
        .modal-settings{margin-bottom:15px;display:flex;gap:6px;justify-content:center;flex-wrap:wrap;align-items:center}
        .modal-settings select,.modal-settings input{padding:7px 12px;border-radius:22px;border:2px solid #e2e8f0;font-family:'Tajawal',sans-serif;font-size:.82rem;background:var(--card-bg);color:var(--text-primary)}
        .modal-timer{font-size:2rem;font-weight:900;color:var(--red);margin:10px 0}
        .modal-btn{padding:8px 18px;border-radius:22px;border:none;cursor:pointer;font-family:'Tajawal',sans-serif;font-size:.82rem;font-weight:700;margin:4px;transition:var(--transition)}
        .btn-primary{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#0e2a35}.btn-danger{background:linear-gradient(135deg,#ef4444,#dc2626);color:white}.btn-success{background:linear-gradient(135deg,#10b981,#059669);color:white}.btn-info{background:linear-gradient(135deg,#6366f1,#4f46e5);color:white}.btn-close{background:var(--dark);color:white}
        .quiz-q{text-align:right;margin:10px 0;padding:12px;background:#f8fafc;border-radius:var(--radius-sm)}
        .quiz-q .q-type-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.65rem;font-weight:600;margin-right:6px;background:#e2e8f0;color:#475569}
        .quiz-opt{display:block;width:100%;text-align:right;padding:9px 13px;margin:4px 0;border:2px solid #e2e8f0;border-radius:10px;background:transparent;cursor:pointer;font-family:'Tajawal',sans-serif;font-size:.85rem;transition:var(--transition)}
        .quiz-opt:hover{border-color:var(--gold);background:rgba(212,175,90,0.05)}.quiz-opt:disabled{pointer-events:none}
        .quiz-opt.correct{border-color:var(--green);background:#f0fdf4}.quiz-opt.wrong{border-color:var(--red);background:#fef2f2}
        .quiz-fb{margin-top:5px;font-weight:700;font-size:.82rem}.quiz-score{font-size:1.8rem;font-weight:900;color:var(--gold-dark);margin:12px 0}
        .def-input{width:100%;padding:10px;border-radius:12px;border:2px solid #e2e8f0;font-family:'Tajawal',sans-serif;font-size:.85rem;margin:5px 0;background:var(--card-bg);color:var(--text-primary)}
        .def-input.correct-input{border-color:var(--green);background:#f0fdf4}.def-input.wrong-input{border-color:var(--red);background:#fef2f2}

        .flashcard{width:100%;max-width:550px;min-height:300px;margin:15px auto;perspective:1000px;cursor:pointer}.flashcard-inner{position:relative;width:100%;height:100%;min-height:300px;transition:transform 0.6s;transform-style:preserve-3d}.flashcard.flipped .flashcard-inner{transform:rotateY(180deg)}.flashcard-front,.flashcard-back{position:absolute;width:100%;height:100%;min-height:300px;backface-visibility:hidden;border-radius:var(--radius-md);padding:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;font-size:0.95rem;line-height:1.8;overflow-y:auto}.flashcard-front{background:linear-gradient(135deg,#eff6ff,#dbeafe);color:var(--dark);border:2px solid var(--blue)}.flashcard-back{background:linear-gradient(135deg,#f0fdf4,#d1fae5);color:var(--dark);border:2px solid var(--green);transform:rotateY(180deg)}.flashcard-nav{display:flex;justify-content:center;gap:10px;margin-top:12px}
        .fc-label{font-size:0.7rem;color:var(--text-secondary);margin-bottom:5px;font-weight:600}.fc-content{font-weight:700;font-size:1rem}

        .dashboard-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:15px;margin:15px 0;text-align:right}@media(max-width:600px){.dashboard-grid{grid-template-columns:1fr}}
        .dashboard-card{background:var(--card-bg);border-radius:var(--radius-sm);padding:15px;border:1px solid var(--border-color)}.dashboard-card h4{color:var(--gold-dark);margin-bottom:8px;font-size:.9rem}.dashboard-card p{font-size:.8rem;color:var(--text-secondary);margin:3px 0}.dashboard-card .big-number{font-size:2rem;font-weight:900;color:var(--dark)}.chart-bar{height:20px;background:#e2e8f0;border-radius:10px;margin:5px 0;overflow:hidden}.chart-fill{height:100%;border-radius:10px;transition:width 0.5s ease}
        .achievements-grid{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:10px 0}.achievement-badge{padding:8px 14px;border-radius:25px;font-size:.75rem;font-weight:600;border:2px solid #e2e8f0;text-align:center;min-width:100px}.achievement-badge.unlocked{border-color:var(--gold);background:var(--gold-light);color:var(--gold-dark)}.achievement-badge.locked{opacity:.4}
        .confetti-piece{position:fixed;z-index:3000;pointer-events:none;animation:confettiFall 3s ease-out forwards}@keyframes confettiFall{0%{transform:translateY(-100vh)rotate(0deg);opacity:1}100%{transform:translateY(100vh)rotate(720deg);opacity:0}}
        @media print{.animated-bg,.progress-container,.back-to-top,.sidebar,.sidebar-toggle,.sidebar-overlay,.chapter-section,.category-tabs,.control-bar,.header-badge,.favorites-bar,.card-actions,.note-box,.footer,.stats-grid{display:none!important}body{background:white!important;color:black!important}.question-card{break-inside:avoid;border:1px solid #ccc!important;box-shadow:none!important}.container{max-width:100%!important;padding:0!important}.header{background:white!important;color:black!important;padding:10px!important;box-shadow:none!important}.header h1{color:black!important}}
        @media(max-width:768px){.header h1{font-size:1.3rem}.header{padding:15px 12px}.container{padding:0 10px}.chapter-btn{padding:6px 10px;font-size:.68rem}.category-btn{padding:6px 9px;font-size:.65rem}.back-to-top{bottom:18px;left:18px;width:40px;height:40px}.sidebar{width:260px}}
    </style>
</head>
<body>
<div class="animated-bg"><div class="orb"></div><div class="orb"></div><div class="orb"></div></div>
<div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
<div class="sync-indicator" id="syncIndicator"><i class="fas fa-cloud"></i> <span>جاهز</span></div>

<header class="header">
    <div class="header-content">
        <h1><i class="fas fa-book-medical"></i> Medical Surgical Nursing</h1>
        <p>📚 بنك الأسئلة المتكامل - تمريض جراحي وباطني</p>
        <div class="xp-bar-container"><span class="xp-label"><i class="fas fa-star"></i> XP: <span id="xpPoints">0</span></span><div class="xp-bar"><div class="xp-fill" id="xpFill" style="width:0%"></div></div><span class="level-badge level-bronze" id="levelBadge">🟤 مبتدئ</span></div>
        <div class="header-badge"><i class="fas fa-check-circle"></i> <span id="chapterCount">11</span> فصلاً مكتملاً | ترجمة وحلول كاملة</div>
        <div class="control-bar">
            <button class="control-btn" id="darkModeToggle"><i class="fas fa-moon"></i> ليلي</button>
            <button class="control-btn" id="hideAnswersToggle"><i class="fas fa-eye-slash"></i> إخفاء</button>
            <button class="control-btn" onclick="window.print()"><i class="fas fa-print"></i> طباعة</button>
            <button class="dashboard-btn" onclick="openDashboard()"><i class="fas fa-chart-bar"></i> لوحة</button>
            <button class="flashcard-btn" onclick="openFlashcards()"><i class="fas fa-clone"></i> بطاقات</button>
            <button class="quiz-btn" onclick="openStudyMode()"><i class="fas fa-book-open"></i> دراسة</button>
            <button class="quiz-btn" id="retryWrongBtn" onclick="retryWrongQuestions()"><i class="fas fa-redo"></i> تحدي الأخطاء</button>
            <button class="quiz-btn" onclick="openTimedQuiz()"><i class="fas fa-clock"></i> اختبار</button>
            <button class="exam-btn" onclick="openExamGenerator()"><i class="fas fa-file-alt"></i> امتحان</button>
        </div>
    </div>
</header>
<button class="sidebar-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
<div class="sidebar" id="sidebar"><h3>📋 تنقل سريع</h3><button class="side-chapter active" onclick="navigateSidebar('all','all')">📚 جميع الفصول</button><div id="sidebarChapters"></div><hr style="margin:12px 0;border-color:var(--border-color);"><div id="sidebarCategories"></div></div>
<div class="container">
    <div class="favorites-bar" id="favoritesBar" style="display:none;"><button class="fav-filter-btn active" onclick="showAllQuestions()">📚 الكل</button><button class="fav-filter-btn" onclick="showFavorites()"><i class="fas fa-star"></i> المفضلة (<span id="favCount">0</span>)</button><button class="fav-filter-btn" onclick="showHardQuestions()"><i class="fas fa-exclamation-triangle"></i> الصعبة (<span id="hardCount">0</span>)</button></div>
    <div class="stats-grid" id="statsGrid"></div>
    <div class="chapter-section" id="chapterSelector"></div>
    <div class="category-tabs" id="categoryTabs"></div>
    <div class="questions-wrapper" id="questionsWrapper"></div>
</div>
<button class="back-to-top" id="backToTop"><i class="fas fa-chevron-up"></i></button>
<footer class="footer"><p>تم التطوير بواسطة <span class="developer-name">أحمد موسى</span> | <span class="institute-name">معهد رعاية الضبعية الفني للتمريض</span></p><p style="margin-top:5px;font-size:0.73rem">Medical Surgical Nursing Bank &copy; 2025</p></footer>
<script src="chapter1.js"></script><script src="chapter2.js"></script><script src="chapter3.js"></script><script src="chapter4.js"></script><script src="chapter5.js"></script><script src="chapter6.js"></script><script src="chapter7.js"></script><script src="chapter8.js"></script><script src="chapter9.js"></script><script src="chapter10.js"></script><script src="chapter11.js"></script>
<script>
// ==================== المتغيرات ====================
const chaptersData={chapter1,chapter2,chapter3,chapter4,chapter5,chapter6,chapter7,chapter8,chapter9,chapter10,chapter11};
let currentChapterId='all',currentCategory='all',hideAnswers=!1;
let bookmarks=new Set(JSON.parse(localStorage.getItem('nb_bookmarks')||'[]')),hardQuestions=new Set(JSON.parse(localStorage.getItem('nb_hard')||'[]')),notes=JSON.parse(localStorage.getItem('nb_notes')||'{}'),difficulties=JSON.parse(localStorage.getItem('nb_diff')||'{}'),quizHistory=JSON.parse(localStorage.getItem('nb_history')||'[]'),wrongQuestions=JSON.parse(localStorage.getItem('nb_wrong')||'[]'),xp=parseInt(localStorage.getItem('nb_xp')||0),achievements=JSON.parse(localStorage.getItem('nb_achievements')||'[]');
const categoryMeta=[{id:'definitions',icon:'fas fa-bookmark',label:'تعريفات',badge:'badge-def'},{id:'mcq',icon:'fas fa-tasks',label:'اختيار متعدد',badge:'badge-mcq'},{id:'truefalse',icon:'fas fa-check-double',label:'صح وخطأ',badge:'badge-tf'},{id:'complete',icon:'fas fa-pen',label:'أكمل',badge:'badge-complete'},{id:'explain',icon:'fas fa-comment-dots',label:'اشرح',badge:'badge-explain'},{id:'list',icon:'fas fa-list-ul',label:'قوائم',badge:'badge-list'},{id:'situations',icon:'fas fa-stethoscope',label:'مواقف',badge:'badge-situation'}];
const testCategories=['mcq','truefalse','complete','explain','list','situations'];

    // ====================== التحقق من تسجيل الدخول ======================
async function checkAuth() {
    try {
        const response = await fetch(`${API_BASE}/api/verify-session`, {
            credentials: 'include'
        });
        if (response.ok) {
            const data = await response.json();
            if (data.valid) {
                console.log('✅ مستخدم مسجل:', data.user);
                return true;
            }
        }
        return false;
    } catch (error) {
        console.error('❌ خطأ في التحقق من الجلسة:', error);
        return false;
    }
}

// ====================== تسجيل الخروج ======================
async function logoutUser() {
    if (confirm('هل تريد تسجيل الخروج؟')) {
        try {
            await fetch(`${API_BASE}/api/logout`, {
                method: 'POST',
                credentials: 'include'
            });
            sessionStorage.clear();
            localStorage.removeItem('loggedInUser');
            window.location.href = 'login.html';
        } catch (error) {
            console.error('❌ خطأ في تسجيل الخروج:', error);
        }
    }
}

// ====================== تهيئة الصفحة ======================
document.addEventListener('DOMContentLoaded', async function() {
    // التحقق من تسجيل الدخول
    const isLoggedIn = await checkAuth();
    
    if (!isLoggedIn) {
        // عرض رسالة للمستخدم غير مسجل
        document.body.innerHTML = `
            <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;text-align:center;background:var(--light-bg);">
                <div style="background:var(--card-bg);border-radius:30px;padding:40px;max-width:450px;width:100%;box-shadow:var(--shadow-lg);border:2px solid var(--gold);">
                    <div style="font-size:4rem;margin-bottom:20px;">🔒</div>
                    <h2 style="color:var(--dark);margin-bottom:10px;">يجب تسجيل الدخول أولاً</h2>
                    <p style="color:var(--text-secondary);margin-bottom:25px;">يرجى تسجيل الدخول للوصول إلى بنك الأسئلة ومتابعة تقدمك</p>
                    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
                        <a href="login.html" style="background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#0e2a35;padding:12px 30px;border-radius:50px;text-decoration:none;font-weight:700;transition:var(--transition);">تسجيل الدخول</a>
                        <a href="register.html" style="background:var(--dark);color:white;padding:12px 30px;border-radius:50px;text-decoration:none;font-weight:700;transition:var(--transition);">إنشاء حساب</a>
                    </div>
                </div>
            </div>
        `;
        return;
    }

    // إذا كان المستخدم مسجلاً، أكمل تحميل الصفحة
    initializePage();
});

function initializePage() {
    // تحديث الإحصائيات
    updateStats();
    updateXPDisplay();
    renderChapterButtons();
    renderCategoryTabs();
    renderAllQuestions();
    buildSidebar();
    updateFavCount();
    updateHardCount();
    document.getElementById('retryWrongBtn').style.display = wrongQuestions.length > 0 ? 'inline-flex' : 'none';
    
    // محاولة تحميل البيانات من السيرفر
    fetchProgress();
}

// ====================== الاتصال بالسيرفر ======================
const API_BASE = '';
let isOnlineMode = false;
function updateSyncIndicator(status, text) {
    const el = document.getElementById('syncIndicator');
    if (!el) return;
    el.className = 'sync-indicator ' + status;
    el.querySelector('span').textContent = text;
}
async function apiCall(endpoint, method = 'GET', body = null) {
    const options = { method, credentials: 'include', headers: { 'Content-Type': 'application/json' } };
    if (body) options.body = JSON.stringify(body);
    try {
        const response = await fetch(`${API_BASE}${endpoint}`, options);
        if (response.ok) { updateSyncIndicator('synced', '🟢 متزامن'); return await response.json(); }
        else { updateSyncIndicator('error', '🔴 خطأ'); return null; }
    } catch (error) { updateSyncIndicator('error', '🔴 غير متصل'); return null; }
}
async function fetchProgress() {
    const data = await apiCall('/api/progress');
    if (data) {
        xp = data.xp || 0; bookmarks = new Set(data.bookmarks || []); hardQuestions = new Set(data.hardQuestions || []);
        notes = data.notes || {}; difficulties = data.difficulties || {}; quizHistory = data.quizHistory || [];
        achievements = data.achievements || []; wrongQuestions = data.wrongQuestions || [];
        updateAllUI(); updateSyncIndicator('synced', '🟢 تم تحميل البيانات');
        isOnlineMode = true;
    }
}
async function saveProgress(endpoint, data) {
    updateSyncIndicator('syncing', '🟡 جاري المزامنة...');
    await apiCall(endpoint, 'POST', data);
}
function updateAllUI() {
    updateXPDisplay(); updateStats(); renderAllQuestions(); updateFavCount(); updateHardCount();
    localStorage.setItem('nb_xp', xp); localStorage.setItem('nb_bookmarks', JSON.stringify([...bookmarks]));
    localStorage.setItem('nb_hard', JSON.stringify([...hardQuestions])); localStorage.setItem('nb_notes', JSON.stringify(notes));
    localStorage.setItem('nb_diff', JSON.stringify(difficulties)); localStorage.setItem('nb_history', JSON.stringify(quizHistory));
    localStorage.setItem('nb_achievements', JSON.stringify(achievements)); localStorage.setItem('nb_wrong', JSON.stringify(wrongQuestions));
}

// ==================== دوال مساعدة ====================
function getCategoryLabel(cat){const m={definitions:'تعريف',mcq:'اختيار',truefalse:'صح/خطأ',complete:'أكمل',explain:'اشرح',list:'قائمة',situations:'موقف'};return m[cat]||cat}
function getCategoryOptions(selected='all'){return `<select id="catFilter"><option value="all" ${selected==='all'?'selected':''}>جميع الأنواع</option>${categoryMeta.filter(c=>c.id!=='definitions').map(c=>`<option value="${c.id}" ${selected===c.id?'selected':''}>${c.label}</option>`).join('')}</select>`}
function addXP(a){xp+=a;localStorage.setItem('nb_xp',xp);if(isOnlineMode)saveProgress('/api/progress/xp',{xp});updateXPDisplay();checkAchievements()}
function updateXPDisplay(){const l=getLevel(),n=getNextLevelXP(),p=getPrevLevelXP(),pr=Math.min(100,Math.round(((xp-p)/(n-p))*100));document.getElementById('xpPoints').textContent=xp;document.getElementById('xpFill').style.width=pr+'%';const b=document.getElementById('levelBadge');b.textContent=l.icon+' '+l.name;b.className='level-badge level-'+l.color}
function getLevel(){if(xp>=5000)return{name:'💎 خبير',icon:'💎',color:'diamond'};if(xp>=2000)return{name:'🥇 متقدم',icon:'🥇',color:'gold'};if(xp>=500)return{name:'🥈 متوسط',icon:'🥈',color:'silver'};return{name:'🟤 مبتدئ',icon:'🟤',color:'bronze'}}
function getNextLevelXP(){if(xp<500)return 500;if(xp<2000)return 2000;if(xp<5000)return 5000;return 10000}
function getPrevLevelXP(){if(xp<500)return 0;if(xp<2000)return 500;if(xp<5000)return 2000;return 5000}
const allAchievements=[{id:'first_quiz',name:'🎯 أول اختبار',condition:()=>quizHistory.length>=1},{id:'perfect_score',name:'💯 درجة كاملة',condition:()=>quizHistory.some(h=>h.score===100)},{id:'hundred_questions',name:'📚 100 سؤال',condition:()=>quizHistory.reduce((s,h)=>s+h.total,0)>=100},{id:'five_streak',name:'🔥 5 أيام',condition:()=>getStudyStreak()>=5},{id:'all_chapters',name:'🏆 كل الفصول',condition:()=>[...new Set(quizHistory.map(h=>h.chapter))].length>=Object.keys(chaptersData).length},{id:'three_perfect',name:'⭐ 3 مثالية',condition:()=>quizHistory.filter(h=>h.score===100).length>=3}];
function getStudyStreak(){const d=[...new Set(quizHistory.map(h=>h.date.split('T')[0]))].sort().reverse();let s=0;const t=new Date().toISOString().split('T')[0];for(const x of d){if(x===t||new Date(t)-new Date(x)<=(s+1)*86400000)s++;else break}return s}
function checkAchievements(){allAchievements.forEach(a=>{if(a.condition()&&!achievements.includes(a.id)){achievements.push(a.id);if(isOnlineMode)saveProgress('/api/progress/achievements',{achievements});spawnConfetti()}});localStorage.setItem('nb_achievements',JSON.stringify(achievements))}
function getQuestionsFor(a,b){let q=[];if(a==='all'){for(const ch of Object.values(chaptersData)){if(ch[b]&&Array.isArray(ch[b]))q=q.concat(ch[b].map(x=>({...x,chapterName:ch.name})))}}else{const ch=chaptersData[a];if(ch&&ch[b]&&Array.isArray(ch[b]))q=ch[b].map(x=>({...x,chapterName:ch.name}))}return q}
function countQuestions(a,b){return getQuestionsFor(a,b).length}
function getAllQuestions(chapterId='all',categoryFilter='all'){let q=[];const cats=categoryFilter==='all'?testCategories:[categoryFilter];if(chapterId==='all'){for(const ch of Object.values(chaptersData)){for(const cat of cats){if(ch[cat]&&Array.isArray(ch[cat]))q=q.concat(ch[cat].map(x=>({...x,cat,chapterName:ch.name})))}}}else{const ch=chaptersData[chapterId];for(const cat of cats){if(ch&&ch[cat]&&Array.isArray(ch[cat]))q=ch[cat].map(x=>({...x,cat,chapterName:ch.name}))}}return q}
function getFullAnswerForTest(q){if(q.cat==='mcq'){let ans=q.correct;if(q.correctTranslation)ans+=' - '+q.correctTranslation;return ans}if(q.cat==='truefalse'){const t=(q.correct===!0||q.correct==='true');let ans=t?'صواب (True)':'خطأ (False)';if(q.correctTranslation)ans+=' - '+q.correctTranslation;return ans}if(q.cat==='complete'){let ans=q.completion||'';if(q.completionTranslation)ans+=' - '+q.completionTranslation;return ans}return q.answer||q.completion||q.translation||''}
function getFlashcardFront(q){let h='';h+='<div class="fc-label">📝 السؤال (English):</div>';h+='<div class="fc-content">'+q.text+'</div>';if(q.translation){h+='<div class="fc-label" style="margin-top:10px;">🌐 الترجمة:</div>';h+='<div class="fc-content">'+q.translation+'</div>'}return h}
function getFlashcardBack(q){let h='';h+='<div class="fc-label">✅ الإجابة (English):</div>';if(q.cat==='mcq'){h+='<div class="fc-content">'+q.correct+'</div>';if(q.correctTranslation){h+='<div class="fc-label" style="margin-top:10px;">🌐 ترجمة الإجابة:</div>';h+='<div class="fc-content">'+q.correctTranslation+'</div>'}}else if(q.cat==='truefalse'){const t=(q.correct===!0||q.correct==='true');h+='<div class="fc-content">'+(t?'True (صواب)':'False (خطأ)')+'</div>';if(q.correctTranslation){h+='<div class="fc-label" style="margin-top:10px;">🌐 ترجمة الإجابة:</div>';h+='<div class="fc-content">'+q.correctTranslation+'</div>'}}else if(q.cat==='complete'){h+='<div class="fc-content">'+((q.completion)||'')+'</div>';if(q.completionTranslation){h+='<div class="fc-label" style="margin-top:10px;">🌐 ترجمة الإجابة:</div>';h+='<div class="fc-content">'+q.completionTranslation+'</div>'}}else{let ans=q.answer||q.completion||q.translation||'';h+='<div class="fc-content">'+ans+'</div>';if(q.answerTranslation){h+='<div class="fc-label" style="margin-top:10px;">🌐 ترجمة الإجابة:</div>';h+='<div class="fc-content">'+q.answerTranslation+'</div>'}}return h}
function updateStats(){let t=0;for(const ch of Object.values(chaptersData)){for(const k of Object.keys(ch)){if(['name','icon'].includes(k))continue;if(Array.isArray(ch[k]))t+=ch[k].length}}document.getElementById('chapterCount').textContent=Object.keys(chaptersData).length;document.getElementById('statsGrid').innerHTML=`<div class="stat-card"><div class="icon-wrap"><i class="fas fa-question-circle"></i></div><div class="number">${t}</div><div class="label">إجمالي الأسئلة</div></div><div class="stat-card"><div class="icon-wrap"><i class="fas fa-book-open"></i></div><div class="number">${Object.keys(chaptersData).length}</div><div class="label">الفصول</div></div><div class="stat-card"><div class="icon-wrap"><i class="fas fa-layer-group"></i></div><div class="number">7</div><div class="label">أنواع الأسئلة</div></div><div class="stat-card"><div class="icon-wrap"><i class="fas fa-star"></i></div><div class="number">${xp}</div><div class="label">نقاط الخبرة</div></div>`}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('sidebarOverlay').classList.toggle('active')}
function buildSidebar(){document.getElementById('sidebarChapters').innerHTML=Object.entries(chaptersData).map(([id,ch])=>`<button class="side-chapter ${currentChapterId===id?'active':''}" onclick="navigateSidebar('${id}','all')"><i class="${ch.icon}"></i> ${ch.name.split(':')[0]}</button>`).join('');document.getElementById('sidebarCategories').innerHTML=categoryMeta.map(c=>`<button class="side-category ${currentCategory===c.id?'active':''}" onclick="navigateSidebar('${currentChapterId}','${c.id}')"><i class="${c.icon}"></i> ${c.label}</button>`).join('')}
function navigateSidebar(a,b){currentChapterId=a;currentCategory=b;renderChapterButtons();renderCategoryTabs();renderAllQuestions();buildSidebar();document.getElementById('sidebar').classList.remove('open');document.getElementById('sidebarOverlay').classList.remove('active');setTimeout(()=>{const t=document.getElementById('questionsWrapper');if(t)t.scrollIntoView({behavior:'smooth',block:'start'})},150)}
function renderChapterButtons(){document.getElementById('chapterSelector').innerHTML=`<button class="chapter-btn ${currentChapterId==='all'?'active':''}" onclick="navigateSidebar('all','all')"><i class="fas fa-globe"></i> الكل</button>${Object.entries(chaptersData).map(([id,ch])=>`<button class="chapter-btn ${currentChapterId===id?'active':''}" onclick="navigateSidebar('${id}','all')"><i class="${ch.icon}"></i> ${ch.name.split(':')[0]}</button>`).join('')}`}
function renderCategoryTabs(){document.getElementById('categoryTabs').innerHTML=`<button class="category-btn ${currentCategory==='all'?'active':''}" onclick="navigateSidebar('${currentChapterId}','all')"><i class="fas fa-border-all"></i> الكل <span class="count">${categoryMeta.reduce((s,c)=>s+countQuestions(currentChapterId,c.id),0)}</span></button>${categoryMeta.map(c=>`<button class="category-btn ${currentCategory===c.id?'active':''}" onclick="navigateSidebar('${currentChapterId}','${c.id}')"><i class="${c.icon}"></i> ${c.label} <span class="count">${countQuestions(currentChapterId,c.id)}</span></button>`).join('')}`}
function renderAllQuestions(){const w=document.getElementById('questionsWrapper');w.innerHTML='';const cats=currentCategory==='all'?categoryMeta.map(c=>c.id):[currentCategory];let idx=0,total=0;cats.forEach(cid=>{const qs=getQuestionsFor(currentChapterId,cid);if(qs.length===0)return;total+=qs.length;const ci=categoryMeta.find(c=>c.id===cid);const sec=document.createElement('div');sec.className='questions-section';sec.innerHTML=`<div class="section-title"><i class="${ci.icon}"></i> ${ci.label} <span class="section-count">${qs.length} سؤال</span></div>${qs.map((q,i)=>{idx++;return renderCard(q,cid,idx)}).join('')}`;w.appendChild(sec)});if(total===0)w.innerHTML='<div class="empty-state"><i class="fas fa-inbox"></i><h3>لا توجد أسئلة</h3></div>';if(hideAnswers)applyHideAnswers();updateFavCount();updateHardCount()}
function renderCard(q,cat,idx){const ci=categoryMeta.find(c=>c.id===cat),bc=ci?ci.badge:'badge-def',tl=ci?ci.label:'',ti=ci?ci.icon:'fa-question',qId='q-'+idx,isB=bookmarks.has(qId),isH=hardQuestions.has(qId),diff=difficulties[qId]||'',note=notes[qId]||'';let h=`<div class="question-card" id="${qId}"><div class="question-header"><span class="question-badge ${bc}"><i class="fas ${ti}"></i> ${tl}</span><span class="question-number">#${idx} | ${q.chapterName||''}</span>${diff?`<span class="difficulty-badge diff-${diff}" onclick="cycleDifficulty('${qId}')">${diff==='easy'?'🟢':diff==='medium'?'🟡':'🔴'}</span>`:`<span class="difficulty-badge" onclick="cycleDifficulty('${qId}')" style="cursor:pointer;opacity:0.4;">⚪</span>`}<div class="card-actions"><button class="action-btn" onclick="copyQuestion('${qId}')"><i class="fas fa-copy"></i></button><button class="action-btn ${isB?'bookmarked':''}" onclick="toggleBookmark('${qId}',this)"><i class="fas fa-star"></i></button><button class="action-btn ${isH?'hard-marked':''}" onclick="toggleHard('${qId}',this)"><i class="fas fa-exclamation-triangle"></i></button></div></div><div class="question-content"><div class="question-text"><i class="fas fa-question-circle"></i> ${q.text}</div>${q.translation?`<div class="translation-box"><i class="fas fa-language"></i> ${q.translation}</div>`:''}`;if(cat==='mcq'&&q.options){h+=`<div class="options-list">${q.options.map(o=>{const ic=(o===q.correct||o.startsWith(q.correct+')')||o.startsWith(q.correct+' '));return`<li style="${ic?'font-weight:700;color:#166534;background:#f0fdf4;padding:6px 12px;border-radius:10px;':''}">${o} ${ic?'✅':''}</li>`}).join('')}</div><div class="answer-box"><strong>✅ ${getFullAnswerForTest(q)}</strong></div>`}else if(cat==='truefalse'){const cv=q.correct,sv=String(cv).toLowerCase().replace(/['"]/g,'').trim(),isT=(sv==='true'||cv===!0||cv===1),at=isT?'✅ صواب (True)':'❌ خطأ (False)',ec=isT?'':' false-answer';h+=`<div class="answer-box${ec}"><strong>${at}</strong></div>`;if(q.correctTranslation)h+=`<div class="answer-translation">${q.correctTranslation}</div>`}else if(q.completion){h+=`<div class="answer-box"><strong>📝 ${q.completion}</strong></div>`;if(q.completionTranslation)h+=`<div class="answer-translation">${q.completionTranslation}</div>`}else if(q.answer){h+=`<div class="answer-box"><strong>📝 ${q.answer}</strong></div>`;if(q.answerTranslation)h+=`<div class="answer-translation">${q.answerTranslation}</div>`}else if(q.items){h+=`<div class="list-items-box"><ul>${q.items.map(i=>`<li>${i}</li>`).join('')}</ul></div>`}h+=`<div class="note-box"><textarea class="note-input" placeholder="📝 ملاحظة..." onchange="saveNote('${qId}',this.value)">${note}</textarea></div></div></div>`;return h}

    else { bookmarks.delete(qId); btn.classList.remove('bookmarked'); }
    localStorage.setItem('nb_bookmarks', JSON.stringify([...bookmarks]));
    if (isOnlineMode) saveProgress('/api/progress/bookmarks', { questionId: qId, action });
    updateFavCount();
}
function updateFavCount(){document.getElementById('favCount').textContent=bookmarks.size;document.getElementById('favoritesBar').style.display=(bookmarks.size+hardQuestions.size)>0?'flex':'none'}
function showFavorites(){document.querySelectorAll('.question-card').forEach(c=>c.style.display=bookmarks.has(c.id)?'block':'none')}
function showAllQuestions(){document.querySelectorAll('.question-card').forEach(c=>c.style.display='block')}
function toggleHard(qId, btn) {
    const action = hardQuestions.has(qId) ? 'remove' : 'add';
    if (action === 'add') { hardQuestions.add(qId); btn.classList.add('hard-marked'); }
    else { hardQuestions.delete(qId); btn.classList.remove('hard-marked'); }
    localStorage.setItem('nb_hard', JSON.stringify([...hardQuestions]));
    if (isOnlineMode) saveProgress('/api/progress/hard', { questionId: qId, action });

function updateHardCount(){document.getElementById('hardCount').textContent=hardQuestions.size;document.getElementById('favoritesBar').style.display=(bookmarks.size+hardQuestions.size)>0?'flex':'none'}

function saveNote(qId, note) {
    notes[qId] = note;
    localStorage.setItem('nb_notes', JSON.stringify(notes));
    if (isOnlineMode) saveProgress('/api/progress/notes', { questionId: qId, note });

function cycleDifficulty(qId) {
    const current = difficulties[qId] || '';
    const newDiff = current === 'easy' ? 'medium' : current === 'medium' ? 'hard' : 'easy';
    difficulties[qId] = newDiff;
    localStorage.setItem('nb_diff', JSON.stringify(difficulties));
    if (isOnlineMode) saveProgress('/api/progress/difficulty', { questionId: qId, difficulty: newDiff });
    renderAllQuestions();

function copyQuestion(a){const c=document.getElementById(a);if(!c)return;const t=c.querySelector('.question-text')?.textContent?.trim()||'',r=c.querySelector('.translation-box')?.textContent?.trim()||'',n=c.querySelector('.answer-box')?.textContent?.trim()||'';navigator.clipboard.writeText(t+'\n'+r+'\n'+n)}
function openModal(a,b){let m=document.getElementById(a);if(!m){m=document.createElement('div');m.className='modal-overlay';m.id=a;document.body.appendChild(m)}m.innerHTML=`<div class="modal-content">${b}</div>`;m.classList.add('active')}
function closeModal(a){const m=document.getElementById(a);if(m){m.classList.remove('active');setTimeout(()=>m.remove(),300)}}
function checkDefinitionAnswer(userText,correctText){const u=userText.toLowerCase().trim().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,'').split(/\s+/).filter(w=>w.length>2);const c=correctText.toLowerCase().trim().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,'').split(/\s+/).filter(w=>w.length>2);if(u.length===0||c.length===0)return!1;let matches=0;const cSet=new Set(c);u.forEach(w=>{if(cSet.has(w))matches++});return(matches/Math.max(c.length,1))>=0.5}
function isAnswerCorrect(chosen,correct){if(!chosen||!correct)return!1;const c=String(chosen).trim(),a=String(correct).trim();if(c===a)return!0;if(c.startsWith(a+')')||c.startsWith(a+' '))return!0;if(a.startsWith(c+')')||a.startsWith(c+' '))return!0;const cl=c.toLowerCase(),al=a.toLowerCase();if(cl===al)return!0;if(cl==='true'&&(al==='true'||al==='صواب'))return!0;if(cl==='false'&&(al==='false'||al==='خطأ'))return!0;if((cl==='true'||cl==='صواب')&&a===!0)return!0;if((cl==='false'||cl==='خطأ')&&a===!1)return!0;return!1}
function renderQuestionHTML(q,i,prefix,total){const catLabel=getCategoryLabel(q.cat);let h=`<div class="quiz-q"><strong>${i+1}. ${q.text}</strong> <span class="q-type-badge">${catLabel}</span>`;if(q.translation){h+=`<div class="translation-box" style="margin-top:5px;"><i class="fas fa-language"></i> ${q.translation}</div>`}if(q.cat==='mcq'&&q.options){q.options.forEach(opt=>{h+=`<button class="quiz-opt" onclick="check${prefix}Answer(this,'${opt.replace(/'/g,"\\'")}','${q.correct.replace(/'/g,"\\'")}',${i}${total?','+total:''})">${opt}</button>`})}else if(q.cat==='truefalse'){h+=`<button class="quiz-opt" onclick="check${prefix}Answer(this,'true','${q.correct}',${i}${total?','+total:''})">✅ صواب</button><button class="quiz-opt" onclick="check${prefix}Answer(this,'false','${q.correct}',${i}${total?','+total:''})">❌ خطأ</button>`}else{h+=`<textarea class="def-input" id="${prefix}-other-${i}" placeholder="اكتب إجابتك هنا..." style="min-height:60px;"></textarea><button class="modal-btn btn-primary" onclick="check${prefix}Other(${i},'${(q.completion||q.answer||'').replace(/'/g,"\\'")}'${total?','+total:''})">تحقق</button>`}h+=`<div class="quiz-fb" id="${prefix}-fb-${i}"></div></div>`;return h}

let qtTimer=null,qtLeft=0,qtScores={};
function openTimedQuiz(){let h=`<h2>⏱️ اختبار مؤقت</h2><div class="modal-settings"><select id="qtChapter">${Object.entries(chaptersData).map(([id,ch])=>`<option value="${id}">${ch.name.split(':')[0]}</option>`).join('')}<option value="all" selected>جميع الفصول</option></select>${getCategoryOptions()}<select id="qtCount"><option value="10">10</option><option value="20">20</option><option value="30" selected>30</option><option value="40">40</option><option value="50">50</option></select><span>⏱️</span><input type="number" id="qtTime" value="20" min="1" max="120" style="width:60px;"> د<button class="modal-btn btn-danger" onclick="startTimedQuiz()">ابدأ</button></div><div id="qtQuestions"></div><div id="qtScore"></div><button class="modal-btn btn-close" onclick="closeModal('timedQuizModal')">إغلاق</button>`;openModal('timedQuizModal',h)}
function startTimedQuiz(){const chId=document.getElementById('qtChapter')?.value||'all',catFilter=document.getElementById('catFilter')?.value||'all',count=parseInt(document.getElementById('qtCount')?.value||30),mins=parseInt(document.getElementById('qtTime')?.value||20);let allQ=getAllQuestions(chId,catFilter).sort(()=>Math.random()-0.5).slice(0,count);qtScores={};qtLeft=mins*60;const modal=document.getElementById('timedQuizModal');if(!modal)return;let qHTML=`<div class="modal-timer" id="qtTimerDisplay">${formatTime(qtLeft)}</div>`;allQ.forEach((q,i)=>{qHTML+=renderQuestionHTML(q,i,'Timed',allQ.length)});modal.querySelector('.modal-content').innerHTML=`<h2>⏱️ اختبار مؤقت</h2>${qHTML}<div id="qtScore"></div><button class="modal-btn btn-close" onclick="closeModal('timedQuizModal')">إغلاق</button>`;if(qtTimer)clearInterval(qtTimer);qtTimer=setInterval(()=>{qtLeft--;const td=document.getElementById('qtTimerDisplay');if(td)td.textContent=formatTime(qtLeft);if(qtLeft<=0){clearInterval(qtTimer);finishTimedQuiz(allQ.length)}},1000)}
function checkTimedAnswer(btn,chosen,correct,i,total){handleGenericAnswer(btn,chosen,correct,i,total,'Timed',null,'qtScores','qtScore');}
function checkTimedOther(i,correctText,total){handleGenericOther(i,correctText,total,'Timed',null,'qtScores','qtScore');}
function finishTimedQuiz(total){
    clearInterval(qtTimer);
    const correctCount=Object.values(qtScores).filter(v=>v===!0).length,score=Math.round(correctCount/total*100);
    const quizEntry={date:new Date().toISOString(),total,correct:correctCount,score,chapter:currentChapterId};
    quizHistory.push(quizEntry);

    if(isOnlineMode) saveProgress('/api/progress/quiz', {total,correct:correctCount,score,chapter:currentChapterId,wrongQuestions:wrongQuestions.slice(-20)});

// ==================== دوال مساعدة للإجابات ====================
function handleGenericAnswer(btn,chosen,correct,i,total,prefix,totalVar,scoresVar,scoreElId){
    const parent=btn.parentElement;parent.querySelectorAll('.quiz-opt').forEach(b=>b.disabled=!0);
    const isCorrect=isAnswerCorrect(chosen,correct);btn.classList.add(isCorrect?'correct':'wrong');
    const scoresObj=totalVar?window[scoresVar]:window[scoresVar];if(scoresObj)scoresObj[i]=isCorrect;
    if(!isCorrect){parent.querySelectorAll('.quiz-opt').forEach(b=>{if(isAnswerCorrect(b.textContent.trim(),correct))b.classList.add('correct')});addWrong('',correct)}
    const fb=document.getElementById(prefix+'-fb-'+i);if(fb){fb.textContent=isCorrect?'✅ صحيح':`❌ خطأ - الصحيح: ${correct}`;fb.style.color=isCorrect?'var(--green)':'var(--red)'}
    if(isCorrect)addXP(5);
    const t=totalVar?window[totalVar]:total;const sObj=totalVar?window[scoresVar]:window[scoresVar];
    if(sObj&&Object.keys(sObj).length>=t){const cc=Object.values(sObj).filter(v=>v===!0).length;const sc=Math.round(cc/t*100);const el=document.getElementById(scoreElId);if(el)el.innerHTML=`<div class="quiz-score">النتيجة: ${cc}/${t} (${sc}%)</div>`;if(sc>=80)spawnConfetti()}
}
function handleGenericOther(i,correctText,total,prefix,totalVar,scoresVar,scoreElId){
    const input=document.getElementById(prefix+'-other-'+i);if(!input||input.disabled)return;
    const isCorrect=checkDefinitionAnswer(input.value,correctText);input.classList.add(isCorrect?'correct-input':'wrong-input');input.disabled=!0;
    const scoresObj=totalVar?window[scoresVar]:window[scoresVar];if(scoresObj)scoresObj[i]=isCorrect;
    const fb=document.getElementById(prefix+'-fb-'+i);if(fb){fb.textContent=isCorrect?'✅ صحيح':`❌ خطأ - الإجابة: ${correctText}`;fb.style.color=isCorrect?'var(--green)':'var(--red)'}
    if(isCorrect)addXP(8);else addWrong('سؤال',correctText);
    const t=totalVar?window[totalVar]:total;const sObj=totalVar?window[scoresVar]:window[scoresVar];
    if(sObj&&Object.keys(sObj).length>=t){const cc=Object.values(sObj).filter(v=>v===!0).length;const sc=Math.round(cc/t*100);const el=document.getElementById(scoreElId);if(el)el.innerHTML=`<div class="quiz-score">النتيجة: ${cc}/${t} (${sc}%)</div>`;if(sc>=80)spawnConfetti()}
}

function retryWrongQuestions(){
    if(wrongQuestions.length===0){alert('🎉 لا توجد أسئلة خاطئة! قم بحل بعض الاختبارات أولاً.');return}
    let allQ=[];const uniqueTexts=new Set();
    wrongQuestions.forEach(w=>{const searchText=(w.correct||'').toLowerCase().trim();if(!searchText||uniqueTexts.has(searchText))return;
        for(const ch of Object.values(chaptersData)){for(const cat of testCategories){if(ch[cat]&&Array.isArray(ch[cat])){const found=ch[cat].find(q=>{const qAns=(q.correct||q.completion||q.answer||'').toLowerCase().trim();return qAns===searchText||qAns.includes(searchText)||searchText.includes(qAns)});
        if(found&&!uniqueTexts.has(searchText)){allQ.push({...found,cat,chapterName:ch.name});uniqueTexts.add(searchText);return}}}}});
    if(allQ.length===0){alert('لم يتم العثور على الأسئلة الخاطئة في قاعدة البيانات.');return}
    allQ=allQ.sort(()=>Math.random()-0.5).slice(0,Math.min(30,allQ.length));
    let h=`<h2>🔄 تحدي الأخطاء (${allQ.length} سؤال)</h2><div id="rwQuestions"></div><div id="rwScore"></div><button class="modal-btn btn-close" onclick="closeModal('retryModal')">إغلاق</button>`;
    openModal('retryModal',h);let qHTML='';allQ.forEach((q,i)=>{qHTML+=renderQuestionHTML(q,i,'Retry',allQ.length)});
    document.getElementById('rwQuestions').innerHTML=qHTML;window._retryTotal=allQ.length;window._retryScores={};
}

function nextFC(){fcI++;if(fcI>=fcQ.length)fcI=0;renderFC()}

// ==================== لوحة تحكم ====================
function openDashboard(){const tQ=quizHistory.reduce((s,h)=>s+h.total,0),tC=quizHistory.reduce((s,h)=>s+h.correct,0),avgS=tQ>0?Math.round(tC/tQ*100):0,streak=getStudyStreak();const chapters=Object.entries(chaptersData).map(([id,ch])=>({id,name:ch.name.split(':')[0],total:0,correct:0}));quizHistory.forEach(h=>{const c=chapters.find(x=>x.id===h.chapter);if(c){c.total+=h.total;c.correct+=h.correct}});let chH=chapters.map(c=>{const s=c.total>0?Math.round(c.correct/c.total*100):0;return`<div style="margin:4px 0;">${c.name}: ${s}%<div class="chart-bar"><div class="chart-fill" style="width:${s}%;background:${s>=80?'var(--green)':s>=50?'var(--orange)':'var(--red)'};"></div></div></div>`}).join('');let achH=allAchievements.map(a=>{const u=achievements.includes(a.id);return`<div class="achievement-badge ${u?'unlocked':'locked'}">${u?a.name:'🔒 '+a.name}</div>`}).join('');let h=`<h2>📊 لوحة التحكم</h2><div class="dashboard-grid"><div class="dashboard-card"><h4>📈 إحصائيات</h4><p>اختبارات: ${quizHistory.length}</p><p>أسئلة: ${tQ}</p><p>صحيحة: ${tC}</p><p>أخطاء: ${wrongQuestions.length}</p><div class="big-number">${avgS}%</div></div><div class="dashboard-card"><h4>🔥 التتابع</h4><div class="big-number">${streak} يوم</div><p>نقاط: ${xp} XP</p></div><div class="dashboard-card"><h4>📚 الفصول</h4>${chH}</div><div class="dashboard-card"><h4>🏆 الإنجازات</h4><div class="achievements-grid">${achH}</div></div></div><button class="modal-btn btn-close" onclick="closeModal('dashboardModal')">إغلاق</button>`;openModal('dashboardModal',h)}

// ==================== مساعدة ====================
function formatTime(s){const m=Math.floor(s/60),sec=s%60;return`${m}:${sec.toString().padStart(2,'0')}`}
function spawnConfetti(){const colors=['#d4af5a','#ef4444','#3b82f6','#10b981','#f59e0b','#8b5cf6','#ec4899'];for(let i=0;i<60;i++){const p=document.createElement('div');p.className='confetti-piece';p.style.left=Math.random()*100+'%';p.style.animationDelay=Math.random()*2+'s';p.style.animationDuration=(2+Math.random()*3)+'s';p.style.width=(7+Math.random()*9)+'px';p.style.height=(7+Math.random()*9)+'px';p.style.background=colors[Math.floor(Math.random()*colors.length)];p.style.borderRadius=Math.random()>0.5?'50%':'2px';document.body.appendChild(p);setTimeout(()=>p.remove(),5000)}}

// ==================== أحداث ====================
window.addEventListener('scroll',()=>{document.getElementById('progressBar').style.width=(window.scrollY/(document.documentElement.scrollHeight-window.innerHeight)*100)+'%'});
const bb=document.getElementById('backToTop');window.addEventListener('scroll',()=>{bb.classList.toggle('visible',window.scrollY>400)});bb.addEventListener('click',()=>{window.scrollTo({top:0,behavior:'smooth'})});
const dt=document.getElementById('darkModeToggle');dt.addEventListener('click',()=>{document.body.classList.toggle('dark-mode');const i=dt.querySelector('i');if(document.body.classList.contains('dark-mode')){i.className='fas fa-sun'}else{i.className='fas fa-moon'}localStorage.setItem('darkMode',document.body.classList.contains('dark-mode'))});
if(localStorage.getItem('darkMode')==='true'){document.body.classList.add('dark-mode');dt.querySelector('i').className='fas fa-sun'}
const ht=document.getElementById('hideAnswersToggle');ht.addEventListener('click',()=>{hideAnswers=!hideAnswers;const i=ht.querySelector('i');if(hideAnswers){i.className='fas fa-eye';applyHideAnswers()}else{i.className='fas fa-eye-slash';removeHideAnswers()}});

// ==================== تهيئة ====================
updateStats();updateXPDisplay();renderChapterButtons();renderCategoryTabs();renderAllQuestions();buildSidebar();updateFavCount();updateHardCount();
document.getElementById('retryWrongBtn').style.display=wrongQuestions.length>0?'inline-flex':'none';
// محاولة الاتصال بالسيرفر
fetchProgress();
</script>
