<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>إدارة الطلاب - معهد رعاية الضبعية</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
<link rel="icon" type="image/png" href="/logo.png">
<style>
    /* ========== نفس الـ CSS السابق (تم اختصاره للحجم، انسخ الـ CSS من ملفك العامل أو استخدم هذا الأساسي) ========== */
    :root {
        --primary: #1a4f6e; --primary-dark: #0d3b54; --secondary: #c4a35a;
        --white: #fff; --gray-200: #e2e8f0; --success: #2d6a4f; --danger: #b91c1c;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Tajawal', sans-serif; background: #f1f5f9; }
    .main-header { background: var(--primary); padding: 12px 20px; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; }
    .logo { width: 45px; border-radius: 50%; }
    .container { max-width: 1400px; margin: 20px auto; padding: 0 16px 80px; }
    .welcome-card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 20px; border-right: 4px solid var(--secondary); }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); gap: 16px; margin: 20px 0; }
    .stat-card { background: white; padding: 20px; border-radius: 20px; text-align: center; }
    .search-input { width: 100%; padding: 12px; border-radius: 50px; border: 1px solid #ddd; }
    .table-wrapper { overflow-x: auto; background: white; border-radius: 20px; }
    table { width: 100%; border-collapse: collapse; min-width: 800px; }
    th { background: var(--primary); color: white; padding: 12px; }
    td { padding: 10px; border-bottom: 1px solid #eee; }
    input { padding: 6px 10px; border-radius: 10px; border: 1px solid #ccc; width: 100%; }
    .btn-edit, .btn-save, .btn-delete, .btn-cancel { border: none; padding: 6px 12px; border-radius: 20px; margin: 2px; cursor: pointer; }
    .btn-edit { background: #e8f5ed; color: #2d6a4f; }
    .btn-save { background: #2d6a4f; color: white; }
    .btn-delete { background: #fee2e2; color: #b91c1c; }
    .btn-cancel { background: #64748b; color: white; }
    .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 10px; border-top: 2px solid var(--secondary); }
    .scroll-buttons { position: fixed; bottom: 80px; right: 16px; }
    .scroll-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--primary); color: var(--secondary); border: none; margin-bottom: 8px; }
    footer { text-align: center; padding: 20px; font-size: 12px; color: gray; }
    @media (max-width: 768px) { th, td { font-size: 12px; padding: 6px; } .btn-edit, .btn-save, .btn-delete { padding: 4px 8px; font-size: 10px; } }
</style>
</head>
<body>
<header class="main-header">
    <img src="logo.png" class="logo" onerror="this.style.display='none'">
    <h1 style="color:white; font-size:1rem;">إدارة الطلاب</h1>
    <div><button class="home-btn" onclick="location.href='admin.html'" style="background:var(--secondary); border:none; padding:6px 12px; border-radius:20px;">لوحة التحكم</button>
    <button class="logout-btn" onclick="logout()" style="background:#c0392b; border:none; padding:6px 12px; border-radius:20px; color:white;">تسجيل الخروج</button></div>
</header>
<div class="container">
    <div class="welcome-card" id="welcomeCard"><h2>مرحباً بك</h2><p>تعديل بيانات الطلاب</p></div>
    <div class="stats-grid"><div class="stat-card"><i class="fas fa-users"></i><h3 id="totalStudents">0</h3><p>إجمالي الطلاب</p></div><div class="stat-card"><i class="fas fa-user-check"></i><h3 id="activeStudents">0</h3><p>طلاب نشطين</p></div></div>
    <div class="search-section"><input type="text" id="searchInput" class="search-input" placeholder="🔍 بحث..."></div>
    <div class="table-wrapper"><table><thead><tr><th>#</th><th>الاسم الكامل</th><th>اسم المستخدم</th><th>كلمة المرور</th><th>رقم الجلوس</th><th>الهاتف</th><th>ولي الأمر</th><th>رقم البطاقة</th><th>إجراءات</th></tr></thead><tbody id="studentsTableBody"><tr><td colspan="9">جاري التحميل...</td></tr></tbody></table></div>
</div>
<footer><p>Developed by Ahmed Moussa ❤️</p></footer>
<div class="scroll-buttons"><button class="scroll-btn" onclick="scrollToTop()">▲</button><button class="scroll-btn" onclick="scrollToBottom()">▼</button></div>
<div class="nav-bar"><a href="admin.html">لوحة التحكم</a><a href="first-gards.html">الدرجات</a><a href="file-library.html">المكتبة</a><a href="profile.html">الملف الشخصي</a></div>

<script>
const BASE_URL = window.location.hostname === 'localhost' ? 'http://localhost:3000' : '';

function getLoggedInUser() {
    try { return JSON.parse(sessionStorage.getItem('userData')); } catch(e){ return null; }
}
function showToast(msg, type='success') {
    if(typeof Toastify !== 'undefined') Toastify({text: msg, duration:3000, gravity:'top', position:'right', style:{background: type==='success'?'#28a745':'#dc3545', borderRadius:'12px'}}).showToast();
    else alert(msg);
}
async function apiRequest(endpoint, options={}) {
    const response = await fetch(`${BASE_URL}${endpoint}`, {...options, credentials:'include'});
    if(response.status === 401){ sessionStorage.clear(); window.location.href='/login.html'; throw new Error('انتهت الجلسة'); }
    return response;
}
window.logout = async()=>{ if(confirm('تسجيل الخروج؟')){ await fetch(`${BASE_URL}/api/logout`,{method:'POST',credentials:'include'}); sessionStorage.clear(); location.href='login.html'; }};
window.scrollToTop = ()=>window.scrollTo({top:0,behavior:'smooth'});
window.scrollToBottom = ()=>window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'});

let allStudents = [], editingStudentCode = null;

async function loadStudents(){
    try{
        const res = await apiRequest('/api/admin/students');
        allStudents = await res.json();
        document.getElementById('totalStudents').innerText = allStudents.length;
        document.getElementById('activeStudents').innerText = allStudents.filter(s=>s.subjects?.length>0).length;
        renderStudents(allStudents);
    }catch(e){ showToast('فشل التحميل','error'); }
}

function escapeHtml(str){ if(!str) return ''; return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;});}

function togglePassword(btn, inputId){
    let inp = document.getElementById(inputId);
    if(!inp) return;
    let type = inp.type === 'password' ? 'text' : 'password';
    inp.type = type;
    btn.querySelector('i').classList.toggle('fa-eye');
    btn.querySelector('i').classList.toggle('fa-eye-slash');
}

function renderStudents(students){
    let tbody = document.getElementById('studentsTableBody');
    if(!tbody) return;
    tbody.innerHTML = '';
    if(students.length===0){ tbody.innerHTML = '<tr><td colspan="9">لا يوجد طلاب</td></tr>'; return; }
    students.forEach((s,idx)=>{
        let isEditing = (editingStudentCode === s.studentCode);
        let pwdId = `pwd-${s.studentCode}`;
        tbody.innerHTML += `
            <tr>
                <td>${idx+1}</td>
                <td>${isEditing ? `<input type="text" id="full-${s.studentCode}" value="${escapeHtml(s.fullName)}">` : `<b>${escapeHtml(s.fullName)}</b>`}</td>
                <td>${isEditing ? `<input type="text" id="user-${s.studentCode}" value="${escapeHtml(s.username)}">` : escapeHtml(s.username)}</td>
                <td>${isEditing ? `<div style="display:flex; gap:4px;"><input type="password" id="${pwdId}" placeholder="جديدة" style="flex:1;"><button class="toggle-password" onclick="togglePassword(this,'${pwdId}')" style="background:none; border:none;"><i class="fas fa-eye"></i></button></div>` : '••••••'}</td>
                <td>${isEditing ? `<input type="text" id="code-${s.studentCode}" value="${escapeHtml(s.studentCode)}" maxlength="7">` : escapeHtml(s.studentCode)}</td>
                <td>${isEditing ? `<input type="tel" id="phone-${s.studentCode}" value="${escapeHtml(s.profile?.phone||'')}">` : escapeHtml(s.profile?.phone||'-')}</td>
                <td>${isEditing ? `<input type="text" id="parent-${s.studentCode}" value="${escapeHtml(s.profile?.parentName||'')}">` : escapeHtml(s.profile?.parentName||'-')}</td>
                <td>${isEditing ? `<input type="text" id="parentId-${s.studentCode}" value="${escapeHtml(s.profile?.parentId||'')}">` : escapeHtml(s.profile?.parentId||'-')}</td>
                <td>${!isEditing ? `<button class="btn-edit" onclick="startEdit('${s.studentCode}')"><i class="fas fa-edit"></i> تعديل</button> <button class="btn-delete" onclick="deleteStudent('${s.studentCode}')"><i class="fas fa-trash"></i> حذف</button>` : `<button class="btn-save" onclick="saveEdit('${s.studentCode}')"><i class="fas fa-save"></i> حفظ</button> <button class="btn-cancel" onclick="cancelEdit()"><i class="fas fa-times"></i> إلغاء</button>`}</td>
            </tr>
        `;
    });
}

function startEdit(code){ editingStudentCode = code; renderStudents(allStudents); }
function cancelEdit(){ editingStudentCode = null; renderStudents(allStudents); }

async function saveEdit(code){
    let oldStudent = allStudents.find(s=>s.studentCode===code);
    if(!oldStudent) return;
    let newCode = document.getElementById(`code-${code}`).value.trim();
    let updated = {
        fullName: document.getElementById(`full-${code}`).value.trim(),
        username: document.getElementById(`user-${code}`).value.trim(),
        profile: {
            phone: document.getElementById(`phone-${code}`).value.trim(),
            parentName: document.getElementById(`parent-${code}`).value.trim(),
            parentId: document.getElementById(`parentId-${code}`).value.trim()
        }
    };
    if(newCode !== code) updated.studentCode = newCode;
    let newPassword = document.getElementById(`pwd-${code}`).value.trim();
    if(newPassword !== '') updated.password = newPassword;
    if(!updated.fullName || !updated.username) return showToast('الاسم واسم المستخدم مطلوبان','error');
    if(newCode && (newCode.length<1 || newCode.length>7)) return showToast('رقم الجلوس 1-7 أرقام','error');
    let existingUser = allStudents.find(s=>s.username===updated.username && s.studentCode!==code);
    if(existingUser) return showToast('اسم المستخدم موجود','error');
    if(newCode !== code && allStudents.find(s=>s.studentCode===newCode)) return showToast('رقم الجلوس مستخدم','error');
    showToast('جاري الحفظ...','info');
    try{
        let res = await apiRequest(`/api/students/${encodeURIComponent(code)}`, { method:'PUT', body:JSON.stringify(updated), headers:{'Content-Type':'application/json'} });
        if(!res.ok) throw new Error(await res.text());
        await loadStudents();
        cancelEdit();
        showToast('تم الحفظ بنجاح','success');
    }catch(e){ showToast('خطأ: '+e.message,'error'); }
}

async function deleteStudent(code){
    let student = allStudents.find(s=>s.studentCode===code);
    if(!confirm(`حذف الطالب ${student.fullName}؟`)) return;
    try{
        let res = await apiRequest(`/api/students/${encodeURIComponent(code)}`, { method:'DELETE' });
        if(!res.ok) throw new Error();
        await loadStudents();
        showToast('تم الحذف','success');
    }catch(e){ showToast('فشل الحذف','error'); }
}

document.getElementById('searchInput')?.addEventListener('input', function(e){
    let val = e.target.value.toLowerCase();
    let filtered = allStudents.filter(s=> s.fullName?.toLowerCase().includes(val) || s.username?.toLowerCase().includes(val) || s.studentCode?.toLowerCase().includes(val));
    renderStudents(filtered);
});

(async function init(){
    let user = getLoggedInUser();
    if(!user || user.type !== 'admin'){ showToast('غير مصرح','error'); setTimeout(()=>location.href='Home.html',1500); return; }
    let verify = await fetch(`${BASE_URL}/api/verify-session`,{credentials:'include'});
    if(!verify.ok){ sessionStorage.clear(); location.href='login.html'; return; }
    document.getElementById('welcomeCard').innerHTML = `<h2>مرحباً ${user.fullName||user.username}</h2><p>يمكنك تعديل بيانات الطلاب</p>`;
    await loadStudents();
})();
</script>
</body>
</html>
